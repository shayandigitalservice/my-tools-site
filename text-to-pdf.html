<!DOCTYPE html><html>
<head>
  <title>A4 Word Style Editor (Working)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!-- CKEditor -->  <script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>  <!-- PDF -->  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#eef2f7;
    }

    .topbar{
      background:#2563eb;
      color:white;
      padding:12px;
      text-align:center;
      font-weight:bold;
    }

    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      padding:10px;
      justify-content:center;
      background:#f8fafc;
    }

    input, button{
      padding:8px;
      border-radius:6px;
      border:1px solid #ccc;
    }

    button{
      background:#2563eb;
      color:white;
      border:none;
      cursor:pointer;
    }

    button:hover{background:#1e40af;}

    /* A4 PAGE */
    .page{
      width:210mm;
      min-height:297mm;
      background:white;
      margin:20px auto;
      padding:20mm;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
      position:relative;
    }

    /* page number */
    .page::after{
      content: "Page " counter(page);
      counter-increment: page;
      position:absolute;
      bottom:10mm;
      right:15mm;
      font-size:12px;
      color:#666;
    }

    /* scrolling like docs */
    .workspace{
      max-height:80vh;
      overflow:auto;
      padding:10px;
    }

    @media print{
      .controls,.topbar{display:none;}
      .page{box-shadow:none; margin:0;}
    }
  </style></head>
<body><div class="topbar">📄 Simple Word Style A4 Editor</div><div class="controls">
  <input id="fileName" placeholder="filename.pdf">
  <button onclick="exportPDF()">Download PDF</button>
</div><div class="workspace">
  <div class="page">
    <div id="editor">
      <h2>Start typing...</h2>
    </div>
  </div>
</div><script>

let editorInstance;

ClassicEditor.create(document.querySelector('#editor'), {
  toolbar: [
    'heading',
    'bold', 'italic', 'underline',
    '|',
    'fontFamily', 'fontSize', 'fontColor',
    '|',
    'bulletedList', 'numberedList',
    '|',
    'insertTable', 'imageUpload',
    '|',
    'undo', 'redo'
  ],
  fontFamily: {
    options: [
      'default',
      'Arial',
      'Roboto',
      'Times New Roman',
      'Courier New'
    ]
  },
  fontSize: {
    options: [10, 12, 14, 16, 18, 24, 32]
  }
}).then(editor => {
  editorInstance = editor;
});

// PDF EXPORT
function exportPDF(){
  const element = document.querySelector('.page');

  html2pdf().set({
    margin: 0,
    filename: document.getElementById('fileName').value || 'document.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  }).from(element).save();
}

</script></body>
</html>
