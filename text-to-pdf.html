<!DOCTYPE html>
<html>
<head>
  <title>Modern Word Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#eef2f7;
    }

    /* TOP TOOLBAR */
    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      padding:10px;
      background:#2563eb;
      align-items:center;
    }

    .toolbar button, .toolbar select, .toolbar input{
      padding:8px;
      border:none;
      border-radius:6px;
      outline:none;
    }

    .toolbar button{
      background:white;
      cursor:pointer;
    }

    .toolbar button:hover{
      background:#ddd;
    }

    /* A4 PAGE */
    .page{
      width:210mm;
      min-height:297mm;
      background:white;
      margin:20px auto;
      padding:20mm;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    #editor{
      min-height:250mm;
      outline:none;
    }

    img{
      max-width:100%;
    }
  </style>
</head>

<body>

<!-- TOOLBAR -->
<div class="toolbar">

  <button onclick="cmd('bold')"><b>B</b></button>
  <button onclick="cmd('italic')"><i>I</i></button>
  <button onclick="cmd('underline')"><u>U</u></button>

  <select onchange="cmd('fontName', this.value)">
    <option>Arial</option>
    <option>Georgia</option>
    <option>Times New Roman</option>
    <option>Courier New</option>
    <option>Verdana</option>
  </select>

  <select onchange="cmd('fontSize', this.value)">
    <option value="3">Small</option>
    <option value="4">Normal</option>
    <option value="5">Large</option>
    <option value="6">X-Large</option>
  </select>

  <input type="color" onchange="cmd('foreColor', this.value)">

  <button onclick="addImage()">🖼 Image</button>
  <button onclick="saveDoc()">💾 Save</button>
  <button onclick="loadDoc()">📂 Load</button>
  <button onclick="exportPDF()">📄 PDF</button>

</div>

<!-- PAGE -->
<div class="page">
  <div id="editor" contenteditable="true">
    Start writing your document...
  </div>
</div>

<script>

const API_URL = "https://shayan-pdf-api-docker.onrender.com/pdf";

/* COMMANDS */
function cmd(command, value=null){
  document.execCommand(command, false, value);
}

/* IMAGE INSERT */
function addImage(){
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";

  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event){
      const img = `<img src="${event.target.result}" />`;
      document.execCommand("insertHTML", false, img);
    }

    reader.readAsDataURL(file);
  }

  input.click();
}

/* AUTO SAVE */
function saveDoc(){
  localStorage.setItem("my_doc", document.getElementById("editor").innerHTML);
  alert("Saved!");
}

/* LOAD */
function loadDoc(){
  const data = localStorage.getItem("my_doc");
  if(data){
    document.getElementById("editor").innerHTML = data;
  }
}

/* AUTO SAVE EVERY 3 SEC */
setInterval(()=>{
  localStorage.setItem("my_doc", document.getElementById("editor").innerHTML);
},3000);

/* PDF EXPORT (YOUR BACKEND) */
async function exportPDF(){

  const html = document.querySelector(".page").innerHTML;

  const res = await fetch(API_URL, {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      html: html
    })
  });

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "document.pdf";
  a.click();
}

</script>

</body>
</html>
