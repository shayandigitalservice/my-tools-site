<!DOCTYPE html><html>
<head>
  <title>Canva + Word Hybrid Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!-- Fabric.js -->  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#eef2f7;
    }

    .topbar{
      background:#1d4ed8;
      color:white;
      padding:12px;
      text-align:center;
      font-weight:bold;
    }

    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      padding:10px;
      justify-content:center;
      background:#f8fafc;
    }

    button, input{
      padding:8px;
      border-radius:6px;
      border:1px solid #ccc;
    }

    button{
      background:#2563eb;
      color:white;
      border:none;
      cursor:pointer;
    }

    button:hover{background:#1e40af;}

    .workspace{
      display:flex;
      justify-content:center;
      padding:10px;
    }

    canvas{
      border:1px solid #ccc;
      background:white;
    }

  </style></head>
<body><div class="topbar">🎨 Canva + Word Hybrid Editor</div><div class="controls">
  <button onclick="addText()">Add Text</button>
  <button onclick="makeBold()">Bold</button>
  <button onclick="changeColor()">Color</button>
  <button onclick="increaseSize()">Font +</button>
  <button onclick="decreaseSize()">Font -</button>
  <button onclick="addRect()">Shape</button>
  <input type="file" id="imgLoader" accept="image/*">
  <button onclick="downloadPNG()">Export PNG</button>
</div><div class="workspace">
  <canvas id="c" width="900" height="1200"></canvas>
</div><script>

const canvas = new fabric.Canvas('c');

// ADD TEXT
function addText(){
  const text = new fabric.IText('Double click to edit', {
    left: 100,
    top: 100,
    fontSize: 20,
    fill: '#000'
  });
  canvas.add(text);
}

// MAKE BOLD
function makeBold(){
  let obj = canvas.getActiveObject();
  if(obj && obj.type === 'i-text'){
    obj.set("fontWeight", obj.fontWeight === 'bold' ? 'normal' : 'bold');
    canvas.renderAll();
  }
}

// COLOR CHANGE
function changeColor(){
  let obj = canvas.getActiveObject();
  if(obj){
    obj.set("fill", "#ff0000");
    canvas.renderAll();
  }
}

// FONT SIZE +
function increaseSize(){
  let obj = canvas.getActiveObject();
  if(obj && obj.fontSize){
    obj.set("fontSize", obj.fontSize + 2);
    canvas.renderAll();
  }
}

// FONT SIZE -
function decreaseSize(){
  let obj = canvas.getActiveObject();
  if(obj && obj.fontSize){
    obj.set("fontSize", obj.fontSize - 2);
    canvas.renderAll();
  }
}

// ADD SHAPE
function addRect(){
  const rect = new fabric.Rect({
    left: 150,
    top: 150,
    width: 100,
    height: 100,
    fill: '#60a5fa'
  });
  canvas.add(rect);
}

// IMAGE UPLOAD

document.getElementById('imgLoader').addEventListener('change', function(e){
  const reader = new FileReader();
  reader.onload = function(event){
    fabric.Image.fromURL(event.target.result, function(img){
      img.scale(0.5);
      img.set({ left: 200, top: 200 });
      canvas.add(img);
    });
  };
  reader.readAsDataURL(e.target.files[0]);
});

// EXPORT PNG
function downloadPNG(){
  const link = document.createElement('a');
  link.download = 'design.png';
  link.href = canvas.toDataURL();
  link.click();
}

</script></body>
</html>
