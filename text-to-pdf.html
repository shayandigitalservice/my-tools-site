<!DOCTYPE html>
<html>
<head>

<title>Text to PDF Converter Tool 2026</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f1f5f9;
color:#222;
}

/* HEADER */
.header{
background:#2563eb;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:600;
}

/* MAIN */
.container{
max-width:700px;
margin:30px auto;
padding:20px;
background:white;
border-radius:10px;
border:1px solid #ddd;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

/* BUTTON */
button{
background:#2563eb;
color:white;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
width:100%;
font-size:15px;
}

button:hover{
background:#1e40af;
}

/* RESULT */
.result{
margin-top:20px;
padding:20px;
background:#eff6ff;
border:1px solid #2563eb;
border-radius:8px;
text-align:center;
}

.highlight{
background:#2563eb;
color:white;
padding:10px;
border-radius:6px;
margin-top:10px;
}

a{
color:#2563eb;
text-decoration:none;
}

</style>

</head>

<body>

<div class="header">
📄 Text File → PDF Converter 2026
</div>

<div class="container">

<h2>Upload Text File</h2>

<input type="file" id="fileInput" accept=".txt">

<button onclick="convertPDF()">Convert to PDF</button>

<div id="result" class="result"></div>

<br>
<a href="index.html">⬅ Back to Home</a>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

async function convertPDF(){

const fileInput = document.getElementById("fileInput");
const result = document.getElementById("result");

if(!fileInput.files.length){
alert("Please upload a text file");
return;
}

const file = fileInput.files[0];
const text = await file.text();

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

// clean long text
const lines = doc.splitTextToSize(text, 180);

doc.text(lines, 10, 10);
doc.save("converted.pdf");

result.innerHTML = `
<h3>🎉 PDF Ready!</h3>
<div class="highlight">Your file has been converted successfully</div>
`;

}

</script>

</body>
</html>
