<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4 Text to PDF Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-color: #1a1a1a; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Toolbar Styling */
        .toolbar { background: #2d2d2d; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; position: sticky; top: 10px; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        select, button, input { background: #444; color: white; border: 1px solid #555; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        button:hover { background: #666; }

        /* A4 Page Styling */
        #paper {
            background: white;
            color: black;
            width: 210mm; /* A4 Width */
            min-height: 297mm; /* A4 Height */
            padding: 20mm;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            outline: none;
            overflow-wrap: break-word;
        }

        .download-btn { background: #28a745; font-weight: bold; margin-left: 20px; }
    </style>
</head>
<body>

    <div class="toolbar">
        <select onchange="execCmd('fontName', this.value)">
            <option value="Arial">Arial</option>
            <option value="Roboto">Roboto</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
        </select>

        <select onchange="execCmd('fontSize', this.value)">
            <option value="3">Size 12</option>
            <option value="4">Size 14</option>
            <option value="5">Size 18</option>
            <option value="6">Size 24</option>
            <option value="7">Size 36</option>
        </select>

        <button onclick="execCmd('bold')"><b>B</b></button>
        <button onclick="execCmd('italic')"><i>I</i></button>
        <button onclick="execCmd('underline')"><u>U</u></button>
        
        <input type="color" onchange="execCmd('foreColor', this.value)" title="Text Color">

        <button onclick="execCmd('justifyLeft')">Left</button>
        <button onclick="execCmd('justifyCenter')">Center</button>
        <button onclick="execCmd('justifyRight')">Right</button>

        <button class="download-btn" onclick="downloadPDF()">Download PDF</button>
    </div>

    <div id="paper" contenteditable="true">
        Yahan apna text likhna shuru karein...
    </div>

    <script>
        // Formatting function
        function execCmd(command, value = null) {
            document.execCommand(command, false, value);
        }

        // PDF Download function
        function downloadPDF() {
            const element = document.getElementById('paper');
            const opt = {
                margin:       0,
                filename:     'MeraDocument.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // New Promise-based usage:
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
