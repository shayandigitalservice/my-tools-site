<!DOCTYPE html>
<html>
<head>

<title>Ultimate Word Editor</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/6/tinymce.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f1f5f9;
}

.header{
background:#2563eb;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
max-width:900px;
margin:20px auto;
background:white;
padding:10px;
border-radius:8px;
}

button{
margin-top:10px;
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
}
</style>

</head>

<body>

<div class="header">📝 Ultimate Document Editor</div>

<div class="container">

<textarea id="editor"></textarea>

<input type="text" id="filename" placeholder="file name.pdf">

<button onclick="downloadPDF()">Download PDF</button>

</div>

<script>

tinymce.init({
selector: '#editor',
height: 400,

plugins: [
'advlist autolink lists link image charmap preview anchor',
'searchreplace visualblocks code fullscreen',
'insertdatetime media table code help wordcount'
],

toolbar: 
'undo redo | fontfamily fontsize | bold italic underline | forecolor backcolor | alignleft aligncenter alignright alignjustify | bullist numlist | image table | removeformat',

// 20+ fonts
font_family_formats:
"Arial=arial,helvetica,sans-serif;"+
"Roboto=roboto,sans-serif;"+
"Times New Roman=times new roman,times;"+
"Courier New=courier new,courier;"+
"Georgia=georgia;"+
"Verdana=verdana;"+
"Tahoma=tahoma;"+
"Impact=impact;"+
"Comic Sans MS=comic sans ms;",

// font size 1–100
fontsize_formats: "8pt 10pt 12pt 14pt 18pt 24pt 36pt 48pt 72pt",

menubar: true
});

// PDF DOWNLOAD
function downloadPDF(){

let content = tinymce.get("editor").getContent();

let win = window.open('', '', 'width=800,height=600');
win.document.write(content);
win.document.close();

setTimeout(()=>{
win.print();
},500);

}

</script>

</body>
</html>
