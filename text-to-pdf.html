<!DOCTYPE html>
<html>
<head>
  <title>A4 Word Editor + Backend PDF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#e5e7eb;
    }

    /* TOOLBAR */
    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      padding:10px;
      background:#2563eb;
    }

    .toolbar button, .toolbar select, .toolbar input{
      padding:6px;
      border:none;
      border-radius:5px;
    }

    .toolbar button{
      background:white;
      cursor:pointer;
    }

    /* A4 PAGE */
    .page{
      width:210mm;
      min-height:297mm;
      background:white;
      margin:20px auto;
      padding:20mm;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    #editor{
      min-height:250mm;
      outline:none;
    }

    img{max-width:100%;}
  </style>
</head>

<body>

<!-- TOOLBAR -->
<div class="toolbar">

  <select onchange="cmd('formatBlock', this.value)">
    <option value="p">Normal</option>
    <option value="h1">H1</option>
    <option value="h2">H2</option>
    <option value="h3">H3</option>
  </select>

  <select onchange="cmd('fontName', this.value)">
    <option>Arial</option>
    <option>Georgia</option>
    <option>Times New Roman</option>
    <option>Courier New</option>
  </select>

  <select onchange="cmd('fontSize', this.value)">
    <option value="3">Small</option>
    <option value="4">Normal</option>
    <option value="5">Large</option>
  </select>

  <button onclick="cmd('bold')"><b>B</b></button>
  <button onclick="cmd('italic')"><i>I</i></button>
  <button onclick="cmd('underline')"><u>U</u></button>

  <button onclick="cmd('justifyLeft')">Left</button>
  <button onclick="cmd('justifyCenter')">Center</button>
  <button onclick="cmd('justifyRight')">Right</button>

  <input type="color" onchange="cmd('foreColor', this.value)">

  <button onclick="downloadPDF()">PDF Download</button>

</div>

<!-- A4 PAGE -->
<div class="page">
  <div id="editor" contenteditable="true">
    Start typing your document...
  </div>
</div>

<script>

const API_URL = "https://shayan-pdf-api-docker.onrender.com/pdf";

/* COMMANDS */
function cmd(command, value=null){
  document.execCommand(command, false, value);
}

/* BACKEND PDF EXPORT */
async function downloadPDF(){

  const htmlContent = document.querySelector(".page").innerHTML;

  try{
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        html: htmlContent
      })
    });

    if(!res.ok){
      alert("Backend error!");
      return;
    }

    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "document.pdf";
    a.click();

  } catch(err){
    alert("Backend not reachable!");
    console.log(err);
  }
}

</script>

</body>
</html>
