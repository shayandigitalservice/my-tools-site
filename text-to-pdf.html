<!DOCTYPE html>
<html>
<head>

<title>Google Docs Style Editor</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#f1f5f9;
}

.header{
background:#2563eb;
color:white;
padding:15px;
font-size:20px;
text-align:center;
}

.toolbar{
background:white;
padding:10px;
border-bottom:1px solid #ddd;
}

.container{
max-width:900px;
margin:20px auto;
background:white;
padding:10px;
border-radius:8px;
}

#editor{
height:300px;
}

button{
margin-top:10px;
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">📝 Smart Document Editor</div>

<div class="container">

<div id="editor"></div>

<input type="text" id="filename" placeholder="file name.pdf">

<button onclick="downloadPDF()">Download PDF</button>

</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

var quill = new Quill('#editor', {
theme: 'snow',
modules: {
toolbar: [
[{ 'font': [] }],
[{ 'size': ['small', false, 'large', 'huge'] }],
['bold', 'italic', 'underline', 'strike'],
[{ 'color': [] }, { 'background': [] }],
[{ 'script': 'sub'}, { 'script': 'super' }],
[{ 'header': 1 }, { 'header': 2 }],
[{ 'list': 'ordered'}, { 'list': 'bullet' }],
[{ 'align': [] }],
['link', 'image'],
['clean']
]
}
});

async function downloadPDF(){

let element = document.querySelector(".ql-editor");

const canvas = await html2canvas(element);

const imgData = canvas.toDataURL("image/png");

const { jsPDF } = window.jspdf;

let pdf = new jsPDF('p','mm','a4');

pdf.addImage(imgData, 'PNG', 10, 10, 190, 0);

let filename = document.getElementById("filename").value || "document.pdf";

pdf.save(filename);

}

</script>

</body>
</html>
