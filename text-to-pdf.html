<!DOCTYPE html>
<html>
<head>
  <title>Simple A4 Word Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#f1f5f9;
    }

    /* TOOLBAR */
    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      padding:10px;
      background:#2563eb;
    }

    .toolbar button, .toolbar select, .toolbar input{
      padding:6px;
      border:none;
      border-radius:5px;
    }

    .toolbar button{
      background:white;
      cursor:pointer;
    }

    /* A4 PAGE */
    .page{
      width:210mm;
      min-height:297mm;
      background:white;
      margin:20px auto;
      padding:20mm;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    #editor{
      min-height:250mm;
      outline:none;
    }

    img{
      max-width:100%;
    }

  </style>
</head>

<body>

<!-- TOOLBAR -->
<div class="toolbar">

  <select onchange="cmd('formatBlock', this.value)">
    <option value="p">Normal</option>
    <option value="h1">H1</option>
    <option value="h2">H2</option>
    <option value="h3">H3</option>
  </select>

  <select onchange="cmd('fontName', this.value)">
    <option>Arial</option>
    <option>Georgia</option>
    <option>Times New Roman</option>
    <option>Courier New</option>
  </select>

  <select onchange="cmd('fontSize', this.value)">
    <option value="3">Small</option>
    <option value="4">Normal</option>
    <option value="5">Large</option>
  </select>

  <button onclick="cmd('bold')"><b>B</b></button>
  <button onclick="cmd('italic')"><i>I</i></button>
  <button onclick="cmd('underline')"><u>U</u></button>

  <button onclick="cmd('justifyLeft')">Left</button>
  <button onclick="cmd('justifyCenter')">Center</button>
  <button onclick="cmd('justifyRight')">Right</button>

  <input type="color" onchange="cmd('foreColor', this.value)">

  <button onclick="addImage()">Image</button>
  <button onclick="downloadPDF()">PDF</button>

</div>

<!-- PAGE -->
<div class="page">
  <div id="editor" contenteditable="true">
    Start writing here...
  </div>
</div>

<script>

/* BASIC COMMAND */
function cmd(command, value=null){
  document.execCommand(command, false, value);
}

/* IMAGE INSERT */
function addImage(){
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";

  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event){
      cmd('insertHTML', `<img src="${event.target.result}" />`);
    }

    reader.readAsDataURL(file);
  }

  input.click();
}

/* PDF DOWNLOAD (SAFE LOCAL VERSION) */
function downloadPDF(){
  const content = document.querySelector(".page").innerHTML;

  const win = window.open("", "", "width=900,height=700");

  win.document.write(`
    <html>
    <head>
      <title>PDF</title>
      <style>
        body{font-family:Arial;margin:0;padding:20px;}
        img{max-width:100%;}
      </style>
    </head>
    <body>
      ${content}
    </body>
    </html>
  `);

  win.print();
}

</script>

</body>
</html>
