<!DOCTYPE html>
<html>
<head>

<title>PDF to Word Converter (Backend Powered)</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f1f5f9;
}

.header{
background:#2563eb;
color:white;
text-align:center;
padding:20px;
font-size:24px;
font-weight:600;
}

.container{
max-width:750px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
border:1px solid #ddd;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
font-size:15px;
}

button:hover{
background:#1e40af;
}

.result{
margin-top:20px;
padding:15px;
background:#eff6ff;
border:1px solid #2563eb;
border-radius:8px;
white-space:pre-wrap;
min-height:60px;
}

.loader{
display:none;
margin-top:10px;
color:#2563eb;
font-weight:600;
}

</style>

</head>

<body>

<div class="header">
📄 PDF → Word Converter (Backend Powered)
</div>

<div class="container">

<h2>Upload PDF File</h2>

<input type="file" id="fileInput" accept=".pdf">

<button onclick="convertPDF()">Convert to Word</button>

<div class="loader" id="loader">⏳ Processing via Backend...</div>

<div id="result" class="result">Ready to convert...</div>

</div>

<script>

async function convertPDF(){

const fileInput = document.getElementById("fileInput");
const result = document.getElementById("result");
const loader = document.getElementById("loader");

if(!fileInput.files.length){
alert("Please select a PDF file");
return;
}

loader.style.display = "block";
result.innerText = "";

const formData = new FormData();
formData.append("file", fileInput.files[0]);

try{

const response = await fetch("https://shayan-pdf-api-docker.onrender.com/pdf-to-word", {
method: "POST",
body: formData
});

if(!response.ok){
throw new Error("Server error during conversion");
}

const blob = await response.blob();

const url = window.URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = "converted.docx";
document.body.appendChild(a);
a.click();
a.remove();

window.URL.revokeObjectURL(url);

loader.style.display = "none";
result.innerText = "✅ Conversion successful! File downloaded.";

}catch(err){

loader.style.display = "none";
result.innerText = "❌ Error: " + err.message;

}

}

</script>

</body>
</html>
