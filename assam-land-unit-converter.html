<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assam Land Unit Converter 2026 | অসম ভূমি জোখৰ হিচাপ | Shayan Smart Tools</title>
    <link rel="canonical" href="https://shayansmarttools.in/assam-land-unit-converter.html" />
    
    <meta name="description" content="Accurate Assam Land Unit Converter 2026. Convert Bigha to Katha, Lessa, Square Feet, Acre, and Hectare instantly. Free tool by Shayan Smart Tools. অসম ভূমি জোখৰ হিচাপ।">
    <meta name="keywords" content="Assam Land Unit Converter, অসম ভূমি জোখৰ হিচাপ, Bigha to Katha Assam, Lessa to Sq Ft, 1 Bigha in Square Feet Assam, Land area calculator Assam, Shayan Smart Tools, Assam Revenue land units, মাটিৰ জোখমাখ">
    <meta name="author" content="Muksidul islam">
    <meta name="robots" content="index, follow">

    <style>
        :root { --as-green: #2e7d32; --as-gold: #ffc107; --bg: #f8fafc; --text-dark: #1e293b; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); padding: 20px; color: var(--text-dark); margin: 0; }
        .tool-wrapper { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--as-green); margin: 0; }
        
        .lang-flex { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .l-btn { padding: 8px 20px; border: 2px solid var(--as-green); background: white; border-radius: 50px; cursor: pointer; font-weight: bold; color: var(--as-green); }
        .l-btn.active { background: var(--as-green); color: white; }

        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 16px; }
        .calc-btn { width: 100%; padding: 15px; background: var(--as-green); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; }
        
        /* Result Panel */
        .res-panel { display: none; background: #f0fdf4; border: 2px solid var(--as-green); padding: 25px; border-radius: 20px; margin-top: 30px; }
        .grid-results { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .res-box { background: white; padding: 15px; border-radius: 12px; border-left: 4px solid var(--as-green); }
        
        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        .act-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        
        /* SEO Article */
        .seo-wrapper { margin-top: 50px; line-height: 1.8; }
        @media print { .no-print { display: none; } .res-panel { border: 2px solid #000; } }
    </style>
</head>
<body>

<div class="tool-wrapper">
    <header>
        <h1 id="mainH1">Assam Land Unit Converter</h1>
        <p id="subP">Convert Bigha, Katha, and Lessa easily.</p>
    </header>

    <div class="lang-flex">
        <button class="l-btn active" id="btnEn" onclick="setLang('en')">English</button>
        <button class="l-btn" id="btnAs" onclick="setLang('as')">অসমীয়া</button>
    </div>

    <label id="lblInput">Enter Bigha</label>
    <input type="number" id="bighaInput" placeholder="0.00">
    <button class="calc-btn" onclick="calculate()" id="btnCalc">Convert Now</button>

    <div id="resPanel" class="res-panel">
        <div style="text-align: center; font-weight: bold; font-size: 20px;" id="resTitle">Result:</div>
        <div class="grid-results">
            <div class="res-box"><span id="lKatha">Katha</span>: <b id="resKatha">0</b></div>
            <div class="res-box"><span id="lLessa">Lessa</span>: <b id="resLessa">0</b></div>
            <div class="res-box">Sq. Feet: <b id="resSqft">0</b></div>
            <div class="res-box">Sq. Meter: <b id="resSqm">0</b></div>
            <div class="res-box">Acre: <b id="resAcre">0</b></div>
            <div class="res-box">Hectare: <b id="resHectare">0</b></div>
        </div>
        <div class="action-btns no-print">
            <button class="act-btn" style="background:#64748b;" onclick="copyData()">Copy</button>
            <button class="act-btn" style="background:#25d366;" onclick="shareWA()">WhatsApp</button>
            <button class="act-btn" style="background:#3b82f6;" onclick="window.print()">Print</button>
        </div>
    </div>
</div>

<article class="seo-wrapper">
    <h2>Assam Land Measurement Guide (ভূমিৰ জোখমাখ)</h2>
    <p>Assam land measurement follows the Bigha-Katha-Lessa system. 1 Bigha = 5 Katha, and 1 Katha = 20 Lessa.</p>
</article>

<script>
    let cL = 'en';
    const dict = {
        en: { h1:"Assam Land Unit Converter", sub:"Convert Bigha, Katha, and Lessa easily.", lbl:"Enter Bigha", btn:"Convert Now", title:"Land Conversion Result", k:"Katha", l:"Lessa" },
        as: { h1:"অসম ভূমি জোখৰ হিচাপ", sub:"বিঘা, কথা আৰু লেচাৰ হিচাপ চাওক।", lbl:"বিঘা লিখক", btn:"হিচাপ কৰক", title:"ভূমি জোখৰ ফলাফল", k:"কথা", l:"লেচা" }
    };

    function setLang(l) {
        cL = l;
        document.getElementById('btnEn').classList.toggle('active', l==='en');
        document.getElementById('btnAs').classList.toggle('active', l==='as');
        document.getElementById('mainH1').innerText = dict[l].h1;
        document.getElementById('subP').innerText = dict[l].sub;
        document.getElementById('lblInput').innerText = dict[l].lbl;
        document.getElementById('btnCalc').innerText = dict[l].btn;
        document.getElementById('resTitle').innerText = dict[l].title;
        document.getElementById('lKatha').innerText = dict[l].k;
        document.getElementById('lLessa').innerText = dict[l].l;
    }

    function calculate() {
        let b = parseFloat(document.getElementById('bighaInput').value);
        if(!b) { alert("Enter valid value"); return; }
        
        let sqft = b * 14400;
        document.getElementById('resKatha').innerText = (b * 5).toFixed(2);
        document.getElementById('resLessa').innerText = (b * 100).toFixed(0);
        document.getElementById('resSqft').innerText = sqft.toLocaleString();
        document.getElementById('resSqm').innerText = (sqft / 10.764).toFixed(2);
        document.getElementById('resAcre').innerText = (sqft / 43560).toFixed(4);
        document.getElementById('resHectare').innerText = (sqft / 107639).toFixed(4);
        document.getElementById('resPanel').style.display = 'block';
    }

    function copyData() { navigator.clipboard.writeText("Assam Land Result: " + bighaInput.value + " Bigha converted."); alert("Copied!"); }
    function shareWA() { window.open("https://wa.me/?text=Check my land calculation on Shayan Smart Tools!"); }
</script>

</body>
</html>
