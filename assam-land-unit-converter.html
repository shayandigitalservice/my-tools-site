<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assam Land Area Calculator 2026 | অসম ভূমি জোখৰ হিচাপ | Shayan Smart Tools</title>
    <link rel="canonical" href="https://shayansmarttools.in/assam-land-calculator.html" />
    
    <meta name="description" content="Official Assam Land Area Calculator 2026. Calculate length and width instantly into Bigha, Katha, Lessa, and Square Feet accurately. Free tool by Shayan Smart Tools. অসম ভূমি জোখৰ হিচাপ।">
    <meta name="keywords" content="Assam Land Area Calculator, অসম ভূমি জোখৰ হিচাপ, Bigha to Katha Converter, Lessa to Sq Ft Assam, Assam Land Records, Shayan Smart Tools Assam, Land measurement Assam, মাটিৰ জোখমাখ">
    <meta name="author" content="Muksidul islam">
    <meta name="robots" content="index, follow">

    <style>
        :root { --as-green: #2e7d32; --as-gold: #ffc107; --bg: #f8fafc; --text-dark: #334155; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); padding: 20px; color: var(--text-dark); margin: 0; }
        .tool-wrapper { max-width: 900px; margin: 0 auto; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        header { background: linear-gradient(135deg, var(--as-green), #1b5e20); color: white; padding: 40px 20px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
        .lang-flex { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .l-btn { padding: 10px 25px; border: 2px solid var(--as-green); background: white; border-radius: 50px; cursor: pointer; font-weight: 700; color: var(--as-green); }
        .l-btn.active { background: var(--as-green); color: white; }
        input, select { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; margin: 10px 0; }
        .calc-btn { width: 100%; padding: 18px; background: var(--as-green); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; }
        .res-panel { display: none; background: #0f172a; color: white; padding: 25px; border-radius: 25px; margin-top: 30px; border: 2px solid var(--as-gold); }
        .grid-results { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .res-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border-left: 4px solid var(--as-gold); }
        .action-btns { display: flex; gap: 12px; margin-top: 25px; }
        .act-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; cursor: pointer; color: white; font-weight: 800; }
        @media print { .no-print, .lang-flex, .calc-btn, .action-btns { display: none !important; } .res-panel { display: block !important; background: white !important; color: black !important; border: 2px solid #000 !important; } }
    </style>
</head>
<body>

<div class="tool-wrapper">
    <header>
        <h1 id="mainH1">Assam Land Area Calculator</h1>
        <p id="subP">Professional Bigha, Katha, Lessa Converter for Assam Land Records.</p>
    </header>

    <div class="lang-flex">
        <button class="l-btn active" id="btnEn" onclick="setLang('en')">English</button>
        <button class="l-btn" id="btnAs" onclick="setLang('as')">অসমীয়া</button>
    </div>

    <input type="number" id="len" placeholder="Length (e.g. 100)">
    <input type="number" id="wid" placeholder="Width (e.g. 100)">
    <select id="unit"><option value="ft">Feet</option><option value="mt">Meter</option></select>
    <button class="calc-btn" onclick="calculateAssam()" id="btnCalc">Calculate Assam Land</button>

    <div id="resPanel" class="res-panel">
        <div style="text-align:center; color:var(--as-gold); font-size:24px; font-weight:bold;">SHAYAN SMART TOOLS</div>
        <div class="grid-results">
            <div class="res-box"><span id="lBigha">Bigha</span>: <b id="rBigha">0</b></div>
            <div class="res-box"><span id="lKatha">Katha</span>: <b id="rKatha">0</b></div>
            <div class="res-box">Lessa: <b id="rLessa">0</b></div>
            <div class="res-box">Sq. Feet: <b id="rSqft">0</b></div>
            <div class="res-box">Acre: <b id="rAcre">0</b></div>
            <div class="res-box">Hectare: <b id="rHc">0</b></div>
        </div>
        <div class="action-btns no-print">
            <button class="act-btn" style="background:#475569;" onclick="copyData()">Copy</button>
            <button class="act-btn" style="background:#22c55e;" onclick="window.open('https://wa.me/?text=My Land Calculation Result from Shayan Smart Tools')">WhatsApp</button>
            <button class="act-btn" style="background:#2b7cff;" onclick="window.print()">Print</button>
        </div>
    </div>
</div>

<script>
    let cL = 'en';
    const dict = {
        en: { h1:"Assam Land Area Calculator", sub:"Professional Bigha, Katha, Lessa Converter.", lbl:"Calculate Assam Land", b:"Bigha", k:"Katha" },
        as: { h1:"অসম ভূমি জোখৰ হিচাপ", sub:"বিঘা, কথা আৰু লেচাৰ হিচাপ চাওক।", lbl:"হিচাপ কৰক", b:"বিঘা", k:"কথা" }
    };

    function setLang(l) {
        cL = l;
        document.getElementById('mainH1').innerText = dict[l].h1;
        document.getElementById('subP').innerText = dict[l].sub;
        document.getElementById('btnCalc').innerText = dict[l].lbl;
        document.getElementById('lBigha').innerText = dict[l].b;
        document.getElementById('lKatha').innerText = dict[l].k;
    }

    function calculateAssam() {
        let l = parseFloat(document.getElementById('len').value);
        let w = parseFloat(document.getElementById('wid').value);
        let u = document.getElementById('unit').value;
        if(!l || !w) { alert("Please enter values"); return; }
        let sqft = (u === 'ft') ? (l * w) : (l * w * 10.764);
        
        document.getElementById('rBigha').innerText = (sqft / 14400).toFixed(4);
        document.getElementById('rKatha').innerText = (sqft / 2880).toFixed(2);
        document.getElementById('rLessa').innerText = (sqft / 144).toFixed(0);
        document.getElementById('rSqft').innerText = sqft.toFixed(2);
        document.getElementById('rAcre').innerText = (sqft / 43560).toFixed(4);
        document.getElementById('rHc').innerText = (sqft / 107639).toFixed(4);
        document.getElementById('resPanel').style.display = 'block';
    }
    
    function copyData() { navigator.clipboard.writeText("Assam Land Result from Shayan Smart Tools"); alert("Copied!"); }
</script>

</body>
</html>
