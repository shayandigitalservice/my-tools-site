<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assam Land Unit Converter</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .converter-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .info-box {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #2e7d32;
            margin-top: 20px;
        }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="converter-card">
    <h2>Assam Land Unit Converter</h2>
    
    <div class="input-group">
        <label>Bigha</label>
        <input type="number" id="bigha" placeholder="Enter Bigha" oninput="convertFrom('bigha')">
    </div>

    <div class="input-group">
        <label>Katha</label>
        <input type="number" id="katha" placeholder="Enter Katha" oninput="convertFrom('katha')">
    </div>

    <div class="input-group">
        <label>Lessa</label>
        <input type="number" id="lessa" placeholder="Enter Lessa" oninput="convertFrom('lessa')">
    </div>

    <div class="input-group">
        <label>Square Feet (sq ft)</label>
        <input type="number" id="sqft" placeholder="Total Sq. Ft" oninput="convertFrom('sqft')">
    </div>

    <div class="info-box">
        <strong>Unit Standard (Assam):</strong><br>
        1 Bigha = 5 Katha | 1 Katha = 20 Lessa<br>
        1 Lessa = 144 sq ft | 1 Bigha = 14,400 sq ft
    </div>

    <a href="index.html" class="back-home">← Back to Dashboard</a>
</div>

<script>
    function convertFrom(unit) {
        const bighaInp = document.getElementById('bigha');
        const kathaInp = document.getElementById('katha');
        const lessaInp = document.getElementById('lessa');
        const sqftInp = document.getElementById('sqft');

        let totalSqFt = 0;

        if (unit === 'bigha') {
            totalSqFt = bighaInp.value * 14400;
        } else if (unit === 'katha') {
            totalSqFt = kathaInp.value * 2880;
        } else if (unit === 'lessa') {
            totalSqFt = lessaInp.value * 144;
        } else if (unit === 'sqft') {
            totalSqFt = sqftInp.value;
        }

        if (unit !== 'sqft') sqftInp.value = totalSqFt || "";
        if (unit !== 'bigha') bighaInp.value = totalSqFt ? (totalSqFt / 14400).toFixed(4) : "";
        if (unit !== 'katha') kathaInp.value = totalSqFt ? (totalSqFt / 2880).toFixed(4) : "";
        if (unit !== 'lessa') lessaInp.value = totalSqFt ? (totalSqFt / 144).toFixed(2) : "";

        if (!totalSqFt) {
            bighaInp.value = kathaInp.value = lessaInp.value = sqftInp.value = "";
        }
    }
</script>

</body>
</html>
