<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assam Land Unit Converter</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            color: #2e7d32;
            margin-bottom: 25px;
        }

        .converter-wrapper {
            width: 100%;
            max-width: 400px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }

        /* Convert Button Styling */
        .btn-convert {
            width: 100%;
            padding: 15px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .btn-convert:hover {
            background-color: #1b5e20;
        }

        /* Result Section Styling */
        .result-section {
            border-top: 2px solid #eee;
            padding-top: 20px;
            display: none; /* Shuru mein chhupa rahega */
        }

        .result-item {
            margin-bottom: 10px;
            font-size: 16px;
            color: #333;
        }

        .result-item b {
            color: #2e7d32;
        }

        .back-link {
            margin-top: 30px;
            text-decoration: none;
            color: #2e7d32;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>

    <h2>Assam Land Unit Converter</h2>

    <div class="converter-wrapper">
        <div class="input-group">
            <label>Enter Bigha</label>
            <input type="number" id="bighaInput" placeholder="Bigha amount karein...">
        </div>

        <button class="btn-convert" onclick="processConversion()">Convert Now</button>

        <div id="resultArea" class="result-section">
            <div class="result-item">Katha: <b id="resKatha">0</b></div>
            <div class="result-item">Lessa: <b id="resLessa">0</b></div>
            <div class="result-item">Square Feet: <b id="resSqft">0</b></div>
            <div class="result-item">Square Meter: <b id="resSqm">0</b></div>
            <div class="result-item">Acre: <b id="resAcre">0</b></div>
            <div class="result-item">Hectare: <b id="resHectare">0</b></div>
        </div>

        <a href="index.html" class="back-link">← Back to Dashboard</a>
    </div>

<script>
    function processConversion() {
        const bigha = document.getElementById('bighaInput').value;
        const resultArea = document.getElementById('resultArea');

        if (bigha === "" || bigha <= 0) {
            alert("Please enter a valid Bigha amount");
            return;
        }

        // Calculation (Based on 1 Bigha = 14400 sq ft)
        let totalSqft = bigha * 14400;

        document.getElementById('resKatha').innerText = (bigha * 5).toFixed(2);
        document.getElementById('resLessa').innerText = (bigha * 100).toFixed(2);
        document.getElementById('resSqft').innerText = totalSqft.toLocaleString();
        document.getElementById('resSqm').innerText = (totalSqft / 10.764).toFixed(2);
        document.getElementById('resAcre').innerText = (totalSqft / 43560).toFixed(4);
        document.getElementById('resHectare').innerText = (totalSqft / 107639).toFixed(4);

        // Result dikhane ke liye
        resultArea.style.display = "block";
    }
</script>

</body>
</html>
