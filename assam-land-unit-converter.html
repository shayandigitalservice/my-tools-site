<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assam Land Unit Converter</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #ffffff; /* Bilkul safed background */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            color: #2e7d32;
            margin-bottom: 20px;
            text-align: center;
        }

        .converter-wrapper {
            width: 100%;
            max-width: 400px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px; /* Simple corners */
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus {
            outline: 2px solid #2e7d32;
            border-color: transparent;
        }

        .info-text {
            margin-top: 25px;
            font-size: 14px;
            color: #555;
            line-height: 1.6;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .back-link {
            margin-top: 30px;
            text-decoration: none;
            color: #2e7d32;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>

    <h2>Assam Land Unit Converter</h2>

    <div class="converter-wrapper">
        <div class="input-group">
            <label>Bigha</label>
            <input type="number" id="bigha" oninput="convert('bigha')">
        </div>

        <div class="input-group">
            <label>Katha</label>
            <input type="number" id="katha" oninput="convert('katha')">
        </div>

        <div class="input-group">
            <label>Lessa</label>
            <input type="number" id="lessa" oninput="convert('lessa')">
        </div>

        <div class="input-group">
            <label>Square Feet</label>
            <input type="number" id="sqft" oninput="convert('sqft')">
        </div>

        <div class="input-group">
            <label>Square Meter</label>
            <input type="number" id="sqmeter" oninput="convert('sqmeter')">
        </div>

        <div class="input-group">
            <label>Acre</label>
            <input type="number" id="acre" oninput="convert('acre')">
        </div>

        <div class="input-group">
            <label>Hectare</label>
            <input type="number" id="hectare" oninput="convert('hectare')">
        </div>

        <div class="info-text">
            <b>Assam Standard:</b> 1 Bigha = 14400 sq ft | 1 Katha = 2880 sq ft | 1 Lessa = 144 sq ft
        </div>

        <a href="index.html" class="back-link">← Back to Dashboard</a>
    </div>

<script>
    function convert(unit) {
        const b = document.getElementById('bigha');
        const k = document.getElementById('katha');
        const l = document.getElementById('lessa');
        const s = document.getElementById('sqft');
        const m = document.getElementById('sqmeter');
        const ac = document.getElementById('acre');
        const he = document.getElementById('hectare');

        let val = 0;

        if (unit === 'bigha') val = b.value * 14400;
        else if (unit === 'katha') val = k.value * 2880;
        else if (unit === 'lessa') val = l.value * 144;
        else if (unit === 'sqft') val = s.value;
        else if (unit === 'sqmeter') val = m.value * 10.7639;
        else if (unit === 'acre') val = ac.value * 43560;
        else if (unit === 'hectare') val = he.value * 107639;

        if (val > 0) {
            if (unit !== 'bigha') b.value = (val / 14400).toFixed(4);
            if (unit !== 'katha') k.value = (val / 2880).toFixed(4);
            if (unit !== 'lessa') l.value = (val / 144).toFixed(2);
            if (unit !== 'sqft') s.value = parseFloat(val).toFixed(2);
            if (unit !== 'sqmeter') m.value = (val / 10.7639).toFixed(2);
            if (unit !== 'acre') ac.value = (val / 43560).toFixed(6);
            if (unit !== 'hectare') he.value = (val / 107639).toFixed(6);
        } else {
            b.value = k.value = l.value = s.value = m.value = ac.value = he.value = "";
        }
    }
</script>

</body>
</html>
