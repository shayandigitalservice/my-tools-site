<!DOCTYPE html>
<html>
<head>

<title>PDF to Word Converter</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f1f5f9;
color:#222;
}

.header{
background:#2563eb;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:600;
}

.container{
max-width:700px;
margin:30px auto;
padding:20px;
background:white;
border-radius:10px;
border:1px solid #ddd;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
width:100%;
}

button:hover{
background:#1e40af;
}

.result{
margin-top:20px;
padding:20px;
background:#eff6ff;
border:1px solid #2563eb;
border-radius:8px;
text-align:center;
}

.highlight{
background:#2563eb;
color:white;
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">
📄 PDF to Word Converter
</div>

<div class="container">

<h2>Convert PDF to Word</h2>

<input type="file" id="file" accept=".pdf">

<button onclick="convert()">Convert to Word</button>

<div id="result" class="result"></div>

</div>

<script>

async function convert(){

let file = document.getElementById("file").files[0];

if(!file){
alert("Please select PDF file");
return;
}

document.getElementById("result").innerHTML =
"<div class='highlight'>Uploading & Converting... ⏳</div>";

let formData = new FormData();
formData.append("file", file);

try{

let res = await fetch("https://shayan-pdf-api-docker.onrender.com/pdf-to-word", {
method: "POST",
body: formData
});

if(!res.ok){
document.getElementById("result").innerHTML =
"<div class='highlight'>Error: "+res.status+" ❌</div>";
return;
}

let blob = await res.blob();

let link = document.createElement("a");
link.href = window.URL.createObjectURL(blob);
link.download = "converted.docx";
link.click();

document.getElementById("result").innerHTML =
"<div class='highlight'>✅ Word File Downloaded</div>";

}catch(err){
document.getElementById("result").innerHTML =
"<div class='highlight'>Error occurred ❌</div>";
}

}

</script>

</body>
</html>
