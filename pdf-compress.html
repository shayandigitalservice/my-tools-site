<!DOCTYPE html>
<html>
<head>

<title>Advanced PDF Compressor 2026 – Smart Accurate Tool</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f1f5f9;color:#222;}

.header{
background:#2563eb;
color:white;
text-align:center;
padding:20px;
font-size:26px;
font-weight:600;
}

.container{
max-width:700px;
margin:30px auto;
padding:20px;
background:white;
border-radius:10px;
border:1px solid #ddd;
}

input, select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
width:100%;
margin-top:10px;
}

button:hover{background:#1e40af;}

.result{
margin-top:20px;
padding:20px;
background:#eff6ff;
border:1px solid #2563eb;
border-radius:8px;
}

canvas{
width:100%;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
}

.highlight{
background:#2563eb;
color:white;
padding:10px;
border-radius:6px;
text-align:center;
margin-top:10px;
}
</style>

</head>

<body>

<div class="header">
📄 Smart PDF Compressor (Accurate)
</div>

<div class="container">

<h2>Compress PDF with Target Size</h2>

<input type="file" id="upload" accept="application/pdf">

<label>Target Size</label>
<input type="number" id="size" value="900">

<select id="unit">
<option value="kb">KB</option>
<option value="mb">MB</option>
</select>

<button onclick="compressPDF()">Compress & Preview</button>
<button onclick="downloadPDF()">Download PDF</button>

<div id="result" class="result"></div>

</div>

<script>

const { jsPDF } = window.jspdf;
let finalBlob = null;

async function compressPDF(){

let file = document.getElementById("upload").files[0];
let size = document.getElementById("size").value;
let unit = document.getElementById("unit").value;
let result = document.getElementById("result");

if(!file){
alert("Upload PDF first");
return;
}

// ❗ prevent wrong input
let target = unit === "mb" ? size*1024*1024 : size*1024;

if(target > file.size){
alert("Target size original se bada hai. Compression possible nahi.");
return;
}

result.innerHTML = "Processing... ⏳";

let buffer = await file.arrayBuffer();
let pdf = await pdfjsLib.getDocument({data:buffer}).promise;

// 🔥 smart variables
let minQ = 0.3, maxQ = 1.0;
let minScale = 0.3, maxScale = 1.0;
let blob;

// 🔁 binary + scale loop
for(let attempt=0; attempt<8; attempt++){

let quality = (minQ + maxQ) / 2;
let scale = (minScale + maxScale) / 2;

let newPdf = new jsPDF();

for(let i=1;i<=pdf.numPages;i++){

let page = await pdf.getPage(i);
let viewport = page.getViewport({scale:scale});

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({canvasContext:ctx, viewport}).promise;

let img = canvas.toDataURL("image/jpeg", quality);

let w = 210;
let h = (canvas.height * w) / canvas.width;

if(i>1) newPdf.addPage();
newPdf.addImage(img,"JPEG",0,0,w,h);
}

blob = newPdf.output("blob");

// 🎯 decision
if(blob.size > target){
maxQ = quality;
maxScale = scale;
}else{
minQ = quality;
minScale = scale;
}

}

finalBlob = blob;

// 👀 preview (stable)
result.innerHTML = "<h3>👀 Preview</h3>";

for(let i=1;i<=pdf.numPages;i++){

let page = await pdf.getPage(i);
let viewport = page.getViewport({scale:0.5});

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({canvasContext:ctx, viewport}).promise;

result.appendChild(canvas);
}

// 📊 size info
let finalKB = (blob.size/1024).toFixed(2);
let targetKB = (target/1024).toFixed(2);
let match = ((finalKB/targetKB)*100).toFixed(1);

result.innerHTML += `
<div class="highlight">
Target: ${targetKB} KB<br>
Output: ${finalKB} KB<br>
Accuracy: ${match}% ✅
</div>
`;

}

function downloadPDF(){

if(!finalBlob){
alert("Compress first!");
return;
}

let link = document.createElement("a");
link.href = URL.createObjectURL(finalBlob);
link.download = "compressed.pdf";
link.click();

}

</script>

</body>
</html>
