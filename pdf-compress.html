<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF Compressor Tool – Reduce PDF Size Online Free</title>

<meta name="description" content="Compress PDF online free. Reduce PDF file size quickly for email, upload and sharing. Fast, secure and mobile friendly PDF compressor tool.">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{ background:#f1f5f9; color:#222; }
.header{ background:#2563eb; color:white; text-align:center; padding:20px; font-size:26px; font-weight:600; }
.container{ max-width:700px; margin:30px auto; padding:20px; background:white; border-radius:10px; border:1px solid #ddd; }
input,select{ width:100%; padding:12px; margin:10px 0; border-radius:6px; border:1px solid #ccc; font-size:14px; }
button{ background:#2563eb; color:white; border:none; padding:12px; border-radius:6px; cursor:pointer; width:100%; font-size:15px; }
button:hover{ background:#1e40af; }
.result{ margin-top:20px; padding:20px; background:#eff6ff; border:1px solid #2563eb; border-radius:8px; display:none; }
.result-box{ display:flex; justify-content:space-between; background:white; padding:10px; margin:6px 0; border-radius:6px; border:1px solid #ddd; }
.section{ max-width:900px; margin:30px auto; padding:25px; background:white; border-radius:10px; border:1px solid #ddd; line-height:1.7; }
h2{ margin-bottom:10px; color:#1e3a8a; }
a{ color:#2563eb; text-decoration:none; }
.download{ display:none; margin-top:10px; background:#16a34a; }
#status-text { text-align: center; color: #2563eb; font-weight: 600; margin-top: 10px; }
</style>
</head>
<body>

<div class="header">📦 PDF Compressor Tool</div>

<div class="container">
<h2>Compress Your PDF</h2>
<input type="file" id="pdfFile" accept="application/pdf">
<input type="number" id="sizeInput" placeholder="Enter size (example 200)">
<select id="unit">
<option value="kb">KB</option>
<option value="mb">MB</option>
</select>

<button id="mainBtn" onclick="compressPDF()">Compress PDF</button>
<div id="status-text"></div>
<button class="download" id="downloadBtn">Download PDF</button>

<div id="result" class="result"></div>
<br>
<a href="index.html">⬅ Back to Home</a>
</div>

<div class="section">
<h1>PDF Compressor Tool – Reduce PDF File Size Online Free</h1>
<p>The <strong>PDF Compressor Tool</strong> is a fast, secure, and powerful online utility...</p>
</div>

<script>
let downloadUrl = null;

function formatSize(bytes){
    if(bytes > 1048576) return (bytes/1048576).toFixed(2) + " MB";
    return (bytes/1024).toFixed(2) + " KB";
}

async function compressPDF(){
    const fileInput = document.getElementById("pdfFile");
    const file = fileInput.files[0];
    const btn = document.getElementById("mainBtn");
    const status = document.getElementById("status-text");

    if(!file) return alert("Upload PDF first");

    btn.disabled = true;
    status.innerText = "⏳ Server is compressing... Please wait.";

    const formData = new FormData();
    formData.append("file", file);

    try {
        // REPLACE THIS URL WITH YOUR ACTUAL RENDER URL
        const response = await fetch('https://shayan-pdf-api-1.onrender.com/compress', {
            method: 'POST',
            body: formData
        });

        if (!response.ok) throw new Error("Compression failed");

        const blob = await response.blob();
        downloadUrl = window.URL.createObjectURL(blob);

        document.getElementById("result").style.display = "block";
        document.getElementById("result").innerHTML = 
            "<h3>Compression Result</h3>" +
            "<div class='result-box'><span>Original Size</span><span>"+formatSize(file.size)+"</span></div>" +
            "<div class='result-box'><span>Compressed Size</span><span>"+formatSize(blob.size)+"</span></div>";

        document.getElementById("downloadBtn").style.display = "block";
        status.innerText = "✅ Done!";
    } catch (err) {
        alert("Server Error! Check if your Render backend is live.");
        status.innerText = "❌ Failed.";
    } finally {
        btn.disabled = false;
    }
}

document.getElementById("downloadBtn").onclick = function(){
    const a = document.createElement("a");
    a.href = downloadUrl;
    a.download = "compressed_shayan_tools.pdf";
    a.click();
}
</script>

</body>
</html>
