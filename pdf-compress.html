<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced PDF Compressor – Shayan Smart Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f1f5f9;color:#222;}
.header{background:#2563eb;color:white;text-align:center;padding:25px;font-size:28px;font-weight:600;}
.container{max-width:650px;margin:40px auto;padding:30px;background:white;border-radius:12px;}
h2{text-align:center;margin-bottom:15px;color:#1e3a8a;}
input,select{width:100%;padding:14px;margin:12px 0;border-radius:8px;border:1px solid #cbd5e1;}
button{background:#2563eb;color:white;border:none;padding:15px;border-radius:8px;width:100%;cursor:pointer;}
button:disabled{background:#94a3b8;}
.status-box{text-align:center;margin-top:15px;}
.loading{color:#2563eb;font-weight:600;}
.error{color:#dc2626;font-weight:600;}
.success{color:#16a34a;font-weight:600;}
.result{margin-top:25px;padding:20px;background:#f8fafc;border:2px dashed #2563eb;border-radius:10px;display:none;}
.download-btn{background:#16a34a;margin-top:20px;display:block;text-align:center;padding:12px;color:white;text-decoration:none;border-radius:8px;}
</style>
</head>

<body>

<div class="header">📦 Shayan PDF Compressor</div>

<div class="container">
<h2>Compress Your PDF</h2>

<input type="file" id="pdfFile" accept="application/pdf">

<div style="display:flex;gap:10px;">
<input type="number" id="sizeInput" placeholder="Target size (optional)">
<select id="unit">
<option value="kb">KB</option>
<option value="mb">MB</option>
</select>
</div>

<button id="mainBtn" onclick="compressPDF()">Compress PDF Now</button>

<div id="status" class="status-box"></div>

<div id="result" class="result">
<div>Original: <span id="oldSize"></span></div>
<div>Compressed: <span id="newSize"></span></div>
<a id="dlLink" class="download-btn">Download PDF</a>
</div>
</div>

<script>
let downloadUrl = null;

function formatSize(bytes){
return bytes>=1048576 ? (bytes/1048576).toFixed(2)+" MB" : (bytes/1024).toFixed(2)+" KB";
}

async function compressPDF(){
const file = document.getElementById("pdfFile").files[0];
const btn = document.getElementById("mainBtn");
const status = document.getElementById("status");
const result = document.getElementById("result");

if(!file) return alert("Please select a PDF file!");

btn.disabled = true;
btn.innerHTML = "⏳ Compressing...";
status.innerHTML = '<span class="loading">Processing... Please wait</span>';
result.style.display = "none";

const formData = new FormData();
formData.append("file", file);

try{

// ✅ FIXED BACKEND URL
const res = await fetch("https://shayan-pdf-api-docker.onrender.com/run/compress",{
method:"POST",
body:formData
});

if(!res.ok) throw new Error();

const blob = await res.blob();

// Memory cleanup
if(downloadUrl){
URL.revokeObjectURL(downloadUrl);
}

downloadUrl = URL.createObjectURL(blob);

document.getElementById("oldSize").innerText = formatSize(file.size);
document.getElementById("newSize").innerText = formatSize(blob.size);

const link = document.getElementById("dlLink");
link.href = downloadUrl;
link.download = "compressed.pdf";

result.style.display = "block";
status.innerHTML = '<span class="success">✅ Compression Done!</span>';

// Auto download
link.click();

}catch(e){
status.innerHTML = '<span class="error">❌ Server slow / error. Try again</span>';
}finally{
btn.disabled = false;
btn.innerHTML = "Compress PDF Now";
}
}
</script>

</body>
</html>
