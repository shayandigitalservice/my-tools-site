<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Bill Generator – Free Online Invoice & Mini POS Tool</title>
<meta name="description" content="Shop Bill Generator is a free online POS tool for shopkeepers. Generate invoices, calculate totals, track sales, and share bills via WhatsApp easily.">
<meta name="keywords" content="Shop Bill Generator, Online Invoice Generator, Mini POS, Free Billing Tool, Shop Invoice, WhatsApp Invoice, Retail Billing, POS for Shopkeepers">
<meta property="og:title" content="Shop Bill Generator – Free Online Invoice & Mini POS Tool">
<meta property="og:description" content="Generate shop bills instantly, calculate totals, track daily sales, and share invoices via WhatsApp with the free Shop Bill Generator tool.">
<style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:10px;}
.container{max-width:500px;margin:auto;background:white;padding:15px;border-radius:10px;}
h2{text-align:center;}
input, select{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;}
button{width:100%;padding:10px;margin:6px 0;border:none;border-radius:6px;background:#2563eb;color:white;font-size:15px;cursor:pointer;}
table{width:100%;margin-top:10px;border-collapse:collapse;}
th,td{border:1px solid #000;padding:8px;font-size:14px;text-align:center;}
.totalRow td{font-weight:bold;}
.bill{margin-top:20px;}
.invoice{float:right;}
.clear{clear:both;}
@media screen and (max-width:600px){
table th, table td{padding:6px;font-size:12px;}
button{font-size:13px;padding:8px;}
}
</style>
</head>
<body>
<div class="container">
<h2>🧾 Bill Generator</h2>

<!-- Shop Details -->
<input id="shop" placeholder="Shop Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone">
<button onclick="saveShop()">Save Shop Details</button>

<!-- Customer & Items -->
<input id="customer" placeholder="Customer Name">

<!-- Product Search + Dropdown -->
<input id="productSearch" placeholder="Search Product">
<select id="productDropdown"></select>

<input id="qty" type="number" placeholder="Qty">
<input id="price" type="number" placeholder="Price">
<button onclick="addItem()">Add Item</button>

<table id="table">
<tr><th>No</th><th>Product</th><th>Qty</th><th>Price</th><th>Total</th></tr>
</table>

<!-- Payment Mode -->
<select id="payment">
  <option value="Cash">Cash</option>
  <option value="UPI">UPI</option>
  <option value="Card">Card</option>
</select>

<!-- Generate & Print -->
<button onclick="generateBill()">Generate Bill</button>
<select id="printMode">
<option value="A4">Print A4</option>
<option value="Receipt" selected>Print Receipt</option>
<option value="Custom">Custom Width</option>
</select>
<button onclick="printBill()">Print Bill</button>
<button onclick="sendWhatsApp()">Send WhatsApp</button>

<!-- Bill Display -->
<div id="bill" class="bill"></div>
<button onclick="downloadHistory()">Download History</button>
<div id="totalDay"></div>

<hr>
<h2>📦 Stock Management</h2>

<!-- Add Stock -->
<input id="stockProduct" placeholder="Product Name">
<input id="stockQty" type="number" placeholder="Quantity to Add">
<button onclick="addStock()">Add Stock</button>

<!-- Stock Table -->
<table id="stockTable">
<tr><th>Product</th><th>Available Qty</th><th>Last Updated</th></tr>
</table>

<!-- Stock Download -->
<button onclick="downloadStockExcel()">Download Stock Excel</button>

<hr>
</div>

<script>
// ================== GLOBAL DATA ==================
let items=[];
let total=0;
let invoiceCounter = localStorage.getItem("invoiceCounter")||1;

// Stock
let stock = JSON.parse(localStorage.getItem("stock"))||{};
let stockHistory = JSON.parse(localStorage.getItem("stockHistory"))||[];

// ================== SHOP DETAILS ==================
function saveShop(){
    localStorage.setItem("shop",shop.value);
    localStorage.setItem("address",address.value);
    localStorage.setItem("phone",phone.value);
    alert("Saved");
}
shop.value=localStorage.getItem("shop")||"";
address.value=localStorage.getItem("address")||"";
phone.value=localStorage.getItem("phone")||"";

// ================== STOCK MANAGEMENT ==================
function addStock(){
    let p = stockProduct.value.trim();
    let q = +stockQty.value;
    if(!p || !q){ alert("Fill all fields"); return; }

    if(stock[p]) stock[p] += q;
    else stock[p] = q;

    stockHistory.push({product:p, qtyAdded:q, type:"Added", date:new Date().toISOString()});
    localStorage.setItem("stock", JSON.stringify(stock));
    localStorage.setItem("stockHistory", JSON.stringify(stockHistory));

    stockProduct.value=""; stockQty.value="";
    renderStock();
    renderProductDropdown();
}

function renderStock(){
    let table = document.getElementById("stockTable");
    table.innerHTML = `<tr><th>Product</th><th>Available Qty</th><th>Last Updated</th></tr>`;
    for(let p in stock){
        let updates = stockHistory.filter(h=>h.product===p);
        let lastUpdate = updates[updates.length-1]?.date||"";
        let color = stock[p]<=5 ? "red" : "green";
        let row = table.insertRow();
        row.insertCell(0).innerHTML = p + (stock[p]<=5 ? " ⚠ Low Stock" : "");
        row.insertCell(1).innerHTML = `<span style="color:${color}">${stock[p]}</span>`;
        row.insertCell(2).innerText = new Date(lastUpdate).toLocaleString();
    }
}
renderStock();

// ================== PRODUCT DROPDOWN + SEARCH ==================
function renderProductDropdown(){
    let dropdown = document.getElementById("productDropdown");
    dropdown.innerHTML = "";
    let productList = [...new Set(Object.keys(stock))]; // stock keys
    productList.forEach(p=>{
        let option = document.createElement("option");
        option.value = p;
        option.text = p;
        dropdown.appendChild(option);
    });
}
renderProductDropdown();

let productSearch = document.getElementById("productSearch");
productSearch.addEventListener("input", function(){
    let val = this.value.toLowerCase();
    let dropdown = document.getElementById("productDropdown");
    let options = Array.from(dropdown.options);
    let match = options.find(o=>o.value.toLowerCase().includes(val));
    if(match) dropdown.value = match.value;
});

// ================== DOWNLOAD STOCK EXCEL ==================
function downloadStockExcel(){
    let html = `<table border="1">
    <tr><th>Product</th><th>Available Qty</th><th>Last Updated</th></tr>`;
    for(let p in stock){
        let updates = stockHistory.filter(h=>h.product===p);
        let lastUpdate = updates[updates.length-1]?.date||"";
        html += `<tr>
        <td>${p}</td>
        <td>${stock[p]}</td>
        <td>${new Date(lastUpdate).toLocaleString()}</td>
        </tr>`;
    }
    html += `</table>`;
    let blob = new Blob([html], {type:"application/vnd.ms-excel"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "stock.xlsx";
    a.click();
}

// ================== BILLING SYSTEM ==================
function addItem(){
    let p = document.getElementById("productDropdown").value.trim();
    let q = +qty.value;
    let pr = +price.value;
    if(!p || !q || !pr){alert("Fill all fields"); return;}

    if(stock[p]===undefined){ alert("Product not in stock"); return; }
    if(q>stock[p]){ alert(`Stock not sufficient for ${p}. Available: ${stock[p]}`); return; }

    // Reduce stock automatically
    stock[p] -= q;
    stockHistory.push({product:p, qtyAdded:-q, type:"Sold", date:new Date().toISOString()});
    localStorage.setItem("stock", JSON.stringify(stock));
    localStorage.setItem("stockHistory", JSON.stringify(stockHistory));
    renderStock();

    // Add to items table
    let t = q*pr;
    items.push({p,q,pr,t});
    let row=table.insertRow();
    row.insertCell(0).innerText=items.length;
    row.insertCell(1).innerText=p;
    row.insertCell(2).innerText=q;
    row.insertCell(3).innerText=pr;
    row.insertCell(4).innerText=t;
    productSearch.value=""; qty.value=""; price.value="";
}

// ================== INVOICE ==================
function getInvoiceNumber(){
    let num = invoiceCounter;
    invoiceCounter++;
    localStorage.setItem("invoiceCounter", invoiceCounter);
    return num;
}

function generateBill(){
    if(items.length===0){ alert("Add items first"); return; }
    let bill = document.getElementById("bill");
    total=0; items.forEach(i=> total+=i.t);
    let invoiceNo = getInvoiceNumber();
    let dateISO = new Date().toISOString();
    let paymentMode = document.getElementById("payment").value;

    let html=`<div class="invoice">Invoice No: ${invoiceNo}</div><div class="clear"></div>
    <b>${shop.value}</b><br>${address.value}<br>Phone: ${phone.value}<br>
    Date: ${new Date(dateISO).toLocaleString()}<br>
    Customer: ${customer.value}<br>
    Payment Mode: ${paymentMode}<hr>
    <table>
    <tr><th>No</th><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr>`;

    items.forEach((i,index)=>{
        html+=`<tr>
        <td>${index+1}</td>
        <td>${i.p}</td>
        <td>${i.q}</td>
        <td>${i.pr}</td>
        <td>${i.t}</td>
        </tr>`;
    });
    html+=`<tr class="totalRow">
    <td colspan="4">Grand Total</td>
    <td>₹${total}</td>
    </tr>
    </table>`;
    bill.innerHTML = html;

    // Save history
    let history = JSON.parse(localStorage.getItem("history"))||[];
    history.push({total:total,date:dateISO,invoice:invoiceNo,payment:paymentMode});
    localStorage.setItem("history",JSON.stringify(history));
    updateSaleReports();
}

// ================== PRINT BILL ==================
function printBill(){
    let content = document.getElementById("bill").innerHTML;
    let mode = document.getElementById("printMode").value;
    let width=400, height=600;
    if(mode=="A4"){width=800;height=1100;}
    else if(mode=="Custom"){
        width = parseInt(prompt("Enter width px","400"))||400;
        height = parseInt(prompt("Enter height px","600"))||600;
    }
    let win = window.open('','',`width=${width},height=${height}`);
    win.document.write(`<html><head><title>Print Bill</title>
    <style>
    body{font-family:monospace;padding:10px;}
    table{width:100%;border-collapse:collapse;}
    td,th{border:1px solid #000;padding:5px;text-align:center;}
    .totalRow td{font-weight:bold;}
    .invoice{float:right;}
    .clear{clear:both;}
    </style>
    </head><body>${content}</body></html>`);
    win.document.close();
    win.print();
}

// ================== WHATSAPP ==================
function sendWhatsApp(){
    let text="🧾 BILL RECEIPT\n\n"+bill.innerText;
    let url="https://wa.me/?text="+encodeURIComponent(text);
    window.open(url);
}

// ================== HISTORY ==================
function downloadHistory(){
    let history=JSON.parse(localStorage.getItem("history"))||[];
    let csv="Invoice,Payment,Total,Date\n";
    history.forEach(h=>{
        csv+=h.invoice+","+h.payment+","+h.total+","+h.date+"\n";
    });
    let blob = new Blob([csv]);
    let a=document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download="history.csv";
    a.click();
}

// ================== SALES REPORT ==================
function updateSaleReports(){
    let history=JSON.parse(localStorage.getItem("history"))||[];
    let today=new Date();
    let daily=0,weekly=0,monthly=0;
    history.forEach(h=>{
        let d = new Date(h.date);
        if(d.toDateString()===today.toDateString()) daily += h.total;
        let diffDays = (today-d)/(1000*60*60*24);
        if(diffDays<=7) weekly += h.total;
        if(today.getMonth()===d.getMonth() && today.getFullYear()===d.getFullYear()) monthly += h.total;
    });
    document.getElementById("totalDay").innerHTML=`<b>Daily: ₹${daily} | Weekly: ₹${weekly} | Monthly: ₹${monthly}</b>`;
}
updateSaleReports();

</script>
</body>
</html>
