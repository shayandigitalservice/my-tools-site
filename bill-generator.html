<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Bill Generator – Functional POS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{font-family:Arial;background:#ffffff;margin:0;padding:10px;}
.container{max-width:800px;margin:auto;background:transparent;padding:15px;border-radius:0;box-shadow:none;}
h2{text-align:center;}
input, select, button{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;box-sizing:border-box;}
button{border:none;background:#2563eb;color:white;font-size:15px;cursor:pointer;}
table{width:100%;margin-top:10px;border-collapse:collapse;}
th,td{border:1px solid #000;padding:8px;font-size:14px;text-align:center;}
.totalRow td{font-weight:bold;}
.bill{margin-top:20px; overflow-wrap: break-word; word-wrap: break-word;}
.invoice{float:right;}
.clear{clear:both;}
.qr-container{text-align:center; margin-top:15px; padding:10px; border:1px dashed #ccc;}
.qr-container img{width:150px; height:150px;}

@media screen and (max-width:600px){
  table th, table td{padding:6px;font-size:12px;}
  button{font-size:13px;padding:8px;}
  .invoice{float: none; text-align: right;}
  .table-wrapper { overflow-x: auto; width: 100%; }
}
</style>
</head>
<body>
<div class="container">
<h2>🧾 Bill Generator</h2>

<input id="shop" placeholder="Shop Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone">
<input id="upiId" placeholder="Enter Your UPI ID (e.g. name@upi)">
<button id="saveShopBtn">Save Shop Details</button>

<input id="customer" placeholder="Customer Name">
<input id="productSearch" placeholder="Search Product">
<select id="productDropdown"></select>
<input id="qty" type="number" placeholder="Qty">
<input id="price" type="number" placeholder="Price">
<button id="addItemBtn">Add Item</button>

<div class="table-wrapper">
<table id="table">
<tr><th>No</th><th>Product</th><th>Qty</th><th>Price</th><th>Total</th></tr>
</table>
</div>

<select id="payment">
  <option value="Cash">Cash</option>
  <option value="UPI">UPI</option>
  <option value="Card">Card</option>
</select>

<button id="generateBillBtn">Generate Bill</button>
<select id="printMode">
<option value="A4">Print A4</option>
<option value="Receipt" selected>Print Receipt</option>
</select>
<button id="printBillBtn">Print Bill</button>
<button id="downloadPdfBtn" style="background:#e11d48;">Download PDF Receipt</button>
<button id="sendWhatsAppBtn">Send WhatsApp Text</button>

<div id="bill" class="bill"></div>
<button id="downloadHistoryBtn">Download History</button>
<div id="totalDay"></div>

<hr>
<h2>📦 Stock Management</h2>
<input id="stockProduct" placeholder="Product Name">
<input id="stockQty" type="number" placeholder="Quantity to Add">
<button id="addStockBtn">Add Stock</button>
<div style="overflow-x:auto;"><table id="stockTable"><tr><th>Product</th><th>Qty</th><th>Updated</th></tr></table></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let items=[];
let total=0;
let invoiceCounter = parseInt(localStorage.getItem("invoiceCounter"))||1;
let stock = JSON.parse(localStorage.getItem("stock"))||{};
let stockHistory = JSON.parse(localStorage.getItem("stockHistory"))||[];

const shopInput = document.getElementById("shop");
const addressInput = document.getElementById("address");
const phoneInput = document.getElementById("phone");
const upiInput = document.getElementById("upiId");
const saveShopBtn = document.getElementById("saveShopBtn");

shopInput.value = localStorage.getItem("shop")||"";
addressInput.value = localStorage.getItem("address")||"";
phoneInput.value = localStorage.getItem("phone")||"";
upiInput.value = localStorage.getItem("upiId")||"";

saveShopBtn.addEventListener("click", function(){
    localStorage.setItem("shop", shopInput.value);
    localStorage.setItem("address", addressInput.value);
    localStorage.setItem("phone", phoneInput.value);
    localStorage.setItem("upiId", upiInput.value);
    alert("Details Saved!");
});

// Original Stock Logic (Unchanged)
const stockTable = document.getElementById("stockTable");
function renderStock(){
    stockTable.innerHTML = `<tr><th>Product</th><th>Available Qty</th><th>Last Updated</th></tr>`;
    for(let p in stock){
        let updates = stockHistory.filter(h=>h.product===p);
        let lastUpdate = updates[updates.length-1]?.date || "";
        let color = stock[p]<=5 ? "red" : "green";
        let row = stockTable.insertRow();
        row.insertCell(0).innerHTML = p + (stock[p]<=5 ? " ⚠" : "");
        row.insertCell(1).innerHTML = `<span style="color:${color}">${stock[p]}</span>`;
        row.insertCell(2).innerText = lastUpdate ? new Date(lastUpdate).toLocaleDateString() : "-";
    }
}
renderStock();

document.getElementById("addStockBtn").addEventListener("click", function(){
    let p = document.getElementById("stockProduct").value.trim();
    let q = +document.getElementById("stockQty").value;
    if(!p || !q) return;
    stock[p] = (stock[p] || 0) + q;
    stockHistory.push({product:p, qtyAdded:q, type:"Added", date:new Date().toISOString()});
    localStorage.setItem("stock", JSON.stringify(stock));
    localStorage.setItem("stockHistory", JSON.stringify(stockHistory));
    renderStock(); renderProductDropdown();
});

function renderProductDropdown(){
    let dp = document.getElementById("productDropdown"); dp.innerHTML = "";
    Object.keys(stock).forEach(p=>{
        let opt = document.createElement("option"); opt.value = p; opt.text = p; dp.appendChild(opt);
    });
}
renderProductDropdown();

document.getElementById("addItemBtn").addEventListener("click", function(){
    let p = document.getElementById("productDropdown").value;
    let q = +document.getElementById("qty").value;
    let pr = +document.getElementById("price").value;
    if(!p || !q || !pr) return;
    stock[p]-=q; renderStock();
    let t = q*pr; items.push({p,q,pr,t});
    let row=document.getElementById("table").insertRow();
    row.insertCell(0).innerText=items.length; row.insertCell(1).innerText=p;
    row.insertCell(2).innerText=q; row.insertCell(3).innerText=pr; row.insertCell(4).innerText=t;
});

// GENERATE BILL
document.getElementById("generateBillBtn").addEventListener("click", function(){
    if(items.length===0) return;
    total=0; items.forEach(i=> total+=i.t);
    let invNo = invoiceCounter++; localStorage.setItem("invoiceCounter", invoiceCounter);
    let upiId = upiInput.value.trim();
    let shopName = shopInput.value;

    let html=`<div id="pdf-area" style="padding:20px; background:white;">
    <div class="invoice">Inv: ${invNo}</div><div class="clear"></div>
    <center><h2>${shopName}</h2><p>${addressInput.value}<br>PH: ${phoneInput.value}</p></center>
    <hr>
    <p><b>Customer:</b> ${document.getElementById("customer").value}<br><b>Date:</b> ${new Date().toLocaleString()}</p>
    <table><tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr>`;
    items.forEach(i=>{ html+=`<tr><td>${i.p}</td><td>${i.q}</td><td>${i.pr}</td><td>${i.t}</td></tr>`; });
    html+=`<tr class="totalRow"><td colspan="3">Grand Total</td><td>₹${total}</td></tr></table>`;
    
    if(upiId !== ""){
        let qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent('upi://pay?pa='+upiId+'&pn='+shopName+'&am='+total+'&cu=INR')}`;
        html += `<div class="qr-container"><p>Scan to Pay ₹${total}</p><img src="${qrUrl}"></div>`;
    }
    html += `</div>`;
    document.getElementById("bill").innerHTML = html;
});

// PDF DOWNLOAD FUNCTION
document.getElementById("downloadPdfBtn").addEventListener("click", function(){
    const element = document.getElementById("pdf-area");
    if(!element) { alert("Generate Bill First"); return; }
    const opt = {
        margin: 10,
        filename: 'Receipt_' + new Date().getTime() + '.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(element).save();
});

document.getElementById("printBillBtn").addEventListener("click", function(){
    window.print();
});

document.getElementById("sendWhatsAppBtn").addEventListener("click", function(){
    let text="🧾 BILL RECEIPT\nShop: "+shopInput.value+"\nTotal: ₹"+total;
    window.open("https://wa.me/?text="+encodeURIComponent(text));
});

});
</script>
</body>
</html>
