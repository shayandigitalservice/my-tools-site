<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Shop Bill Generator</title><style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:10px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:15px;
border-radius:10px;
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
font-size:15px;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

th,td{
border:1px solid #000;
padding:8px;
font-size:14px;
text-align:center;
}

.totalRow td{
font-weight:bold;
}

.bill{
margin-top:20px;
}

</style></head><body><div class="container"><h2>🧾 Bill Generator</h2><input id="shop" placeholder="Shop Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone"><button onclick="saveShop()">Save Shop Details</button>

<input id="customer" placeholder="Customer Name"><input id="product" placeholder="Product Name">
<input id="qty" type="number" placeholder="Qty">
<input id="price" type="number" placeholder="Price"><button onclick="addItem()">Add Item</button>

<table id="table">
<tr>
<th>No</th>
<th>Product</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>
</table><button onclick="generateBill()">Generate Bill</button>
<button onclick="printBill()">Print Bill</button>
<button onclick="sendWhatsApp()">Send WhatsApp</button>

<div id="bill" class="bill"></div><button onclick="downloadHistory()">Download History</button>

<div id="totalDay"></div></div><script>

let items=[];
let total=0;

/* SAVE SHOP */

function saveShop(){
localStorage.setItem("shop",shop.value);
localStorage.setItem("address",address.value);
localStorage.setItem("phone",phone.value);
alert("Saved");
}

shop.value=localStorage.getItem("shop")||"";
address.value=localStorage.getItem("address")||"";
phone.value=localStorage.getItem("phone")||"";

/* ADD ITEM */

function addItem(){

let p=product.value;
let q=+qty.value;
let pr=+price.value;

if(!p || !q || !pr){
alert("Fill all fields");
return;
}

let t=q*pr;

items.push({p,q,pr,t});

let row=table.insertRow();

row.insertCell(0).innerText=items.length;
row.insertCell(1).innerText=p;
row.insertCell(2).innerText=q;
row.insertCell(3).innerText=pr;
row.insertCell(4).innerText=t;

product.value="";
qty.value="";
price.value="";
}

/* BILL */

function generateBill(){

total=0;
items.forEach(i=> total+=i.t);

let date=new Date().toLocaleString();

let html=`
<b>${shop.value}</b><br>
${address.value}<br>
Phone: ${phone.value}<br>
Date: ${date}<br>
Customer: ${customer.value}

<hr>

<table>
<tr><th>No</th><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr>
`;

items.forEach((i,index)=>{
html+=`
<tr>
<td>${index+1}</td>
<td>${i.p}</td>
<td>${i.q}</td>
<td>${i.pr}</td>
<td>${i.t}</td>
</tr>`;
});

html+=`
<tr class="totalRow">
<td colspan="4">Grand Total</td>
<td>₹${total}</td>
</tr>
</table>
`;

bill.innerHTML=html;

/* SAVE HISTORY */

let history=JSON.parse(localStorage.getItem("history"))||[];

history.push({total:total,date:date});

localStorage.setItem("history",JSON.stringify(history));

showTotalDay();

}

/* PRINT */

function printBill(){

let content = document.getElementById("bill").innerHTML;

let win = window.open('', '', 'width=400,height=600');

win.document.write(`
<html>
<head>
<title>Print Bill</title>
<style>
body{font-family:monospace;padding:10px;}
table{width:100%;border-collapse:collapse;}
td,th{border:1px solid #000;padding:5px;text-align:center;}
</style></head>
<body>
${content}
</body>
</html>
`);win.document.close();
win.print();

}

/* WHATSAPP */

function sendWhatsApp(){

let text = "🧾 BILL RECEIPT\n\n" + bill.innerText;

let url = "https://wa.me/?text=" + encodeURIComponent(text);

window.open(url);

}

/* HISTORY */

function downloadHistory(){

let history=JSON.parse(localStorage.getItem("history"))||[];

let csv="Total,Date\n";

history.forEach(h=>{
csv+=h.total+","+h.date+"\n";
});

let blob=new Blob([csv]);

let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="history.csv";
a.click();

}

/* DAILY SALE */

function showTotalDay(){

let history=JSON.parse(localStorage.getItem("history"))||[];

let today=new Date().toLocaleDateString();

let sum=0;

history.forEach(h=>{
if(h.date.includes(today)){
sum+=h.total;
}
});

totalDay.innerHTML="<b>Today's Sale: ₹"+sum+"</b>";

}

showTotalDay();

</script></body>
</html>
