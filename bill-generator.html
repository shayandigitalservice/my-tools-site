<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Bill Generator – Free Online Invoice & Mini POS Tool</title>
<style>
body{
  font-family:Arial;
  background:#f4f4f4;
  margin:0;
  padding:10px;
}
.container{
  max-width:900px;  /* Desktop friendly width */
  width:95%;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 3px 12px rgba(0,0,0,0.15);
}
h2{
  text-align:center;
  font-size:1.8em;
}
input, select, button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:1em;
  box-sizing:border-box;
}
button{
  border:none;
  background:#2563eb;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}
button:hover{
  background:#1d4ed8;
}
table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
  font-size:1em;
}
th, td{
  border:1px solid #000;
  padding:10px;
  text-align:center;
}
.totalRow td{
  font-weight:bold;
}
.bill{
  margin-top:20px;
  overflow-x:auto;
}
.invoice{float:right;}
.clear{clear:both;}
@media screen and (max-width:1024px){
  .container{padding:15px;}
  h2{font-size:1.6em;}
  input, select, button{padding:10px;font-size:0.95em;}
  table th, table td{padding:8px;font-size:0.95em;}
}
@media screen and (max-width:768px){
  .container{padding:12px;}
  h2{font-size:1.4em;}
  input, select, button{padding:8px;font-size:0.9em;}
  table th, table td{padding:6px;font-size:0.9em;}
}
@media screen and (max-width:480px){
  .container{padding:10px;}
  h2{font-size:1.2em;}
  input, select, button{padding:6px;font-size:0.85em;}
  table th, table td{padding:4px;font-size:0.85em;}
}
</style>
</head>
<body>
<div class="container">
<h2>🧾 Bill Generator</h2>

<!-- Shop Details -->
<input id="shop" placeholder="Shop Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone">
<button onclick="saveShop()">Save Shop Details</button>

<!-- Customer & Items -->
<input id="customer" placeholder="Customer Name">

<!-- Product Search + Dropdown -->
<input id="productSearch" placeholder="Search Product">
<select id="productDropdown"></select>

<input id="qty" type="number" placeholder="Qty">
<input id="price" type="number" placeholder="Price">
<button onclick="addItem()">Add Item</button>

<div style="overflow-x:auto;">
<table id="table">
<tr><th>No</th><th>Product</th><th>Qty</th><th>Price</th><th>Total</th></tr>
</table>
</div>

<!-- Payment Mode -->
<select id="payment">
  <option value="Cash">Cash</option>
  <option value="UPI">UPI</option>
  <option value="Card">Card</option>
</select>

<!-- Generate & Print -->
<button onclick="generateBill()">Generate Bill</button>
<select id="printMode">
<option value="A4">Print A4</option>
<option value="Receipt" selected>Print Receipt</option>
<option value="Custom">Custom Width</option>
</select>
<button onclick="printBill()">Print Bill</button>
<button onclick="sendWhatsApp()">Send WhatsApp</button>

<!-- Bill Display -->
<div id="bill" class="bill"></div>
<button onclick="downloadHistory()">Download History</button>
<div id="totalDay"></div>

<hr>
<h2>📦 Stock Management</h2>

<!-- Add Stock -->
<input id="stockProduct" placeholder="Product Name">
<input id="stockQty" type="number" placeholder="Quantity to Add">
<button onclick="addStock()">Add Stock</button>

<div style="overflow-x:auto;">
<table id="stockTable">
<tr><th>Product</th><th>Available Qty</th><th>Last Updated</th></tr>
</table>
</div>

<!-- Stock Download -->
<button onclick="downloadStockExcel()">Download Stock Excel</button>

<hr>
</div>

<script>
// ======= JS Logic (Existing Code) =======
// Aap pehle ka pura JS code yaha paste kar sakte ho
</script>
</body>
</html>
