<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Shop POS</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body{font-family:'Roboto',sans-serif;background:#f4f4f4;margin:0;padding:10px;}
.container{max-width:600px;margin:auto;background:white;padding:15px;border-radius:10px;}
h2{text-align:center;}
input, select{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;}
button{width:100%;padding:10px;margin:6px 0;border:none;border-radius:6px;background:#2563eb;color:white;font-size:15px;}
table{width:100%;margin-top:10px;border-collapse:collapse;}
th,td{border:1px solid #000;padding:8px;font-size:14px;text-align:center;}
.totalRow td{font-weight:bold;}
.bill{margin-top:20px;}
@media screen and (max-width:600px){
.container{padding:10px;}
table th, table td{padding:6px;font-size:12px;}
button{font-size:13px;padding:8px;}
}
</style>
</head>
<body><div class="container"><h2>🧾 Ultimate Shop POS</h2><!-- Shop Details --><input id="shop" placeholder="Shop Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone">
<button onclick="saveShop()">Save Shop Details</button><!-- Customer --><input id="customer" placeholder="Customer Name"><!-- Item Input --><input id="product" placeholder="Product Name">
<input id="qty" type="number" placeholder="Qty">
<input id="price" type="number" placeholder="Price">
<button onclick="addItem()">Add Item</button><table id="table">
<tr><th>No</th><th>Product</th><th>Qty</th><th>Price</th><th>Total</th></tr>
</table><!-- Payment Mode + Signature --><select id="payment">
<option value="Cash">Cash</option>
<option value="UPI">UPI</option>
<option value="Card">Card</option>
</select>
<input id="signature" placeholder="Shopkeeper Name / Signature"><!-- Bill Generate & Print --><button onclick="generateBill()">Generate Bill</button>
<select id="printMode">

<option value="A4">Print A4</option>
<option value="Receipt">Print Receipt</option>
<option value="Custom">Custom Width</option>
</select>
<button onclick="customPrint()">Print Bill</button>
<button onclick="sendWhatsApp()">Send WhatsApp</button><!-- Bill Display --><div id="bill" class="bill"></div><!-- History --><button onclick="downloadHistory()">Download History</button>

<div id="totalDay"></div>
<div id="weeklyMonth"></div></div><script>
let items=[];
let total=0;

/* Shop Save */
function saveShop(){
localStorage.setItem("shop",shop.value);
localStorage.setItem("address",address.value);
localStorage.setItem("phone",phone.value);
alert("Saved");
}
shop.value=localStorage.getItem("shop")||"";
address.value=localStorage.getItem("address")||"";
phone.value=localStorage.getItem("phone")||"";

/* Add Item */
function addItem(){
let p=product.value;
let q=+qty.value;
let pr=+price.value;
if(!p || !q || !pr){alert("Fill all fields");return;}
let t=q*pr;
items.push({p,q,pr,t});
let row=table.insertRow();
row.insertCell(0).innerText=items.length;
row.insertCell(1).innerText=p;
row.insertCell(2).innerText=q;
row.insertCell(3).innerText=pr;
row.insertCell(4).innerText=t;
product.value=""; qty.value=""; price.value="";
}

/* Generate Bill */
function generateBill(){
total=0; items.forEach(i=> total+=i.t);
let date=new Date().toLocaleString();
let paymentMode = document.getElementById("payment").value;
let signatureName = document.getElementById("signature").value;
let html=`
<b>${shop.value}</b><br>
${address.value}<br>
Phone: ${phone.value}<br>
Date: ${date}<br>
Customer: ${customer.value}<br>
Payment: ${paymentMode}
<hr>
<table>
<tr><th>No</th><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr>`;
items.forEach((i,index)=>{
html+=`<tr>
<td>${index+1}</td>
<td>${i.p}</td>
<td>${i.q}</td>
<td>${i.pr}</td>
<td>${i.t}</td>
</tr>`;
});
html+=`<tr class="totalRow">
<td colspan="4">Grand Total</td>
<td style="font-weight:bold;">₹${total}</td>
</tr></table>
<br><b>Shopkeeper: ${signatureName}</b>`;
bill.innerHTML=html;

/* Save history */
let history=JSON.parse(localStorage.getItem("history"))||[];
history.push({total:total,date:date});
localStorage.setItem("history",JSON.stringify(history));

showTotalDay();
showWeeklyMonthly();
}

/* Custom Print Function */
function customPrint(){
let mode = document.getElementById("printMode").value;
let content = bill.innerHTML;
let width,height;
if(mode=="A4"){width=800;height=600;}
else if(mode=="Receipt"){width=300;height=600;}
else{width=500;height=600;}
let win=window.open('','','width='+width+',height='+height);
win.document.write(`<html><head><title>Bill</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body{font-family:'Roboto',sans-serif;padding:20px;}
table{width:100%;border-collapse:collapse;}
td,th{border:1px solid #000;padding:8px;text-align:center;}
.totalRow td{font-weight:bold;}
</style></head><body>${content}</body></html>`);win.document.close();
win.print();
}

/* WhatsApp */
function sendWhatsApp(){
let text = "🧾 BILL RECEIPT\n\n" + bill.innerText;
let url = "https://wa.me/?text=" + encodeURIComponent(text);
window.open(url);
}

/* Download History */
function downloadHistory(){
let history=JSON.parse(localStorage.getItem("history"))||[];
let csv="Total,Date\n";
history.forEach(h=>{csv+=h.total+","+h.date+"\n";});
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="history.csv";
a.click();
}

/* Daily Sale */
function showTotalDay(){
let history=JSON.parse(localStorage.getItem("history"))||[];
let today=new Date().toLocaleDateString(); let sum=0;
history.forEach(h=>{if(h.date.includes(today)){sum+=h.total;}});
totalDay.innerHTML="<b>Today's Sale: ₹"+sum+"</b>";
}

/* Weekly & Monthly Sale /
function showWeeklyMonthly(){
let history=JSON.parse(localStorage.getItem("history"))||[];
let now=new Date();
let sumWeek=0,sumMonth=0;
history.forEach(h=>{
let d=new Date(h.date);
let diffDays=(now-d)/(1000606024);
if(diffDays<=7) sumWeek+=h.total;
if(now.getMonth()==d.getMonth() && now.getFullYear()==d.getFullYear()) sumMonth+=h.total;
});
weeklyMonth.innerHTML="<b>Weekly Sale: ₹${sumWeek} | Monthly Sale: ₹${sumMonth}</b>";
}

showTotalDay();
showWeeklyMonthly();
</script>

</body>
</html>
