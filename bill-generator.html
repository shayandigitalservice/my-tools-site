<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shop Bill Generator – Functional POS</title>
<style>
/* MOBILE FRIENDLY & SCREEN-FIT DESIGN */
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #ffffff;
    margin: 0;
    padding: 10px; /* Padding kam ki taaki screen space bache */
    color: #333;
    overflow-x: hidden; /* Bahar jane se rokne ke liye */
}

.container {
    max-width: 100%;
    margin: auto;
    background: transparent;
    padding: 0;
    box-sizing: border-box;
}

h2 {
    text-align: left;
    font-size: 20px;
    margin-bottom: 15px;
    color: #1a1a1a;
    border-bottom: 2px solid #2563eb;
    padding-bottom: 5px;
    display: inline-block;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #e0e0e0;
    background: #f9f9f9;
    box-sizing: border-box;
    font-size: 16px;
    outline: none;
}

button {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    background: #2563eb;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    box-sizing: border-box;
}

/* TABLE FIX: Screen se bahar na jaye */
.table-wrapper {
    width: 100%;
    overflow-x: auto; /* Sirf table ke liye scroll, puri body ke liye nahi */
    margin-top: 10px;
    -webkit-overflow-scrolling: touch;
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: auto; /* Content ke hisab se adjust hoga */
}

th, td {
    border: 1px solid #e2e8f0;
    padding: 8px 4px; /* Padding kam ki mobile ke liye */
    font-size: 13px; /* Mobile par fit hone ke liye font thoda chota */
    text-align: center;
    word-wrap: break-word;
}

th { background: #f1f5f9; color: #475569; }

.totalRow td {
    font-weight: bold;
    background: #f8fafc;
    color: #2563eb;
}

/* BILL DISPLAY FIX: Screen ke andar rahe */
.bill {
    margin-top: 20px;
    padding: 10px;
    border: 1px dashed #cbd5e1;
    background: #fff;
    border-radius: 8px;
    font-size: 14px;
    width: 100%;
    box-sizing: border-box;
    overflow-wrap: break-word; /* Text lambi ho toh line break ho jaye */
}

.invoice { float: none; text-align: right; font-weight: bold; }
.clear { clear: both; }

#totalDay {
    background: #eff6ff;
    padding: 12px;
    border-radius: 10px;
    margin-top: 15px;
    text-align: center;
    color: #1e40af;
    font-size: 13px;
    line-height: 1.5;
}

/* Colors for specific buttons */
#saveShopBtn { background: #059669; }
#printBillBtn { background: #4b5563; }
#sendWhatsAppBtn { background: #25d366; }
#downloadHistoryBtn, #downloadStockBtn { background: #7c3aed; }

@media screen and (max-width: 400px) {
    th, td { font-size: 12px; padding: 6px 2px; }
    h2 { font-size: 18px; }
}
</style>
</head>
<body>
<div class="container">
<h2>🧾 Bill Generator</h2>

<input id="shop" placeholder="Shop Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone">
<button id="saveShopBtn">Save Shop Details</button>

<input id="customer" placeholder="Customer Name">
<input id="productSearch" placeholder="Search Product">
<select id="productDropdown"></select>

<input id="qty" type="number" placeholder="Qty">
<input id="price" type="number" placeholder="Price">
<button id="addItemBtn">Add Item</button>

<div class="table-wrapper">
    <table id="table">
    <tr><th>No</th><th>Product</th><th>Qty</th><th>Price</th><th>Total</th></tr>
    </table>
</div>

<select id="payment">
  <option value="Cash">Cash</option>
  <option value="UPI">UPI</option>
  <option value="Card">Card</option>
</select>

<button id="generateBillBtn">Generate Bill</button>
<select id="printMode">
<option value="A4">Print A4</option>
<option value="Receipt" selected>Print Receipt</option>
<option value="Custom">Custom Width</option>
</select>
<button id="printBillBtn">Print Bill</button>
<button id="sendWhatsAppBtn">Send WhatsApp</button>

<div id="bill" class="bill">Bill yahan dikhega...</div>

<button id="downloadHistoryBtn">Download History</button>
<div id="totalDay"></div>

<hr>
<h2>📦 Stock Management</h2>

<input id="stockProduct" placeholder="Product Name">
<input id="stockQty" type="number" placeholder="Quantity to Add">
<button id="addStockBtn">Add Stock</button>

<div class="table-wrapper">
<table id="stockTable">
<tr><th>Product</th><th>Available Qty</th><th>Last Updated</th></tr>
</table>
</div>

<button id="downloadStockBtn">Download Stock Excel</button>
<hr>
</div>

<script>
/* AAPKA ORIGINAL JAVASCRIPT (BILKUL SAME HAI) */
document.addEventListener("DOMContentLoaded", function(){
let items=[]; let total=0;
let invoiceCounter = parseInt(localStorage.getItem("invoiceCounter"))||1;
let stock = JSON.parse(localStorage.getItem("stock"))||{};
let stockHistory = JSON.parse(localStorage.getItem("stockHistory"))||[];

const shopInput = document.getElementById("shop");
const addressInput = document.getElementById("address");
const phoneInput = document.getElementById("phone");
const saveShopBtn = document.getElementById("saveShopBtn");

shopInput.value = localStorage.getItem("shop")||"";
addressInput.value = localStorage.getItem("address")||"";
phoneInput.value = localStorage.getItem("phone")||"";

saveShopBtn.addEventListener("click", function(){
    localStorage.setItem("shop", shopInput.value);
    localStorage.setItem("address", addressInput.value);
    localStorage.setItem("phone", phoneInput.value);
    alert("Shop details saved!");
});

const stockTable = document.getElementById("stockTable");
function renderStock(){
    stockTable.innerHTML = `<tr><th>Product</th><th>Qty</th><th>Updated</th></tr>`;
    for(let p in stock){
        let updates = stockHistory.filter(h=>h.product===p);
        let lastUpdate = updates[updates.length-1]?.date || "";
        let color = stock[p]<=5 ? "red" : "green";
        let row = stockTable.insertRow();
        row.insertCell(0).innerText = p + (stock[p]<=5 ? " ⚠" : "");
        row.insertCell(1).innerHTML = `<span style="color:${color}">${stock[p]}</span>`;
        row.insertCell(2).innerText = lastUpdate ? new Date(lastUpdate).toLocaleDateString() : "-";
    }
}
renderStock();

document.getElementById("addStockBtn").addEventListener("click", function(){
    let p = document.getElementById("stockProduct").value.trim();
    let q = +document.getElementById("stockQty").value;
    if(!p || !q){ alert("Fill all fields"); return; }
    stock[p] = (stock[p] || 0) + q;
    stockHistory.push({product:p, qtyAdded:q, type:"Added", date:new Date().toISOString()});
    localStorage.setItem("stock", JSON.stringify(stock));
    localStorage.setItem("stockHistory", JSON.stringify(stockHistory));
    document.getElementById("stockProduct").value=""; document.getElementById("stockQty").value="";
    renderStock(); renderProductDropdown();
});

function renderProductDropdown(){
    let dp = document.getElementById("productDropdown"); dp.innerHTML = "";
    Object.keys(stock).forEach(p=>{
        let opt = document.createElement("option"); opt.value = p; opt.text = p; dp.appendChild(opt);
    });
}
renderProductDropdown();

document.getElementById("productSearch").addEventListener("input", function(){
    let val = this.value.toLowerCase();
    let opts = Array.from(document.getElementById("productDropdown").options);
    let match = opts.find(o=>o.value.toLowerCase().includes(val));
    if(match) document.getElementById("productDropdown").value = match.value;
});

document.getElementById("addItemBtn").addEventListener("click", function(){
    let p = document.getElementById("productDropdown").value;
    let q = +document.getElementById("qty").value;
    let pr = +document.getElementById("price").value;
    if(!p || !q || !pr) return;
    if(q>stock[p]){ alert("Stock Low!"); return; }

    stock[p]-=q;
    stockHistory.push({product:p, qtyAdded:-q, type:"Sold", date:new Date().toISOString()});
    localStorage.setItem("stock", JSON.stringify(stock));
    renderStock();

    let t = q*pr; items.push({p,q,pr,t});
    let row=document.getElementById("table").insertRow();
    row.insertCell(0).innerText=items.length;
    row.insertCell(1).innerText=p;
    row.insertCell(2).innerText=q;
    row.insertCell(3).innerText=pr;
    row.insertCell(4).innerText=t;
});

document.getElementById("generateBillBtn").addEventListener("click", function(){
    if(items.length===0) return;
    total=0; items.forEach(i=> total+=i.t);
    let invoiceNo = invoiceCounter++; localStorage.setItem("invoiceCounter", invoiceCounter);
    let html=`<div class="invoice">Inv: ${invoiceNo}</div>
    <b>${shopInput.value}</b><br>${addressInput.value}<br>
    Date: ${new Date().toLocaleDateString()}<hr>
    <table><tr><th>Item</th><th>Qty</th><th>Total</th></tr>`;
    items.forEach(i=>{ html+=`<tr><td>${i.p}</td><td>${i.q}</td><td>${i.t}</td></tr>`; });
    html+=`<tr class="totalRow"><td colspan="2">Total</td><td>₹${total}</td></tr></table>`;
    document.getElementById("bill").innerHTML = html;
    
    let history = JSON.parse(localStorage.getItem("history"))||[];
    history.push({total, date:new Date().toISOString(), invoice:invoiceNo});
    localStorage.setItem("history", JSON.stringify(history));
    updateSaleReports();
});

document.getElementById("printBillBtn").addEventListener("click", function(){
    let content = document.getElementById("bill").innerHTML;
    let win = window.open('','','width=400,height=600');
    win.document.write(`<html><head><style>table{width:100%;border-collapse:collapse;} td,th{border:1px solid #000;padding:5px;text-align:center;font-size:12px;}</style></head><body>${content}</body></html>`);
    win.document.close(); win.print();
});

document.getElementById("sendWhatsAppBtn").addEventListener("click", function(){
    window.open("https://wa.me/?text="+encodeURIComponent("🧾 BILL\n"+document.getElementById("bill").innerText));
});

function updateSaleReports(){
    let history=JSON.parse(localStorage.getItem("history"))||[];
    let daily=0; history.forEach(h=>{ if(new Date(h.date).toDateString()===new Date().toDateString()) daily+=h.total; });
    document.getElementById("totalDay").innerHTML=`<b>Today's Total: ₹${daily}</b>`;
}
updateSaleReports();
});
</script>
</body>
</html>
