<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Bill Generator</title>
<style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:10px;}
.container{max-width:500px;margin:auto;background:white;padding:15px;border-radius:10px;}
h2{text-align:center;}
input, select{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;}
button{width:100%;padding:10px;margin:6px 0;border:none;border-radius:6px;background:#2563eb;color:white;font-size:15px;}
table{width:100%;margin-top:10px;border-collapse:collapse;}
th,td{border:1px solid #000;padding:8px;font-size:14px;text-align:center;}
.totalRow td{font-weight:bold;}
.bill{margin-top:20px;}
.invoice{float:right;}
.clear{clear:both;}
@media screen and (max-width:600px){
table th, table td{padding:6px;font-size:12px;}
button{font-size:13px;padding:8px;}
}
</style>
</head>
<body>
<div class="container">
<h2>🧾 Bill Generator</h2>

<!-- Shop Details -->
<input id="shop" placeholder="Shop Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone">
<button onclick="saveShop()">Save Shop Details</button>

<!-- Customer & Items -->
<input id="customer" placeholder="Customer Name">
<input id="product" placeholder="Product Name">
<input id="qty" type="number" placeholder="Qty">
<input id="price" type="number" placeholder="Price">
<button onclick="addItem()">Add Item</button>

<table id="table">
<tr><th>No</th><th>Product</th><th>Qty</th><th>Price</th><th>Total</th></tr>
</table>

<!-- Payment Mode -->
<select id="payment">
  <option value="Cash">Cash</option>
  <option value="UPI">UPI</option>
  <option value="Card">Card</option>
</select>

<!-- Generate & Print -->
<button onclick="generateBill()">Generate Bill</button>
<select id="printMode">
<option value="A4">Print A4</option>
<option value="Receipt" selected>Print Receipt</option>
<option value="Custom">Custom Width</option>
</select>
<button onclick="printBill()">Print Bill</button>
<button onclick="sendWhatsApp()">Send WhatsApp</button>

<!-- Bill Display -->
<div id="bill" class="bill"></div>
<button onclick="downloadHistory()">Download History</button>
<div id="totalDay"></div>
</div>

<script>
// ================= Core POS Logic =================
let items=[];
let total=0;
let invoiceCounter = localStorage.getItem("invoiceCounter")||1;

/* SAVE SHOP */
function saveShop(){
localStorage.setItem("shop",shop.value);
localStorage.setItem("address",address.value);
localStorage.setItem("phone",phone.value);
alert("Saved");
}
shop.value=localStorage.getItem("shop")||"";
address.value=localStorage.getItem("address")||"";
phone.value=localStorage.getItem("phone")||"";

/* ADD ITEM */
function addItem(){
let p=product.value;
let q=+qty.value;
let pr=+price.value;
if(!p || !q || !pr){alert("Fill all fields"); return;}
let t=q*pr;
items.push({p,q,pr,t});
let row=table.insertRow();
row.insertCell(0).innerText=items.length;
row.insertCell(1).innerText=p;
row.insertCell(2).innerText=q;
row.insertCell(3).innerText=pr;
row.insertCell(4).innerText=t;
product.value=""; qty.value=""; price.value="";
}

/* GET INVOICE NUMBER */
function getInvoiceNumber(){
let num = invoiceCounter;
invoiceCounter++;
localStorage.setItem("invoiceCounter", invoiceCounter);
return num;
}

/* GENERATE BILL */
function generateBill(){
if(items.length===0){ alert("Add items first"); return; }
let bill = document.getElementById("bill");
total=0; items.forEach(i=> total+=i.t);
let invoiceNo = getInvoiceNumber();
let dateISO = new Date().toISOString();
let paymentMode = document.getElementById("payment").value;

let html=`<div class="invoice">Invoice No: ${invoiceNo}</div><div class="clear"></div>
<b>${shop.value}</b><br>${address.value}<br>Phone: ${phone.value}<br>
Date: ${new Date(dateISO).toLocaleString()}<br>
Customer: ${customer.value}<br>
Payment Mode: ${paymentMode}<hr>
<table>
<tr><th>No</th><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr>`;

items.forEach((i,index)=>{
html+=`<tr>
<td>${index+1}</td>
<td>${i.p}</td>
<td>${i.q}</td>
<td>${i.pr}</td>
<td>${i.t}</td>
</tr>`;
});
html+=`<tr class="totalRow">
<td colspan="4">Grand Total</td>
<td>₹${total}</td>
</tr>
</table>`;
bill.innerHTML = html;

// Save history
let history = JSON.parse(localStorage.getItem("history"))||[];
history.push({total:total,date:dateISO,invoice:invoiceNo,payment:paymentMode});
localStorage.setItem("history",JSON.stringify(history));

// Update sales report
updateSaleReports();
}

/* PRINT BILL */
function printBill(){
let content = document.getElementById("bill").innerHTML;
let mode = document.getElementById("printMode").value;
let width=400, height=600;
if(mode=="A4"){width=800;height=1100;}
else if(mode=="Custom"){
width = parseInt(prompt("Enter width px","400"))||400;
height = parseInt(prompt("Enter height px","600"))||600;
}
let win = window.open('','',`width=${width},height=${height}`);
win.document.write(`<html><head><title>Print Bill</title>
<style>
body{font-family:monospace;padding:10px;}
table{width:100%;border-collapse:collapse;}
td,th{border:1px solid #000;padding:5px;text-align:center;}
.totalRow td{font-weight:bold;}
.invoice{float:right;}
.clear{clear:both;}
</style>
</head><body>${content}</body></html>`);
win.document.close();
win.print();
}

/* WHATSAPP */
function sendWhatsApp(){
let text="🧾 BILL RECEIPT\n\n"+bill.innerText;
let url="https://wa.me/?text="+encodeURIComponent(text);
window.open(url);
}

/* HISTORY DOWNLOAD */
function downloadHistory(){
let history=JSON.parse(localStorage.getItem("history"))||[];
let csv="Invoice,Payment,Total,Date\n";
history.forEach(h=>{
csv+=h.invoice+","+h.payment+","+h.total+","+h.date+"\n";
});
let blob = new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="history.csv";
a.click();
}

/* DAILY / WEEKLY / MONTHLY SALE */
function updateSaleReports(){
let history=JSON.parse(localStorage.getItem("history"))||[];
let today=new Date();
let daily=0,weekly=0,monthly=0;
history.forEach(h=>{
let d = new Date(h.date);
if(d.toDateString()===today.toDateString()) daily += h.total;
let diffDays = (today-d)/(1000*60*60*24);
if(diffDays<=7) weekly += h.total;
if(today.getMonth()===d.getMonth() && today.getFullYear()===d.getFullYear()) monthly += h.total;
});
document.getElementById("totalDay").innerHTML=`<b>Daily: ₹${daily} | Weekly: ₹${weekly} | Monthly: ₹${monthly}</b>`;
}
updateSaleReports();
</script>
</body>
</html>
