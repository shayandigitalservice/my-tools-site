<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Shop Bill Generator</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            color: #1e293b;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 10px;
        }

        /* Grid Layout for Forms */
        .grid-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        button {
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active { transform: scale(0.98); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-secondary { background: var(--secondary); }

        /* Table Styling */
        .table-container {
            overflow-x: auto;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th { background: #f1f5f9; font-weight: 600; }

        .total-box {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            font-size: 1.1rem;
        }

        /* Bill Preview */
        #bill {
            background: white;
            padding: 15px;
            border: 2px dashed #cbd5e1;
            margin-top: 20px;
            border-radius: 8px;
        }

        /* Desktop specific tweaks */
        @media (min-width: 768px) {
            .grid-form.three-col { grid-template-columns: 1fr 1fr 1fr; }
            .grid-form.actions { grid-template-columns: repeat(4, 1fr); }
        }

        /* Mobile specific tweaks */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            button { padding: 14px; } /* Bigger touch target */
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🧾 Smart Bill Generator</h2>

    <div class="grid-form three-col">
        <input id="shop" placeholder="Shop Name">
        <input id="address" placeholder="Address">
        <input id="phone" placeholder="Phone/Mobile">
    </div>
    <button id="saveShopBtn" class="btn-secondary">💾 Save Shop Details</button>

    <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">

    <div class="grid-form">
        <input id="customer" placeholder="Customer Name">
        <select id="payment">
            <option value="Cash">Cash</option>
            <option value="UPI">UPI</option>
            <option value="Card">Card</option>
        </select>
    </div>

    <div class="grid-form three-col">
        <div style="position:relative;">
            <input id="productSearch" placeholder="🔍 Search Product...">
            <select id="productDropdown" style="margin-top:5px;"></select>
        </div>
        <input id="qty" type="number" placeholder="Quantity">
        <input id="price" type="number" placeholder="Price per Unit">
    </div>
    <button id="addItemBtn">➕ Add Item to List</button>

    <div class="table-container">
        <table id="table">
            <thead>
                <tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="grid-form actions" style="margin-top:20px;">
        <button id="generateBillBtn" class="btn-success">📝 Generate Bill</button>
        <select id="printMode">
            <option value="Receipt">Small Receipt</option>
            <option value="A4">A4 Page</option>
        </select>
        <button id="printBillBtn" class="btn-secondary">🖨️ Print</button>
        <button id="sendWhatsAppBtn" style="background:#25D366;">📱 WhatsApp</button>
    </div>

    <div id="bill"></div>
    
    <div id="totalDay" class="total-box">
        Sales Today: ₹0
    </div>

    <hr style="margin:30px 0;">

    <h2>📦 Stock Management</h2>
    <div class="grid-form">
        <input id="stockProduct" placeholder="Product Name">
        <input id="stockQty" type="number" placeholder="Add Qty">
        <button id="addStockBtn">📥 Add Stock</button>
    </div>

    <div class="table-container">
        <table id="stockTable">
            <thead>
                <tr><th>Product</th><th>Status</th><th>Updated</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    
    <div class="grid-form" style="margin-top:15px;">
        <button id="downloadStockBtn" class="btn-secondary">📊 Download Stock (Excel)</button>
        <button id="downloadHistoryBtn" class="btn-secondary">📜 Download Sales History</button>
    </div>
</div>

<script>
// Logic remains similar but with UI updates
document.addEventListener("DOMContentLoaded", function(){
    let items=[];
    let stock = JSON.parse(localStorage.getItem("stock"))||{};
    let stockHistory = JSON.parse(localStorage.getItem("stockHistory"))||[];
    let invoiceCounter = parseInt(localStorage.getItem("invoiceCounter"))||101;

    // Load Shop Data
    const shopInput = document.getElementById("shop");
    const addressInput = document.getElementById("address");
    const phoneInput = document.getElementById("phone");
    
    shopInput.value = localStorage.getItem("shop")||"";
    addressInput.value = localStorage.getItem("address")||"";
    phoneInput.value = localStorage.getItem("phone")||"";

    document.getElementById("saveShopBtn").onclick = () => {
        localStorage.setItem("shop", shopInput.value);
        localStorage.setItem("address", addressInput.value);
        localStorage.setItem("phone", phoneInput.value);
        alert("Shop Details Updated!");
    };

    function renderStock(){
        const tbody = document.querySelector("#stockTable tbody");
        tbody.innerHTML = "";
        for(let p in stock){
            let row = tbody.insertRow();
            let color = stock[p] <= 5 ? "red" : "green";
            row.insertCell(0).innerText = p;
            row.insertCell(1).innerHTML = `<b style="color:${color}">${stock[p]} left</b>`;
            row.insertCell(2).innerText = "Updated";
        }
        renderDropdown();
    }

    function renderDropdown(){
        const dp = document.getElementById("productDropdown");
        dp.innerHTML = '<option value="">-- Select Product --</option>';
        Object.keys(stock).forEach(p => {
            let opt = document.createElement("option");
            opt.value = p; opt.text = p;
            dp.appendChild(opt);
        });
    }

    document.getElementById("addStockBtn").onclick = () => {
        let p = document.getElementById("stockProduct").value;
        let q = parseInt(document.getElementById("stockQty").value);
        if(!p || !q) return alert("Fill fields");
        stock[p] = (stock[p]||0) + q;
        localStorage.setItem("stock", JSON.stringify(stock));
        renderStock();
    };

    document.getElementById("addItemBtn").onclick = () => {
        let p = document.getElementById("productDropdown").value;
        let q = parseInt(document.getElementById("qty").value);
        let pr = parseFloat(document.getElementById("price").value);
        
        if(!p || !q || !pr) return alert("Missing Info");
        if(stock[p] < q) return alert("Out of Stock!");

        items.push({p, q, pr, t: q*pr});
        stock[p] -= q;
        localStorage.setItem("stock", JSON.stringify(stock));
        
        let row = document.querySelector("#table tbody").insertRow();
        row.innerHTML = `<td>${p}</td><td>${q}</td><td>${pr}</td><td>${q*pr}</td>`;
        renderStock();
    };

    document.getElementById("generateBillBtn").onclick = () => {
        if(!items.length) return alert("Add items!");
        let total = items.reduce((sum, item) => sum + item.t, 0);
        let billDiv = document.getElementById("bill");
        let html = `
            <div style="text-align:center">
                <h3>${shopInput.value}</h3>
                <p>${addressInput.value}<br>PH: ${phoneInput.value}</p>
                <hr>
                <p>Invoice: #${invoiceCounter++} | Date: ${new Date().toLocaleDateString()}</p>
            </div>
            <table style="width:100%; border:none;">
                ${items.map(i => `<tr><td>${i.p} x ${i.q}</td><td style="text-align:right">₹${i.t}</td></tr>`).join('')}
                <tr style="font-weight:bold; border-top:1px solid #000;">
                    <td>Grand Total</td><td style="text-align:right">₹${total}</td>
                </tr>
            </table>
            <p style="text-align:center; margin-top:10px;">Payment: ${document.getElementById("payment").value}</p>
        `;
        billDiv.innerHTML = html;
        localStorage.setItem("invoiceCounter", invoiceCounter);
        
        // Save History
        let history = JSON.parse(localStorage.getItem("history"))||[];
        history.push({total, date: new Date().toISOString()});
        localStorage.setItem("history", JSON.stringify(history));
        updateSales();
    };

    function updateSales(){
        let history = JSON.parse(localStorage.getItem("history"))||[];
        let todayTotal = history.filter(h => new Date(h.date).toDateString() === new Date().toDateString())
                                .reduce((s, h) => s + h.total, 0);
        document.getElementById("totalDay").innerHTML = `<b>Today's Total Sales: ₹${todayTotal}</b>`;
    }

    // Print Function
    document.getElementById("printBillBtn").onclick = () => {
        let content = document.getElementById("bill").innerHTML;
        let win = window.open('', '', 'width=600,height=800');
        win.document.write(`<html><body style="font-family:monospace; padding:20px;">${content}</body></html>`);
        win.document.close();
        win.print();
    };

    // WhatsApp Function
    document.getElementById("sendWhatsAppBtn").onclick = () => {
        let text = encodeURIComponent("🧾 *BILL RECEIPT*\n" + document.getElementById("bill").innerText);
        window.open(`https://wa.me/?text=${text}`);
    };

    renderStock();
    updateSales();
});
</script>

</body>
</html>
