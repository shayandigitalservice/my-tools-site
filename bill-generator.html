<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Bill Generator – Functional POS</title>
<style>
/* AAPKA ORIGINAL STYLE - NO CHANGES */
body{font-family:Arial;background:#f4f4f4;margin:0;padding:10px;}
.container{max-width:800px;margin:auto;background:white;padding:15px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
h2{text-align:center;}
input, select, button{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;box-sizing:border-box;}
button{border:none;background:#2563eb;color:white;font-size:15px;cursor:pointer;}
table{width:100%;margin-top:10px;border-collapse:collapse;}
th,td{border:1px solid #000;padding:8px;font-size:14px;text-align:center;}
.totalRow td{font-weight:bold;}
.bill{margin-top:20px; word-wrap: break-word; overflow-wrap: break-word;} /* Added for mobile wrap */
.invoice{float:right;}
.clear{clear:both;}

/* AAPKI ORIGINAL MEDIA QUERIES */
@media screen and (max-width:1024px){
  .container{padding:10px;}
  input, select, button{font-size:14px;padding:8px;}
  table th, table td{font-size:12px;padding:6px;}
}
@media screen and (max-width:600px){
  table th, table td{padding:6px;font-size:12px;}
  button{font-size:13px;padding:8px;}
  .invoice{float: none; text-align: right;} /* Mobile par screen ke andar rakhne ke liye */
}
</style>
</head>
<body>
<div class="container">
<h2>🧾 Bill Generator</h2>

<input id="shop" placeholder="Shop Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone">
<button id="saveShopBtn">Save Shop Details</button>

<input id="customer" placeholder="Customer Name">

<input id="productSearch" placeholder="Search Product">
<select id="productDropdown"></select>

<input id="qty" type="number" placeholder="Qty">
<input id="price" type="number" placeholder="Price">
<button id="addItemBtn">Add Item</button>

<div style="overflow-x:auto; -webkit-overflow-scrolling: touch;">
<table id="table">
<tr><th>No</th><th>Product</th><th>Qty</th><th>Price</th><th>Total</th></tr>
</table>
</div>

<select id="payment">
  <option value="Cash">Cash</option>
  <option value="UPI">UPI</option>
  <option value="Card">Card</option>
</select>

<button id="generateBillBtn">Generate Bill</button>
<select id="printMode">
<option value="A4">Print A4</option>
<option value="Receipt" selected>Print Receipt</option>
<option value="Custom">Custom Width</option>
</select>
<button id="printBillBtn">Print Bill</button>
<button id="sendWhatsAppBtn">Send WhatsApp</button>

<div id="bill" class="bill"></div>
<button id="downloadHistoryBtn">Download History</button>
<div id="totalDay"></div>

<hr>
<h2>📦 Stock Management</h2>

<input id="stockProduct" placeholder="Product Name">
<input id="stockQty" type="number" placeholder="Quantity to Add">
<button id="addStockBtn">Add Stock</button>

<div style="overflow-x:auto;">
<table id="stockTable">
<tr><th>Product</th><th>Available Qty</th><th>Last Updated</th></tr>
</table>
</div>

<button id="downloadStockBtn">Download Stock Excel</button>

<hr>
</div>

<script>
/* AAPKA ORIGINAL JAVASCRIPT - BILKUL SAME */
document.addEventListener("DOMContentLoaded", function(){

let items=[];
let total=0;
let invoiceCounter = parseInt(localStorage.getItem("invoiceCounter"))||1;
let stock = JSON.parse(localStorage.getItem("stock"))||{};
let stockHistory = JSON.parse(localStorage.getItem("stockHistory"))||[];

const shopInput = document.getElementById("shop");
const addressInput = document.getElementById("address");
const phoneInput = document.getElementById("phone");
const saveShopBtn = document.getElementById("saveShopBtn");

shopInput.value = localStorage.getItem("shop")||"";
addressInput.value = localStorage.getItem("address")||"";
phoneInput.value = localStorage.getItem("phone")||"";

saveShopBtn.addEventListener("click", function(){
    localStorage.setItem("shop", shopInput.value);
    localStorage.setItem("address", addressInput.value);
    localStorage.setItem("phone", phoneInput.value);
    alert("Shop details saved!");
});

const stockProductInput = document.getElementById("stockProduct");
const stockQtyInput = document.getElementById("stockQty");
const addStockBtn = document.getElementById("addStockBtn");
const stockTable = document.getElementById("stockTable");

function renderStock(){
    stockTable.innerHTML = `<tr><th>Product</th><th>Available Qty</th><th>Last Updated</th></tr>`;
    for(let p in stock){
        let updates = stockHistory.filter(h=>h.product===p);
        let lastUpdate = updates[updates.length-1]?.date || "";
        let color = stock[p]<=5 ? "red" : "green";
        let row = stockTable.insertRow();
        row.insertCell(0).innerHTML = p + (stock[p]<=5 ? " ⚠ Low Stock" : "");
        row.insertCell(1).innerHTML = `<span style="color:${color}">${stock[p]}</span>`;
        row.insertCell(2).innerText = new Date(lastUpdate).toLocaleString();
    }
}
renderStock();

addStockBtn.addEventListener("click", function(){
    let p = stockProductInput.value.trim();
    let q = +stockQtyInput.value;
    if(!p || !q){ alert("Fill all fields"); return; }
    stock[p] = (stock[p] || 0) + q;
    stockHistory.push({product:p, qtyAdded:q, type:"Added", date:new Date().toISOString()});
    localStorage.setItem("stock", JSON.stringify(stock));
    localStorage.setItem("stockHistory", JSON.stringify(stockHistory));
    stockProductInput.value=""; stockQtyInput.value="";
    renderStock();
    renderProductDropdown();
});

const productDropdown = document.getElementById("productDropdown");
const productSearch = document.getElementById("productSearch");

function renderProductDropdown(){
    productDropdown.innerHTML = "";
    let productList = [...new Set(Object.keys(stock))];
    productList.forEach(p=>{
        let option = document.createElement("option");
        option.value = p; option.text = p;
        productDropdown.appendChild(option);
    });
}
renderProductDropdown();

productSearch.addEventListener("input", function(){
    let val = this.value.toLowerCase();
    let options = Array.from(productDropdown.options);
    let match = options.find(o=>o.value.toLowerCase().includes(val));
    if(match) productDropdown.value = match.value;
});

document.getElementById("downloadStockBtn").addEventListener("click", function(){
    let html = `<table border="1">
    <tr><th>Product</th><th>Available Qty</th><th>Last Updated</th></tr>`;
    for(let p in stock){
        let updates = stockHistory.filter(h=>h.product===p);
        let lastUpdate = updates[updates.length-1]?.date||"";
        html += `<tr>
        <td>${p}</td><td>${stock[p]}</td><td>${new Date(lastUpdate).toLocaleString()}</td>
        </tr>`;
    }
    html += `</table>`;
    let blob = new Blob([html], {type:"application/vnd.ms-excel"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "stock.xlsx";
    a.click();
});

const qtyInput = document.getElementById("qty");
const priceInput = document.getElementById("price");
const addItemBtn = document.getElementById("addItemBtn");
const table = document.getElementById("table");

addItemBtn.addEventListener("click", function(){
    let p = productDropdown.value.trim();
    let q = +qtyInput.value;
    let pr = +priceInput.value;
    if(!p || !q || !pr){ alert("Fill all fields"); return; }
    if(stock[p]===undefined){ alert("Product not in stock"); return; }
    if(q>stock[p]){ alert(`Stock not sufficient for ${p}. Available: ${stock[p]}`); return; }

    stock[p]-=q;
    stockHistory.push({product:p, qtyAdded:-q, type:"Sold", date:new Date().toISOString()});
    localStorage.setItem("stock", JSON.stringify(stock));
    localStorage.setItem("stockHistory", JSON.stringify(stockHistory));
    renderStock();

    let t = q*pr;
    items.push({p,q,pr,t});
    let row=table.insertRow();
    row.insertCell(0).innerText=items.length;
    row.insertCell(1).innerText=p;
    row.insertCell(2).innerText=q;
    row.insertCell(3).innerText=pr;
    row.insertCell(4).innerText=t;
    productSearch.value=""; qtyInput.value=""; priceInput.value="";
});

function getInvoiceNumber(){ let num = invoiceCounter; invoiceCounter++; localStorage.setItem("invoiceCounter", invoiceCounter); return num; }

document.getElementById("generateBillBtn").addEventListener("click", function(){
    if(items.length===0){ alert("Add items first"); return; }
    let bill = document.getElementById("bill");
    total=0; items.forEach(i=> total+=i.t);
    let invoiceNo = getInvoiceNumber();
    let dateISO = new Date().toISOString();
    let paymentMode = document.getElementById("payment").value;

    let html=`<div class="invoice">Invoice No: ${invoiceNo}</div><div class="clear"></div>
    <b>${shopInput.value}</b><br>${addressInput.value}<br>Phone: ${phoneInput.value}<br>
    Date: ${new Date(dateISO).toLocaleString()}<br>
    Customer: ${document.getElementById("customer").value}<br>
    Payment Mode: ${paymentMode}<hr>
    <div style="overflow-x:auto;"><table>
    <tr><th>No</th><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr>`;
    items.forEach((i,index)=>{
        html+=`<tr><td>${index+1}</td><td>${i.p}</td><td>${i.q}</td><td>${i.pr}</td><td>${i.t}</td></tr>`;
    });
    html+=`<tr class="totalRow"><td colspan="4">Grand Total</td><td>₹${total}</td></tr></table></div>`;
    bill.innerHTML = html;

    let history = JSON.parse(localStorage.getItem("history"))||[];
    history.push({total:total,date:dateISO,invoice:invoiceNo,payment:paymentMode});
    localStorage.setItem("history",JSON.stringify(history));
    updateSaleReports();
});

document.getElementById("printBillBtn").addEventListener("click", function(){
    let content = document.getElementById("bill").innerHTML;
    let mode = document.getElementById("printMode").value;
    let width=400, height=600;
    if(mode=="A4"){width=800;height=1100;}
    else if(mode=="Custom"){ width = parseInt(prompt("Enter width px","400"))||400; height = parseInt(prompt("Enter height px","600"))||600; }
    let win = window.open('','',`width=${width},height=${height}`);
    win.document.write(`<html><head><title>Print Bill</title><style>
    body{font-family:monospace;padding:10px;} table{width:100%;border-collapse:collapse;} td,th{border:1px solid #000;padding:5px;text-align:center;} .totalRow td{font-weight:bold;} .invoice{float:right;} .clear{clear:both;}
    </style></head><body>${content}</body></html>`);
    win.document.close(); win.print();
});

document.getElementById("sendWhatsAppBtn").addEventListener("click", function(){
    let text="🧾 BILL RECEIPT\n\n"+document.getElementById("bill").innerText;
    let url="https://wa.me/?text="+encodeURIComponent(text);
    window.open(url);
});

document.getElementById("downloadHistoryBtn").addEventListener("click", function(){
    let history=JSON.parse(localStorage.getItem("history"))||[];
    let csv="Invoice,Payment,Total,Date\n";
    history.forEach(h=> csv+=h.invoice+","+h.payment+","+h.total+","+h.date+"\n");
    let blob = new Blob([csv]); let a=document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download="history.csv"; a.click();
});

function updateSaleReports(){
    let history=JSON.parse(localStorage.getItem("history"))||[];
    let today=new Date();
    let daily=0,weekly=0,monthly=0;
    history.forEach(h=>{
        let d = new Date(h.date);
        if(d.toDateString()===today.toDateString()) daily += h.total;
        let diffDays = (today-d)/(1000*60*60*24);
        if(diffDays<=7) weekly += h.total;
        if(today.getMonth()===d.getMonth() && today.getFullYear()===d.getFullYear()) monthly += h.total;
    });
    document.getElementById("totalDay").innerHTML=`<b>Daily: ₹${daily} | Weekly: ₹${weekly}  | Monthly: ₹${monthly}</b>`;
}
updateSaleReports();

});
</script>

<section class="seo-content" style="max-width:900px;margin:auto;padding:20px;line-height:1.7;font-family:Arial,Helvetica,sans-serif;">
<h1>Ultimate Shop Bill Generator – Free Online Mini POS Tool for Shopkeepers</h1>
<p>The <strong>Ultimate Shop Bill Generator</strong> is a comprehensive online tool designed for shopkeepers...</p>
</section>
</body>
</html>
