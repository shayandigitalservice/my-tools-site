<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart POS + Stock Manager</title>

<style>
body{font-family:Arial;background:#f4f7fb;margin:0;padding:10px;}
.container{max-width:600px;margin:auto;background:white;padding:15px;border-radius:10px;}
h2{text-align:center;color:#2563eb;}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:5px;
background:#2563eb;
color:white;
cursor:pointer;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

th,td{
border:1px solid #000;
padding:6px;
text-align:center;
}

.stockCard{
border:1px solid #ccc;
padding:8px;
margin:5px 0;
border-radius:5px;
}
</style>
</head>

<body>

<div class="container">

<h2>🧾 Smart POS + Stock Manager</h2>

<!-- SHOP -->
<input id="shop" placeholder="Shop Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone">
<button onclick="saveShop()">Save Shop</button>

<hr>

<!-- STOCK -->
<h3>📦 Add Stock</h3>
<input id="pname" placeholder="Product Name">
<input id="pqty" type="number" placeholder="Quantity">
<button onclick="addStock()">Add Stock</button>

<hr>

<!-- SALE -->
<h3>🧾 Billing</h3>

<input id="customer" placeholder="Customer Name">

<input id="searchProduct" placeholder="🔍 Search Product" onkeyup="filterProducts()">

<select id="productSelect" onchange="selectProduct()"></select>

<input id="qty" type="number" placeholder="Quantity">
<input id="price" type="number" placeholder="Price">

<button onclick="addItem()">Add Item</button>

<table id="table">
<tr><th>No</th><th>Product</th><th>Qty</th><th>Price</th><th>Total</th></tr>
</table>

<button onclick="generateBill()">Generate Bill</button>
<button onclick="printBill()">Print</button>
<button onclick="sendWhatsApp()">WhatsApp</button>

<div id="bill"></div>

<button onclick="downloadHistory()">📊 Sales Excel</button>
<button onclick="downloadStock()">📦 Stock Excel</button>

<div id="totalDay"></div>

<hr>

<h3>📦 Stock List</h3>
<div id="stockList"></div>

</div>

<script>

/* ================= STORAGE ================= */

let items=[];
let stockData = JSON.parse(localStorage.getItem("stockData"))||[];
let history = JSON.parse(localStorage.getItem("history"))||[];

/* ================= SAVE ================= */

function saveStock(){
localStorage.setItem("stockData",JSON.stringify(stockData));
}

function saveHistory(){
localStorage.setItem("history",JSON.stringify(history));
}

/* ================= SHOP ================= */

function saveShop(){
localStorage.setItem("shop",shop.value);
localStorage.setItem("address",address.value);
localStorage.setItem("phone",phone.value);
alert("Saved");
}

/* ================= STOCK ADD ================= */

function addStock(){

let name=pname.value;
let qty=+pqty.value;

if(!name||!qty){alert("Enter data");return;}

let f=stockData.find(p=>p.name.toLowerCase()==name.toLowerCase());

if(f){
f.qty+=qty;
f.history.push({type:"ADD",qty,date:new Date().toLocaleString()});
}else{
stockData.push({
name,
qty,
history:[{type:"ADD",qty,date:new Date().toLocaleString()}]
});
}

saveStock();
showStock();
loadProducts();

pname.value="";
pqty.value="";
}

/* ================= ADD ITEM (SALE) ================= */

function addItem(){

let p=productSelect.value;
let q=+qty.value;
let pr=+price.value;

if(!p||!q||!pr){alert("Fill all");return;}

let f=stockData.find(s=>s.name==p);

if(!f){alert("Not found");return;}
if(f.qty<q){alert("Stock low");return;}

/* CUT STOCK */
f.qty-=q;
f.history.push({type:"SALE",qty:q,date:new Date().toLocaleString()});

if(f.qty<=5){
alert("⚠ Low Stock: "+f.name);
}

saveStock();
showStock();

/* BILL */
let t=q*pr;
items.push({p,q,pr,t});

let row=table.insertRow();
row.insertCell(0).innerText=items.length;
row.insertCell(1).innerText=p;
row.insertCell(2).innerText=q;
row.insertCell(3).innerText=pr;
row.insertCell(4).innerText=t;

}

/* ================= BILL ================= */

function generateBill(){

let total=0;
items.forEach(i=>total+=i.t);

let html=`<b>${shop.value}</b><br>${address.value}<br>${phone.value}<hr>`;

items.forEach(i=>{
html+=`${i.p} x ${i.q} = ₹${i.t}<br>`;
});

html+=`<hr>Total: ₹${total}`;

bill.innerHTML=html;

history.push({total,date:new Date().toLocaleString()});
saveHistory();
updateReport();
}

/* ================= STOCK UI ================= */

function showStock(){

let html="";

stockData.forEach(p=>{

let color = p.qty<=5?"red":"green";

html+=`
<div class="stockCard">
<b>${p.name}</b><br>
Stock: <span style="color:${color}">${p.qty}</span>
</div>`;
});

stockList.innerHTML=html;
}

/* ================= DROPDOWN ================= */

function loadProducts(){

let html="<option>Select Product</option>";

stockData.forEach(p=>{
html+=`<option value="${p.name}">${p.name} (${p.qty})</option>`;
});

productSelect.innerHTML=html;
}

/* SEARCH */

function filterProducts(){

let s=searchProduct.value.toLowerCase();
let html="<option>Select</option>";

stockData.forEach(p=>{
if(p.name.toLowerCase().includes(s)){
html+=`<option value="${p.name}">${p.name} (${p.qty})</option>`;
}
});

productSelect.innerHTML=html;
}

function selectProduct(){
product.value=productSelect.value;
}

/* ================= DOWNLOAD ================= */

function downloadHistory(){
let csv="Total,Date\n";
history.forEach(h=>{
csv+=h.total+","+h.date+"\n";
});
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="sales.csv";
a.click();
}

function downloadStock(){
let csv="Product,Qty\n";
stockData.forEach(s=>{
csv+=s.name+","+s.qty+"\n";
});
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="stock.csv";
a.click();
}

/* ================= REPORT ================= */

function updateReport(){

let daily=0;
let today=new Date().toDateString();

history.forEach(h=>{
if(new Date(h.date).toDateString()==today){
daily+=h.total;
}
});

totalDay.innerHTML="Daily Sale: ₹"+daily;
}

/* ================= INIT ================= */

showStock();
loadProducts();
updateReport();

</script>

</body>
</html>
