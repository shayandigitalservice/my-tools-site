<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Shayan Smart Tools</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Global Styles matching Home Page */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
        
        body {
            background: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .signup-container {
            background: #fff;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Logo Area */
        .logo {
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: #101828;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .logo img {
            height: 50px;
            width: 50px;
            border-radius: 10px;
            margin-right: 12px;
            object-fit: cover;
        }
        .logo span { color: #45cafd; margin-left: 5px; }

        h2 { color: #101828; margin-bottom: 10px; font-size: 24px; }
        p { color: #667085; font-size: 14px; margin-bottom: 30px; }

        /* Form Styling */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
            position: relative;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #344054;
            margin-bottom: 8px;
        }
        .form-group i {
            position: absolute;
            left: 15px;
            top: 40px;
            color: #667085;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid #d0d5dd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus {
            border-color: #45cafd;
            box-shadow: 0 0 0 4px rgba(69, 202, 253, 0.1);
        }

        .btn-signup {
            width: 100%;
            background: #45cafd;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-signup:hover {
            background: #2b7cff;
            transform: translateY(-2px);
        }

        /* Footer Links */
        .login-link {
            margin-top: 25px;
            font-size: 14px;
            color: #667085;
        }
        .login-link a {
            color: #45cafd;
            text-decoration: none;
            font-weight: bold;
        }
        .login-link a:hover { text-decoration: underline; }

        .back-home {
            margin-top: 20px;
            display: inline-block;
            font-size: 13px;
            color: #98a2b3;
            text-decoration: none;
        }
        .back-home:hover { color: #101828; }
    </style>
</head>
<body>

<div class="signup-container">
    <a href="index.html" class="logo">
        <img src="1000040753.png" alt="Shayan Smart Tools Logo">
        SHAYAN <span>TOOLS</span>
    </a>

    <h2>Create Account</h2>
    <p>Join India's fastest free tools platform</p>

    <form action="#">
        <div class="form-group">
            <label>Full Name</label>
            <i class="fa-solid fa-user"></i>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <i class="fa-solid fa-envelope"></i>
            <input type="email" placeholder="name@company.com" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="Create a password" required>
        </div>

        <button type="submit" class="btn-signup">Sign Up</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="login.html">Log In</a>
    </div>

    <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
</div>

</body>
</html>
