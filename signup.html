<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Shayan Smart Tools</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { 
            background: #f4f7f9; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px;
        }
        .signup-card {
            background: #fff;
            width: 100%;
            max-width: 450px; /* Thoda wide rakha hai signup ke liye */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }
        .logo { display: flex; justify-content: center; align-items: center; text-decoration: none; margin-bottom: 25px; }
        .logo img { height: 45px; width: 45px; border-radius: 8px; margin-right: 10px; }
        .logo span { color: #101828; font-size: 20px; font-weight: bold; }
        .logo b { color: #45cafd; }
        
        h2 { font-size: 22px; color: #101828; margin-bottom: 8px; }
        p { color: #667085; font-size: 14px; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 18px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #344054; }
        .input-box { position: relative; }
        .input-box i { position: absolute; left: 15px; top: 13px; color: #98a2b3; }
        .input-box input { 
            width: 100%; padding: 12px 15px 12px 40px; 
            border: 1px solid #d0d5dd; border-radius: 10px; outline: none; transition: 0.3s;
        }
        .input-box input:focus { border-color: #45cafd; box-shadow: 0 0 0 4px rgba(69,202,253,0.1); }

        .btn-submit { 
            width: 100%; background: #45cafd; color: white; border: none; 
            padding: 13px; border-radius: 10px; font-size: 16px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-submit:hover { background: #2b7cff; }

        .footer-text { margin-top: 25px; font-size: 14px; color: #667085; }
        .footer-text a { color: #45cafd; text-decoration: none; font-weight: bold; }
        .back-home { display: block; margin-top: 20px; font-size: 13px; color: #98a2b3; text-decoration: none; }
    </style>
</head>
<body>
    <div class="signup-card">
        <a href="index.html" class="logo">
            <img src="1000040753.png" alt="Logo">
            <span>SHAYAN <b>TOOLS</b></span>
        </a>
        <h2>Create Account</h2>
        <p>Join India's fastest tools platform</p>
        <form>
            <div class="input-group">
                <label>Full Name</label>
                <div class="input-box"><i class="fa-solid fa-user"></i><input type="text" placeholder="Your Name"></div>
            </div>
            <div class="input-group">
                <label>Email</label>
                <div class="input-box"><i class="fa-solid fa-envelope"></i><input type="email" placeholder="Email address"></div>
            </div>
            <div class="input-group">
                <label>Password</label>
                <div class="input-box"><i class="fa-solid fa-lock"></i><input type="password" placeholder="Create Password"></div>
            </div>
            <button type="submit" class="btn-submit">Sign Up</button>
        </form>
        <div class="footer-text">Pehle se account hai? <a href="login.html">Login</a></div>
        <a href="index.html" class="back-home">← Back to Home</a>
    </div>
</body>
</html>
