<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>India Holiday List 2026</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:5px;
}

ul{
list-style:none;
padding:0;
}

li{
padding:8px;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="container">

<h1>India Holiday List 2026</h1>

<input type="text" id="searchHoliday" placeholder="Search Holiday...">

<h2>Indian Government Major Holidays 2026</h2>

<ul id="nationalHolidayList"></ul>

<h2>Select State</h2>

<select id="stateSelect">

<option value="">Select State</option>

option>Andhra Pradesh</option>
<option>Arunachal Pradesh</option>
<option>Assam</option>
<option>Bihar</option>
<option>Chhattisgarh</option>
<option>Goa</option>
<option>Gujarat</option>
<option>Haryana</option>
<option>Himachal Pradesh</option>
<option>Jharkhand</option>
<option>Karnataka</option>
<option>Kerala</option>
<option>Madhya Pradesh</option>
<option>Maharashtra</option>
<option>Manipur</option>
<option>Meghalaya</option>
<option>Mizoram</option>
<option>Nagaland</option>
<option>Odisha</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Sikkim</option>
<option>Tamil Nadu</option>
<option>Telangana</option>
<option>Tripura</option>
<option>Uttar Pradesh</option>
<option>Uttarakhand</option>
<option>West Bengal</option>
<option>Andaman and Nicobar</option>
<option>Chandigarh</option>
<option>Dadra and Nagar Haveli</option>
<option>Daman and Diu</option>
<option>Delhi</option>
<option>Lakshadweep</option>
<option>Puducherry</option>
<option>Ladakh</option>
</select>
<ul id="stateHolidayList"></ul>

</div>

<script>

function getDayName(date){
const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
return days[new Date(date).getDay()];
}


const national2026=[

{date:"2026-01-26",name:"Republic Day"},
{date:"2026-03-14",name:"Holi"},
{date:"2026-03-30",name:"Ram Navami"},
{date:"2026-04-03",name:"Good Friday"},
{date:"2026-05-01",name:"Labour Day"},
{date:"2026-08-15",name:"Independence Day"},
{date:"2026-10-02",name:"Gandhi Jayanti"},
{date:"2026-10-24",name:"Diwali"},
{date:"2026-12-25",name:"Christmas"}

]


const nationalList=document.getElementById("nationalHolidayList");

national2026.forEach(h=>{

let li=document.createElement("li")

li.innerHTML=`${h.date} - ${getDayName(h.date)} - ${h.name}`

nationalList.appendChild(li)

})


const states={

AndhraPradesh:[

{date:"2026-01-14",name:"Makara Sankranti"},
{date:"2026-03-30",name:"Ugadi"},
{date:"2026-08-28",name:"Janmashtami"}

],

Gujarat:[

{date:"2026-01-14",name:"Uttarayan"},
{date:"2026-08-19",name:"Janmashtami"}

],

Maharashtra:[

{date:"2026-04-14",name:"Ambedkar Jayanti"},
{date:"2026-09-17",name:"Ganesh Chaturthi"}

],

TamilNadu:[

{date:"2026-01-15",name:"Pongal"},
{date:"2026-04-14",name:"Tamil New Year"}

],

Karnataka:[

{date:"2026-11-01",name:"Karnataka Rajyotsava"},
{date:"2026-08-15",name:"Independence Day"}

]

}


document.getElementById("stateSelect").addEventListener("change",function(){

let state=this.value
let list=document.getElementById("stateHolidayList")

list.innerHTML=""

if(!states[state]) return

states[state].forEach(h=>{

let li=document.createElement("li")

li.innerHTML=`${h.date} - ${getDayName(h.date)} - ${h.name}`

list.appendChild(li)

})

})


document.getElementById("searchHoliday").addEventListener("keyup",function(){

let value=this.value.toLowerCase()

let items=document.querySelectorAll("li")

items.forEach(i=>{

i.style.display=i.textContent.toLowerCase().includes(value)?"block":"none"

})

})

</script>

</body>
</html>
