<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional School ID Card Generator</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family: 'Segoe UI', sans-serif;
background:linear-gradient(135deg,#e0e7ff,#f1f5f9);
text-align:center;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #ccc;
border-radius:10px;
}

button{
padding:10px 18px;
margin:10px;
border:none;
background:#2563eb;
color:white;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

#card{
width:420px;
height:250px;
border-radius:20px;
margin:30px auto;
position:relative;
overflow:hidden;
background:white;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

.glass{
background:rgba(255,255,255,0.15)!important;
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.4);
}

/* Watermark Logo */
.watermark{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0.06;
pointer-events:none;
z-index:0;
}
.watermark img{
width:200px;
height:200px;
object-fit:contain;
}

.topbar{
padding:10px;
color:white;
font-weight:bold;
text-align:center;
z-index:2;
position:relative;
}

.school{font-size:20px;}
.address{font-size:12px;}

.title{
margin-top:12px;
font-weight:bold;
font-size:18px;
}

.logo{
position:absolute;
left:15px;
top:15px;
width:45px;
height:45px;
border-radius:50%;
background:white;
overflow:hidden;
}
.logo img{width:100%;height:100%;}

.photo{
position:absolute;
left:25px;
top:95px;
width:100px;
height:115px;
border:2px solid #ddd;
border-radius:12px;
overflow:hidden;
}
.photo img{
width:100%;
height:100%;
object-fit:cover;
}

.details{
position:absolute;
left:150px;
top:95px;
text-align:left;
font-size:14px;
z-index:2;
}
.details p{margin:4px 0;}

.signature{
position:absolute;
right:15px;
bottom:40px;
text-align:center;
font-size:11px;
}
.signature img{
width:80px;
height:30px;
object-fit:contain;
}

.bottombar{
position:absolute;
bottom:0;
width:100%;
padding:8px 0;
color:white;
font-size:13px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2>Professional School ID Card Generator</h2>

<select id="templateSelect" onchange="changeTemplate()">
<option value="gradient">Gradient Templates</option>
<option value="solid">Solid Color Templates</option>
<option value="glass">Premium Glass Effect</option>
</select>

<input id="school" placeholder="School Name">
<input id="address" placeholder="School Address">
<input id="name" placeholder="Student Name">
<input id="father" placeholder="Father Name">
<input id="class" placeholder="Class">
<input id="section" placeholder="Section">
<input id="roll" placeholder="Roll No">
<input id="phone" placeholder="Phone Number">
<input id="session" placeholder="Session (2024-2025)">

<label>School Logo</label>
<input type="file" id="logoUpload">

<label>Student Photo</label>
<input type="file" id="photoUpload">

<label>Principal Signature</label>
<input type="file" id="signUpload">

<button onclick="preview()">Preview</button>
<button onclick="downloadCard()">Download</button>

</div>

<div id="card">

<div class="watermark">
<img id="watermarkLogo">
</div>

<div class="topbar" id="topbar">
<div class="school" id="schoolPreview">School Name</div>
<div class="address" id="addressPreview">School Address</div>
<div class="title">IDENTITY CARD</div>
</div>

<div class="logo"><img id="logoPreview"></div>
<div class="photo"><img id="photoPreview"></div>

<div class="details">
<p><b>Name :</b> <span id="namePreview"></span></p>
<p><b>S/O D/O :</b> <span id="fatherPreview"></span></p>
<p><b>Class :</b> <span id="classPreview"></span></p>
<p><b>Section :</b> <span id="sectionPreview"></span></p>
<p><b>Roll No :</b> <span id="rollPreview"></span></p>
<p><b>PH No :</b> <span id="phonePreview"></span></p>
</div>

<div class="signature">
<img id="signPreview"><br>Principal Signature
</div>

<div class="bottombar" id="bottombar">
<span id="sessionPreview">SESSION 2024-2025</span>
</div>

</div>

<script>

const gradients=[
"linear-gradient(45deg,#1e3c72,#2a5298)",
"linear-gradient(45deg,#ff512f,#dd2476)",
"linear-gradient(45deg,#11998e,#38ef7d)",
"linear-gradient(45deg,#8e2de2,#4a00e0)",
"linear-gradient(45deg,#f7971e,#ffd200)",
"linear-gradient(45deg,#0f2027,#203a43,#2c5364)",
"linear-gradient(45deg,#ff416c,#ff4b2b)",
"linear-gradient(45deg,#56ab2f,#a8e063)",
"linear-gradient(45deg,#614385,#516395)",
"linear-gradient(45deg,#e65c00,#f9d423)"
];

const solids=[
"#1e40af","#b91c1c","#047857","#7c3aed","#be185d",
"#0f172a","#78350f","#065f46","#111827","#991b1b"
];

function changeTemplate(){
let value=document.getElementById("templateSelect").value;
let topbar=document.getElementById("topbar");
let bottombar=document.getElementById("bottombar");
let card=document.getElementById("card");

card.classList.remove("glass");

if(value==="gradient"){
let bg=gradients[Math.floor(Math.random()*gradients.length)];
topbar.style.background=bg;
bottombar.style.background=bg;
}
else if(value==="solid"){
let bg=solids[Math.floor(Math.random()*solids.length)];
topbar.style.background=bg;
bottombar.style.background=bg;
}
else{
card.classList.add("glass");
topbar.style.background="rgba(0,0,0,0.6)";
bottombar.style.background="rgba(0,0,0,0.6)";
}
}

function preview(){
schoolPreview.innerText=school.value;
addressPreview.innerText=address.value;
namePreview.innerText=name.value;
fatherPreview.innerText=father.value;
classPreview.innerText=class.value;
sectionPreview.innerText=section.value;
rollPreview.innerText=roll.value;
phonePreview.innerText=phone.value;
sessionPreview.innerText="SESSION "+session.value;

previewImage("logoUpload","logoPreview");
previewImage("logoUpload","watermarkLogo");
previewImage("photoUpload","photoPreview");
previewImage("signUpload","signPreview");
}

function previewImage(inputId,imgId){
let file=document.getElementById(inputId).files[0];
if(file){
let reader=new FileReader();
reader.onload=e=>document.getElementById(imgId).src=e.target.result;
reader.readAsDataURL(file);
}
}

function downloadCard(){
html2canvas(document.getElementById("card"),{scale:2,useCORS:true})
.then(canvas=>{
let link=document.createElement("a");
link.download="school-id-card.png";
link.href=canvas.toDataURL();
link.click();
});
}

</script>

</body>
</html>
