<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium School ID Card Generator</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#e0e7ff,#f5f3ff);
text-align:center;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
padding:10px 18px;
margin:10px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
}

/* CARD */

#card{
width:350px;
height:210px;
border-radius:18px;
margin:30px auto;
position:relative;
overflow:hidden;
backdrop-filter: blur(15px);
background:rgba(255,255,255,0.25);
box-shadow:0 10px 30px rgba(0,0,0,0.25);
border:1px solid rgba(255,255,255,0.4);
}

/* TOP BAR */

.topbar{
padding:6px 0;
text-align:center;
color:white;
font-weight:bold;
background:linear-gradient(45deg,#6b4a3a,#8b5e3c);
}

.school{
font-size:18px;
}

.address{
font-size:11px;
}

.title{
margin:8px 0 0 0;
font-weight:bold;
font-size:16px;
}

/* LOGO */

.logo{
position:absolute;
left:10px;
top:6px;
width:36px;
height:36px;
border-radius:50%;
background:white;
overflow:hidden;
}

.logo img{
width:100%;
height:100%;
}

/* PHOTO */

.photo{
position:absolute;
left:20px;
top:75px;
width:90px;
height:100px;
border:2px solid #ccc;
overflow:hidden;
border-radius:8px;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

/* DETAILS */

.details{
position:absolute;
left:130px;
top:70px;
text-align:left;
font-size:13px;
}

.details p{
margin:2px 0;
}

/* SIGNATURE */

.signature{
position:absolute;
right:15px;
bottom:35px;
text-align:center;
font-size:10px;
}

.signature img{
width:70px;
height:25px;
object-fit:contain;
}

/* BOTTOM BAR */

.bottombar{
position:absolute;
bottom:0;
width:100%;
padding:5px 0;
color:white;
font-size:12px;
text-align:center;
background:linear-gradient(45deg,#6b4a3a,#8b5e3c);
}

</style>
</head>

<body>

<div class="container">

<h2>Premium School ID Card Generator</h2>

<input id="school" placeholder="School Name">
<input id="address" placeholder="School Address">
<input id="name" placeholder="Student Name">
<input id="father" placeholder="Father Name">
<input id="class" placeholder="Class">
<input id="section" placeholder="Section">
<input id="roll" placeholder="Roll No">
<input id="phone" placeholder="Phone Number">

<label>School Logo</label>
<input type="file" id="logoUpload">

<label>Student Photo</label>
<input type="file" id="photoUpload">

<label>Principal Signature</label>
<input type="file" id="signUpload">

<button type="button" onclick="preview()">Preview</button>
<button type="button" onclick="downloadCard()">Download</button>

</div>

<div id="card">

<div class="topbar">
<div class="school" id="schoolPreview">School Name</div>
<div class="address" id="addressPreview">School Address</div>
</div>

<div class="title">IDENTITY CARD</div>

<div class="logo">
<img id="logoPreview">
</div>

<div class="photo">
<img id="photoPreview">
</div>

<div class="details">
<p><b>Name :</b> <span id="namePreview"></span></p>
<p><b>S/O D/O :</b> <span id="fatherPreview"></span></p>
<p><b>Class :</b> <span id="classPreview"></span></p>
<p><b>Section :</b> <span id="sectionPreview"></span></p>
<p><b>Roll No :</b> <span id="rollPreview"></span></p>
<p><b>PH No :</b> <span id="phonePreview"></span></p>
</div>

<div class="signature">
<img id="signPreview"><br>
Principal Signature
</div>

<div class="bottombar">
SESSION 2024-2025
</div>

</div>

<script>

function preview(){

schoolPreview.innerText=school.value;
addressPreview.innerText=address.value;
namePreview.innerText=name.value;
fatherPreview.innerText=father.value;
classPreview.innerText=class.value;
sectionPreview.innerText=section.value;
rollPreview.innerText=roll.value;
phonePreview.innerText=phone.value;

let logo=logoUpload.files[0];
let photo=photoUpload.files[0];
let sign=signUpload.files[0];

if(logo){
let reader=new FileReader();
reader.onload=e=>logoPreview.src=e.target.result;
reader.readAsDataURL(logo);
}

if(photo){
let reader=new FileReader();
reader.onload=e=>photoPreview.src=e.target.result;
reader.readAsDataURL(photo);
}

if(sign){
let reader=new FileReader();
reader.onload=e=>signPreview.src=e.target.result;
reader.readAsDataURL(sign);
}

}

function downloadCard(){

html2canvas(document.getElementById("card")).then(function(canvas){

let link=document.createElement("a");
link.download="school-id-card.png";
link.href=canvas.toDataURL("image/png");
link.click();

}).catch(function(error){
alert("Download Error: "+error);
});

}

</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
