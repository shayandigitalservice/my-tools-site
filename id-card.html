<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School ID Card Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f0f0f0;
padding:20px;
}

input{
display:block;
margin:8px 0;
padding:8px;
width:250px;
}

button{
padding:10px;
margin:5px;
background:#1976d2;
color:white;
border:none;
cursor:pointer;
}

#card{
width:340px;
height:214px;
background:white;
border-radius:10px;
overflow:hidden;
position:relative;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* header */

.header{
background:#c89c2b;
color:white;
height:60px;
display:flex;
align-items:center;
padding:5px 10px;
}

.logo{
width:45px;
height:45px;
border-radius:50%;
background:white;
overflow:hidden;
margin-right:10px;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

.school{
text-align:center;
flex:1;
}

.school h2{
font-size:16px;
margin:0;
}

.school p{
font-size:11px;
margin:0;
}

/* body */

.content{
display:flex;
padding:10px;
}

.photo{
width:80px;
height:100px;
border:2px solid #c89c2b;
overflow:hidden;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

.year{
text-align:center;
font-size:12px;
margin-top:3px;
}

.details{
font-size:12px;
margin-left:10px;
}

.details div{
margin-bottom:3px;
}

/* bottom wave */

.wave{
position:absolute;
bottom:0;
width:100%;
height:60px;
background:linear-gradient(45deg,#8b0000,#c62828);
border-top-left-radius:60% 40%;
}

.signature{
position:absolute;
bottom:10px;
right:10px;
text-align:center;
font-size:10px;
}

.signature img{
height:25px;
}

</style>
</head>

<body>

<h2>School ID Card Generator</h2>

<input id="school" placeholder="School Name">
<input id="address" placeholder="School Address">
<input id="name" placeholder="Student Name">
<input id="father" placeholder="Father Name">
<input id="dob" placeholder="DOB">
<input id="class" placeholder="Class">
<input id="sec" placeholder="Section">
<input id="roll" placeholder="Roll">
<input id="mobile" placeholder="Mobile">
<input id="year" placeholder="Year">

<label>Student Photo</label>
<input type="file" id="photo">

<label>School Logo</label>
<input type="file" id="logo">

<label>Principal Signature</label>
<input type="file" id="sign">

<br>

<button onclick="preview()">Preview</button>
<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadPDF()">Download PVC PDF</button>

<br><br>

<div id="card">

<div class="header">

<div class="logo">
<img id="logoPreview">
</div>

<div class="school">
<h2 id="schoolPreview">School Name</h2>
<p id="addressPreview">Address</p>
</div>

</div>

<div class="content">

<div>

<div class="photo">
<img id="photoPreview">
</div>

<div class="year" id="yearPreview">
2024-25
</div>

</div>

<div class="details">

<div>Name : <span id="namePreview"></span></div>
<div>Father : <span id="fatherPreview"></span></div>
<div>DOB : <span id="dobPreview"></span></div>
<div>Class : <span id="classPreview"></span></div>
<div>Sec : <span id="secPreview"></span></div>
<div>Roll : <span id="rollPreview"></span></div>
<div>Mobile : <span id="mobilePreview"></span></div>

</div>

</div>

<div class="wave"></div>

<div class="signature">
<img id="signPreview"><br>
Principal
</div>

</div>

<script>

function preview(){

document.getElementById("schoolPreview").innerText=document.getElementById("school").value
document.getElementById("addressPreview").innerText=document.getElementById("address").value
document.getElementById("namePreview").innerText=document.getElementById("name").value
document.getElementById("fatherPreview").innerText=document.getElementById("father").value
document.getElementById("dobPreview").innerText=document.getElementById("dob").value
document.getElementById("classPreview").innerText=document.getElementById("class").value
document.getElementById("secPreview").innerText=document.getElementById("sec").value
document.getElementById("rollPreview").innerText=document.getElementById("roll").value
document.getElementById("mobilePreview").innerText=document.getElementById("mobile").value
document.getElementById("yearPreview").innerText=document.getElementById("year").value

}

/* image preview */

photo.onchange=e=>{
photoPreview.src=URL.createObjectURL(e.target.files[0])
}

logo.onchange=e=>{
logoPreview.src=URL.createObjectURL(e.target.files[0])
}

sign.onchange=e=>{
signPreview.src=URL.createObjectURL(e.target.files[0])
}

/* PNG download */

function downloadPNG(){

html2canvas(document.getElementById("card")).then(canvas=>{

let link=document.createElement("a")
link.download="school-id-card.png"
link.href=canvas.toDataURL()
link.click()

})

}

/* PDF PVC size */

async function downloadPDF(){

const { jsPDF } = window.jspdf

html2canvas(document.getElementById("card")).then(canvas=>{

let img=canvas.toDataURL("image/png")

let pdf=new jsPDF({
orientation:"landscape",
unit:"mm",
format:[86,54]
})

pdf.addImage(img,"PNG",0,0,86,54)

pdf.save("school-id-card.pdf")

})

}

</script>

</body>
  </html>
