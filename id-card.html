<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School ID Card Generator</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

input{
padding:8px;
margin:5px;
width:250px;
}

button{
padding:10px 20px;
margin:10px;
cursor:pointer;
}

#card{

width:350px;
height:220px;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
margin:auto;
position:relative;

}

/* header */

.header{

background:#d4a12b;
color:white;
padding:10px;
text-align:center;
font-weight:bold;
}

.school{
font-size:20px;
}

.address{
font-size:12px;
}

/* body */

.content{
display:flex;
padding:10px;
}

.photo{

width:90px;
height:110px;
border:2px solid #d4a12b;
margin-right:10px;
background:#eee;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

.details{
font-size:13px;
text-align:left;
}

.details div{
margin:3px 0;
}

/* footer */

.footer{

position:absolute;
bottom:0;
width:100%;
height:60px;
background:linear-gradient(to right,#a01515,#d63a3a);
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
font-size:12px;

}

.signature{
background:white;
width:120px;
height:25px;
}

</style>
</head>

<body>

<h2>ID Card Generator</h2>

<br>

<input id="school" placeholder="School Name"><br>
<input id="address" placeholder="Address"><br>

<input id="name" placeholder="Student Name"><br>
<input id="father" placeholder="Father Name"><br>
<input id="dob" placeholder="DOB"><br>
<input id="class" placeholder="Class"><br>
<input id="sec" placeholder="Section"><br>
<input id="roll" placeholder="Roll"><br>
<input id="mobile" placeholder="Mobile"><br>

<input type="file" id="photoInput"><br>

<button onclick="preview()">Preview</button>
<button onclick="download()">Download</button>

<br><br>

<div id="card">

<div class="header">

<div class="school" id="sSchool">GOVT HIGH SCHOOL</div>

<div class="address" id="sAddress">Main road near town</div>

</div>

<div style="font-weight:bold;margin-top:5px;">IDENTITY CARD</div>

<div class="content">

<div class="photo">
<img id="photo">
</div>

<div class="details">

<div>Name : <span id="sName"></span></div>
<div>Father : <span id="sFather"></span></div>
<div>DOB : <span id="sDob"></span></div>
<div>Class : <span id="sClass"></span></div>
<div>Sec : <span id="sSec"></span></div>
<div>Roll : <span id="sRoll"></span></div>
<div>Mobile : <span id="sMobile"></span></div>

</div>

</div>

<div class="footer">

<div>2024-2025</div>

<div class="signature"></div>

</div>

</div>

<script>

function preview(){

sSchool.innerText=school.value
sAddress.innerText=address.value
sName.innerText=name.value
sFather.innerText=father.value
sDob.innerText=dob.value
sClass.innerText=class.value
sSec.innerText=sec.value
sRoll.innerText=roll.value
sMobile.innerText=mobile.value

let file=photoInput.files[0]

if(file){

photo.src=URL.createObjectURL(file)

}

}

function download(){

html2canvas(document.getElementById("card")).then(canvas=>{

let link=document.createElement("a")
link.download="id-card.png"
link.href=canvas.toDataURL()
link.click()

})

}

</script>

</body>
</html>
