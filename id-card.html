<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School ID Card Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:8px;
}

input{
width:100%;
padding:8px;
margin:6px 0;
}

button{
padding:10px 15px;
background:#1976d2;
color:white;
border:none;
margin:5px;
cursor:pointer;
}

/* CARD */

#card{
width:340px;
height:214px;
background:white;
border-radius:6px;
overflow:hidden;
position:relative;
margin-top:20px;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

/* HEADER */

.header{
background:#c89c2b;
color:white;
height:55px;
display:flex;
align-items:center;
padding:5px;
}

.logo{
width:40px;
height:40px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
margin-right:8px;
}

.logo img{
width:100%;
}

.school{
text-align:center;
flex:1;
}

.school h2{
font-size:16px;
margin:0;
}

.school p{
font-size:10px;
margin:0;
}

/* TITLE */

.title{
text-align:center;
font-weight:bold;
font-size:16px;
margin-top:4px;
}

/* BODY */

.content{
display:flex;
padding:10px;
}

.photo{
width:80px;
height:95px;
border:3px solid #c89c2b;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

.year{
text-align:center;
font-size:12px;
margin-top:5px;
}

.details{
font-size:12px;
margin-left:10px;
line-height:16px;
}

/* WAVE */

.wave{
position:absolute;
bottom:0;
width:100%;
height:60px;
background:linear-gradient(45deg,#8b0000,#c62828);
border-top-left-radius:100% 60%;
}

/* SIGNATURE */

.signature{
position:absolute;
bottom:12px;
right:20px;
}

.signbox{
width:110px;
height:20px;
background:white;
}

.signtxt{
font-size:10px;
text-align:center;
color:white;
}

</style>
</head>

<body>

<div class="container">

<h2>School ID Card Generator</h2>

<input id="schoolName" placeholder="School Name">
<input id="schoolAddress" placeholder="School Address">

<input id="studentName" placeholder="Student Name">
<input id="fatherName" placeholder="Father Name">
<input id="dob" placeholder="DOB">
<input id="class" placeholder="Class">
<input id="section" placeholder="Section">
<input id="roll" placeholder="Roll No">
<input id="mobile" placeholder="Mobile">
<input id="year" placeholder="Year">

<label>Student Photo</label>
<input type="file" id="photo">

<label>School Logo</label>
<input type="file" id="logo">

<label>Principal Signature</label>
<input type="file" id="sign">

<br>

<button onclick="previewCard()">Preview</button>
<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadPDF()">Download PDF</button>


<!-- CARD -->

<div id="card">

<div class="header">

<div class="logo">
<img id="logoPreview">
</div>

<div class="school">
<h2 id="schoolNamePreview">School Name</h2>
<p id="schoolAddressPreview">Address</p>
</div>

</div>

<div class="title">IDENTITY CARD</div>

<div class="content">

<div>
<div class="photo">
<img id="photoPreview">
</div>
<div class="year" id="yearPreview">2024</div>
</div>

<div class="details">

<div>Name : <span id="namePreview"></span></div>
<div>Father : <span id="fatherPreview"></span></div>
<div>DOB : <span id="dobPreview"></span></div>
<div>Class : <span id="classPreview"></span></div>
<div>Sec : <span id="sectionPreview"></span></div>
<div>Roll : <span id="rollPreview"></span></div>
<div>Mobile : <span id="mobilePreview"></span></div>

</div>

</div>

<div class="wave"></div>

<div class="signature">

<div class="signbox">
<img id="signPreview" style="width:100%;height:100%">
</div>

<div class="signtxt">Signature of principal</div>

</div>

</div>

</div>

<script>

function previewCard(){

document.getElementById("schoolNamePreview").innerText=document.getElementById("schoolName").value;
document.getElementById("schoolAddressPreview").innerText=document.getElementById("schoolAddress").value;

document.getElementById("namePreview").innerText=document.getElementById("studentName").value;
document.getElementById("fatherPreview").innerText=document.getElementById("fatherName").value;
document.getElementById("dobPreview").innerText=document.getElementById("dob").value;
document.getElementById("classPreview").innerText=document.getElementById("class").value;
document.getElementById("sectionPreview").innerText=document.getElementById("section").value;
document.getElementById("rollPreview").innerText=document.getElementById("roll").value;
document.getElementById("mobilePreview").innerText=document.getElementById("mobile").value;

document.getElementById("yearPreview").innerText=document.getElementById("year").value;

loadImage("photo","photoPreview");
loadImage("logo","logoPreview");
loadImage("sign","signPreview");

}

function loadImage(input,id){

const file=document.getElementById(input).files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){
document.getElementById(id).src=e.target.result;
}

reader.readAsDataURL(file);

}

}

/* PNG */

function downloadPNG(){

html2canvas(document.getElementById("card")).then(canvas=>{

const link=document.createElement("a");

link.download="school-id.png";

link.href=canvas.toDataURL();

link.click();

});

}

/* PDF */

async function downloadPDF(){

const {jsPDF}=window.jspdf;

html2canvas(document.getElementById("card")).then(canvas=>{

const img=canvas.toDataURL("image/png");

const pdf=new jsPDF("landscape","mm",[85.6,54]);

pdf.addImage(img,"PNG",0,0,85.6,54);

pdf.save("school-id-card.pdf");

});

}

</script>

</body>
  </html>
