<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School ID Card Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin:6px 0;
}

button{
padding:10px 20px;
margin:5px;
background:#1976d2;
color:white;
border:none;
cursor:pointer;
}

#card{
width:350px;
height:210px;
background:white;
border-radius:12px;
overflow:hidden;
position:relative;
margin-top:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.header{
background:#c89b2d;
color:white;
text-align:center;
padding:10px;
position:relative;
}

.logo{
position:absolute;
left:10px;
top:10px;
width:40px;
height:40px;
border-radius:50%;
background:white;
overflow:hidden;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

.school-name{
font-size:20px;
font-weight:bold;
}

.school-address{
font-size:11px;
}

.title{
text-align:center;
font-weight:bold;
margin-top:5px;
}

.card-body{
display:flex;
padding:10px;
position:relative;
z-index:2;
}

.photo{
width:80px;
height:100px;
border:3px solid #c89b2d;
overflow:hidden;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

.details{
margin-left:10px;
font-size:13px;
}

.year{
position:absolute;
left:15px;
bottom:45px;
font-size:13px;
}

.red{
position:absolute;
bottom:0;
left:0;
width:100%;
height:70px;
background:linear-gradient(to right,#b30000,#e53935);
border-top-left-radius:100px;
z-index:1;
}

.signature{
position:absolute;
right:20px;
bottom:20px;
width:110px;
height:25px;
background:white;
text-align:center;
font-size:10px;
line-height:25px;
}

</style>
</head>

<body>

<div class="container">

<h2>School ID Card Generator</h2>

<input id="schoolName" placeholder="School Name">
<input id="schoolAddress" placeholder="School Address">
<input id="name" placeholder="Student Name">
<input id="father" placeholder="Father Name">
<input id="dob" placeholder="DOB">
<input id="class" placeholder="Class">
<input id="sec" placeholder="Section">
<input id="roll" placeholder="Roll">
<input id="mobile" placeholder="Mobile">
<input id="year" placeholder="Year">

Student Photo
<input type="file" id="photo">

School Logo
<input type="file" id="logo">

Principal Signature
<input type="file" id="sign">

<br>

<button onclick="preview()">Preview</button>
<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadPDF()">Download PDF</button>


<div id="card">

<div class="header">

<div class="logo">
<img id="logoPreview">
</div>

<div class="school-name" id="schoolNameShow">School Name</div>
<div class="school-address" id="schoolAddressShow">School Address</div>

</div>

<div class="title">IDENTITY CARD</div>

<div class="card-body">

<div class="photo">
<img id="photoPreview">
</div>

<div class="details">
<div id="nameShow">Name :</div>
<div id="fatherShow">Father :</div>
<div id="dobShow">DOB :</div>
<div id="classShow">Class :</div>
<div id="secShow">Sec :</div>
<div id="rollShow">Roll :</div>
<div id="mobileShow">Mobile :</div>
</div>

</div>

<div class="year" id="yearShow">2024-25</div>

<div class="red"></div>

<div class="signature">
Signature of principal
</div>

</div>

</div>

<script>

function preview(){

schoolNameShow.innerText=schoolName.value
schoolAddressShow.innerText=schoolAddress.value
nameShow.innerText="Name : "+name.value
fatherShow.innerText="Father : "+father.value
dobShow.innerText="DOB : "+dob.value
classShow.innerText="Class : "+document.getElementById("class").value
secShow.innerText="Sec : "+sec.value
rollShow.innerText="Roll : "+roll.value
mobileShow.innerText="Mobile : "+mobile.value
yearShow.innerText=year.value

let reader=new FileReader()
reader.onload=function(e){
photoPreview.src=e.target.result
}
reader.readAsDataURL(photo.files[0])

let reader2=new FileReader()
reader2.onload=function(e){
logoPreview.src=e.target.result
}
reader2.readAsDataURL(logo.files[0])

}

function downloadPNG(){

html2canvas(document.getElementById("card")).then(canvas=>{
let link=document.createElement("a")
link.download="id-card.png"
link.href=canvas.toDataURL()
link.click()
})

}

function downloadPDF(){

html2canvas(document.getElementById("card")).then(canvas=>{

const {jsPDF}=window.jspdf
let pdf=new jsPDF("landscape")

let img=canvas.toDataURL("image/png")

pdf.addImage(img,'PNG',20,20,250,150)
pdf.save("id-card.pdf")

})

}

</script>

</body>
</html>
