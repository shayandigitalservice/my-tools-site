<!DOCTYPE html>
<html>
<head>
<title>School ID Card Generator</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

input,select{
padding:8px;
margin:5px;
width:200px;
}

button{
padding:10px 15px;
margin-top:10px;
cursor:pointer;
}

#idCard{

width:420px;
height:250px;
border-radius:10px;
color:white;
padding:15px;
margin:auto;
margin-top:20px;
position:relative;

}

.school{
text-align:center;
font-weight:bold;
font-size:18px;
}

.address{
text-align:center;
font-size:12px;
margin-bottom:10px;
}

.cardTitle{
text-align:center;
font-weight:bold;
margin-bottom:10px;
}

.details{
float:left;
width:60%;
font-size:14px;
}

.photo{
float:right;
width:90px;
height:110px;
border:2px solid white;
object-fit:cover;
}

.session{
position:absolute;
bottom:5px;
width:100%;
text-align:center;
font-size:12px;
}

</style>

</head>

<body>

<h2>School ID Card Generator</h2>

<input id="name" placeholder="Student Name"><br>
<input id="father" placeholder="Father Name"><br>
<input id="class" placeholder="Class"><br>
<input id="section" placeholder="Section"><br>
<input id="phone" placeholder="Phone Number"><br>

<br>

Photo Upload  
<input type="file" id="uploadPhoto">

<br><br>

Color Template

<select id="cardColor">

<option value="#1e3a8a">Blue</option>
<option value="#0f172a">Dark Blue</option>
<option value="#38bdf8">Sky Blue</option>
<option value="#dc2626">Red</option>
<option value="#7f1d1d">Dark Red</option>
<option value="#16a34a">Green</option>
<option value="#14532d">Dark Green</option>
<option value="#f97316">Orange</option>
<option value="#7c3aed">Purple</option>
<option value="#ec4899">Pink</option>
<option value="#0d9488">Teal</option>
<option value="#4f46e5">Indigo</option>
<option value="#78350f">Brown</option>
<option value="#000000">Black</option>
<option value="#d4af37">Gold</option>

</select>

<br>

<button onclick="generateCard()">Generate ID</button>

<button onclick="downloadCard()">Download PNG</button>

<div id="idCard">

<div class="school">
AGGARWAL PUBLIC SCHOOL
</div>

<div class="address">
Opp. Post Office Main Bazar Ballabgarh  
Ph. 7291973071 , 7291973072
</div>

<div class="cardTitle">
IDENTITY CARD
</div>

<div class="details">

Name : <span id="dname"></span><br><br>

S/O D/O : <span id="dfather"></span><br><br>

Class : <span id="dclass"></span><br><br>

Section : <span id="dsection"></span><br><br>

Ph No : <span id="dphone"></span>

</div>

<img id="photo" class="photo">

<div class="session">
SESSION 2023 - 2024
</div>

</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

function generateCard(){

document.getElementById("dname").innerText =
document.getElementById("name").value;

document.getElementById("dfather").innerText =
document.getElementById("father").value;

document.getElementById("dclass").innerText =
document.getElementById("class").value;

document.getElementById("dsection").innerText =
document.getElementById("section").value;

document.getElementById("dphone").innerText =
document.getElementById("phone").value;

document.getElementById("idCard").style.background =
document.getElementById("cardColor").value;

}

document.getElementById("uploadPhoto").onchange=function(e){

let reader = new FileReader();

reader.onload=function(){
document.getElementById("photo").src = reader.result;
}

reader.readAsDataURL(e.target.files[0]);

}

function downloadCard(){

html2canvas(document.getElementById("idCard")).then(canvas=>{

let link=document.createElement("a");

link.download="idcard.png";

link.href=canvas.toDataURL();

link.click();

});

}

</script>

</body>
  </html>
