<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>School ID Card Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

input{
padding:8px;
margin:5px;
width:250px;
}

button{
padding:10px 20px;
margin:10px;
}

.card{

width:340px;
height:215px;
background:white;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
margin:auto;
position:relative;
overflow:hidden;

}

.top{

background:#1e3a8a;
color:white;
padding:8px;
text-align:center;

}

.school{

font-size:18px;
font-weight:bold;

}

.address{

font-size:10px;

}

.logo{

position:absolute;
top:10px;
left:10px;
width:40px;

}

.details{

position:absolute;
left:25px;
top:90px;
font-size:14px;
line-height:24px;
font-weight:bold;

}

.photo{

position:absolute;
right:25px;
top:85px;
width:90px;
height:105px;
border:2px solid black;
object-fit:cover;

}

.sign{

position:absolute;
right:40px;
top:190px;
width:60px;

}

.session{

position:absolute;
bottom:0;
width:100%;
background:#1e3a8a;
color:white;
font-size:13px;
padding:4px;

}

</style>

</head>

<body>

<h2>School ID Card Generator</h2>

<input id="school" placeholder="School Name"><br>

<input id="address" placeholder="School Address"><br>

<input id="phone" placeholder="School Phone"><br>

<input id="session" placeholder="Session"><br>

<input id="name" placeholder="Student Name"><br>

<input id="class" placeholder="Class"><br>

<input id="section" placeholder="Section"><br>

<input id="roll" placeholder="Roll No"><br>

<input id="phno" placeholder="Phone Number"><br>

<br>

Student Photo  
<input type="file" id="photo"><br>

School Logo  
<input type="file" id="logo"><br>

Principal Signature  
<input type="file" id="sign"><br>

<button onclick="preview()">Preview</button>

<button onclick="downloadPDF()">Download PDF</button>

<br><br>

<div class="card" id="card">

<img id="logoP" class="logo">

<div class="top">

<div class="school" id="schoolP">School Name</div>

<div class="address">

<span id="addressP"></span><br>
<span id="phoneP"></span>

</div>

</div>

<div class="details">

Name        : <span id="nameP"></span><br>

Class       : <span id="classP"></span><br>

Section     : <span id="sectionP"></span><br>

Roll No     : <span id="rollP"></span><br>

Ph No       : <span id="phnoP"></span>

</div>

<img id="photoP" class="photo">

<img id="signP" class="sign">

<div class="session" id="sessionP">

SESSION

</div>

</div>

<script>

function read(input,target){

let reader=new FileReader()

reader.onload=function(e){

target.src=e.target.result

}

reader.readAsDataURL(input.files[0])

}

photo.onchange=()=>read(photo,photoP)

logo.onchange=()=>read(logo,logoP)

sign.onchange=()=>read(sign,signP)

function preview(){

schoolP.innerText=school.value
addressP.innerText=address.value
phoneP.innerText=phone.value

nameP.innerText=name.value
classP.innerText=class.value
sectionP.innerText=section.value
rollP.innerText=roll.value
phnoP.innerText=phno.value

sessionP.innerText="SESSION "+session.value

}

async function downloadPDF(){

const { jsPDF } = window.jspdf;

html2canvas(card).then(canvas=>{

let img=canvas.toDataURL("image/png")

let pdf=new jsPDF('landscape','px',[340,215])

pdf.addImage(img,'PNG',0,0,340,215)

pdf.save("school-id-card.pdf")

})

}

</script>

</body>
</html>
