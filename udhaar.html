<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Udhaar Manager PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:10px;}
.container{max-width:800px;margin:auto;background:white;padding:15px;border-radius:10px;}
h2{text-align:center;}
input,select,button{
  width:100%;
  max-width:300px;
  padding:12px;
  margin:6px auto;
  border-radius:8px;
  display:block;
  box-sizing:border-box;
  font-size:14px;
}
button{
  background:#2563eb;color:white;border:none;cursor:pointer;text-align:center;
}
button:active{opacity:0.9;}
.smallbtn{
  width:auto;
  padding:6px 10px;
  font-size:12px;
  margin:3px;
}
.card{
  border:1px solid #ccc;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  cursor:pointer;
  text-align:center;
}
table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #000;padding:6px;text-align:center;}
.dashboard{background:#e6f2ff;padding:10px;border-radius:6px;margin-bottom:10px;}
@media (max-width:600px){
  input,select,button{max-width:100%;}
}
</style>
</head>

<body>

<div class="container">

<h2>💰 Udhaar Manager PRO</h2>

<!-- SHOP -->
<input id="shop" placeholder="Shop Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Mobile Number">
<button onclick="saveShop()">Save Shop</button>

<hr>

<!-- DASHBOARD -->
<div id="grandTotalBox" class="dashboard"></div>

<!-- CUSTOMER -->
<input id="cname" placeholder="Customer Name">
<input id="cmobile" placeholder="Mobile Number">
<button onclick="addCustomer()">Add Customer</button>

<input id="search" placeholder="Search Customer" onkeyup="showCustomers()">

<button onclick="downloadExcel()">📊 Download All Data</button>

<div id="customerList"></div>

<hr>

<!-- PROFILE -->
<div id="profile"></div>

</div>

<!-- INSTALL -->
<div style="text-align:center;margin-top:20px;">
<h3>📱 Install App</h3>
<button id="installBtn" style="display:none;">Download App</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("udhaarData")) || [];
let current = null;

/* SAVE SHOP */
function saveShop(){
  localStorage.setItem("shop",shop.value);
  localStorage.setItem("address",address.value);
  localStorage.setItem("phone",phone.value);
  alert("Saved");
}

/* SAVE */
function save(){
  localStorage.setItem("udhaarData",JSON.stringify(data));
  updateDashboard();
}

/* DASHBOARD */
function updateDashboard(){
  let total=0,paid=0;
  let totalCustomers = data.length;
  data.forEach(c=>{
    c.history.forEach(t=>{
      if(t.type=="credit") total+=t.amount;
      else paid+=t.amount;
    });
  });
  let balance = total - paid;
  document.getElementById("grandTotalBox").innerHTML = `
<b>👥 Total Customers: ${totalCustomers}</b><br>
<b>💰 Total Udhaar: ₹${total}</b><br>
<b>💸 Total Paid: ₹${paid}</b><br>
<b>🧾 Balance: ₹${balance}</b>
`;
}

/* ADD CUSTOMER */
function addCustomer(){
  if(!cname.value){alert("Enter name");return;}
  data.push({name:cname.value,mobile:cmobile.value,history:[]});
  save(); cname.value=""; cmobile.value="";
  showCustomers();
}

/* SHOW CUSTOMERS */
function showCustomers(){
  let s=search.value.toLowerCase();
  let html="";
  data.forEach((c,i)=>{
    if(!c.name.toLowerCase().includes(s)) return;
    html+=`<div class="card" onclick="openProfile(${i})">
<b>${c.name}</b><br>${c.mobile}
</div>`;
  });
  customerList.innerHTML=html;
}

/* OPEN PROFILE */
function openProfile(i){
  current=i;
  let c=data[i];
  let total=0,paid=0;
  c.history.forEach(t=>{
    if(t.type=="credit") total+=t.amount;
    else paid+=t.amount;
  });
  let balance=total-paid;
  let html=`
<h3>${c.name}</h3>
Mobile: ${c.mobile}<br>
<b>Total Udhaar:</b> ₹${total}<br>
<b>Paid:</b> ₹${paid}<br>
<b>Unpaid:</b> ₹${balance}
<hr>
<input id="amt" type="number" placeholder="Enter Amount">
<button onclick="addUdhaar()">Add Udhaar</button>
<button onclick="addPayment()">Add Payment</button>
<button onclick="sendReminder()">📲 WhatsApp</button>
<select id="filter">
<option value="all">Full</option>
<option value="today">Today</option>
<option value="week">Last Week</option>
<option value="month">Last Month</option>
</select>
<button onclick="printData()">🖨 Print</button>
<button onclick="deleteCustomer()" style="background:red;">Delete Customer</button>
<h4>History</h4>
<table>
<tr><th>Date</th><th>Type</th><th>Amount</th></tr>
`;
let now=new Date();
c.history.forEach(t=>{
  let d=new Date(t.date);
  let show=true;
  let f=document.getElementById("filter")?.value || "all";
  if(f=="today" && d.toDateString()!=now.toDateString()) show=false;
  if(f=="week" && (now-d)>7*86400000) show=false;
  if(f=="month" && d.getMonth()!=now.getMonth()) show=false;
  if(show){
    html+=`<tr>
<td>${t.date}</td>
<td>${t.type}</td>
<td>₹${t.amount}</td>
</tr>`;
  }
});
html+=`</table>`;
profile.innerHTML=html;
}

/* ADD UDHAAR */
function addUdhaar(){
  let amt=+document.getElementById("amt").value;
  if(!amt){alert("Enter amount");return;}
  data[current].history.push({type:"credit",amount:amt,date:new Date().toLocaleString()});
  save();
  openProfile(current);
}

/* ADD PAYMENT */
function addPayment(){
  let amt=+document.getElementById("amt").value;
  if(!amt){alert("Enter amount");return;}
  data[current].history.push({type:"paid",amount:amt,date:new Date().toLocaleString()});
  save();
  openProfile(current);
}

/* WHATSAPP */
function sendReminder(){
  let c=data[current];
  let total=0,paid=0;
  c.history.forEach(t=>{if(t.type=="credit") total+=t.amount; else paid+=t.amount;});
  let bal=total-paid;
  let msg=`🧾 Udhaar Reminder
Name: ${c.name}
Total: ₹${total}
Paid: ₹${paid}
Balance: ₹${bal}
Please pay soon 🙏`;
  let url="https://wa.me/"+(c.mobile||"")+"?text="+encodeURIComponent(msg);
  window.open(url);
}

/* PRINT CLEAN */
function printData(){
  let content = document.getElementById("profile").cloneNode(true);
  let btns = content.querySelectorAll("button");
  btns.forEach(b => b.remove());

  let shopName = localStorage.getItem("shop") || "";
  let shopAddress = localStorage.getItem("address") || "";
  let shopPhone = localStorage.getItem("phone") || "";

  let shopInfoHTML = `
    <h2>${shopName}</h2>
    <p>${shopAddress}</p>
    <p>${shopPhone}</p>
    <hr>
  `;

  let win = window.open('','','width=400,height=600');

  win.document.write(`
  <html>
  <head>
  <style>
  body{font-family:Arial;padding:10px;}
  table{width:100%;border-collapse:collapse;}
  td,th{border:1px solid #000;padding:6px;text-align:center;}
  </style>
  </head>
  <body>
  ${shopInfoHTML}
  ${content.innerHTML}
  </body>
  </html>
  `);

  win.document.close();
  win.print();
}
<html>
<head>
<style>
body{font-family:Arial;padding:10px;}
table{width:100%;border-collapse:collapse;}
td,th{border:1px solid #000;padding:6px;text-align:center;}
</style>
</head>
<body>
${content.innerHTML}
</body>
</html>
`);
  win.document.close();
  win.print();
}

/* DELETE */
function deleteCustomer(){
  if(confirm("Delete?")){
    data.splice(current,1);
    save();
    profile.innerHTML="";
    showCustomers();
  }
}

/* EXCEL */
function downloadExcel(){
  let csv="Name,Mobile,Type,Amount,Date\n";
  data.forEach(c=>{
    c.history.forEach(h=>{
      csv+=`${c.name},${c.mobile},${h.type},${h.amount},${h.date}\n`;
    });
  });
  let blob=new Blob([csv]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="udhaar_data.csv";
  a.click();
}

/* INIT */
showCustomers();
updateDashboard();

/* INSTALL APP */
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBtn").style.display = "block";
});
document.getElementById("installBtn").addEventListener("click", async () => {
  if(deferredPrompt){
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
  }
});
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
