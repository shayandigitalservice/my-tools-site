<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Udhaar Manager PRO</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:10px;}
.dark{background:#111;color:white;}
.container{max-width:700px;margin:auto;background:white;padding:15px;border-radius:10px;}
.dark .container{background:#1f1f1f;}
h2{text-align:center;}

/* Inputs */
input, select {
  width:100%; padding:10px; margin:6px 0; border-radius:6px; border:1px solid #ccc;
  box-sizing: border-box;
}

/* Buttons */
button {
  width: 100%;           /* Full width */
  max-width: 300px;      /* Optional max width */
  padding: 12px;         /* Height */
  margin: 6px auto;      /* Center horizontally */
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  font-size: 14px;
  display: block;
  text-align: center;
  cursor: pointer;
}

.smallbtn {
  width:auto;
  padding:5px;
  margin:2px;
  font-size:12px;
}

/* Cards */
.card{border:1px solid #ccc;padding:10px;margin:6px 0;border-radius:6px;}
.red{background:#ffcccc;}
.orange{background:#ffe0b3;}
.green{background:#ccffcc;}

/* Tables */
table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #000;padding:6px;text-align:center;font-size:13px;}

/* Dashboard Box */
#dashboard{
  background:#e0f0ff;
  padding:10px;
  border-radius:6px;
  margin-bottom:10px;
  text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2>💰 Udhaar Manager PRO</h2>

<button onclick="toggleDark()">🌙 Dark Mode</button>

<!-- SHOP DETAILS -->
<input id="shopName" placeholder="Shop Name">
<input id="shopAddress" placeholder="Address">
<input id="shopMobile" placeholder="Mobile Number">
<button onclick="saveShop()">Save Shop</button>

<!-- DASHBOARD -->
<div id="dashboard"></div>

<!-- CUSTOMER -->
<input id="name" placeholder="Customer Name">
<input id="mobile" placeholder="Mobile Number">
<button onclick="addCustomer()">Add Customer</button>

<!-- SEARCH -->
<input id="search" placeholder="Search Customer" onkeyup="showCustomers()">

<!-- DOWNLOAD DATA -->
<button onclick="downloadAllData()">📊 Download All Data</button>

<!-- CUSTOMER LIST -->
<div id="customerList"></div>

<!-- CUSTOMER HISTORY -->
<div id="history"></div>

<!-- INSTALL APP -->
<div style="text-align:center;margin-top:30px;">
<h3>📱 Install App</h3>
<button id="installBtn" style="display:none;">Download App</button>
<p style="font-size:12px;color:gray;">Fast • Offline • Easy</p>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("udhaarData")) || [];
let deferredPrompt;

/* SAVE SHOP */
function saveShop(){
  let shop={name:shopName.value,address:shopAddress.value,mobile:shopMobile.value};
  localStorage.setItem("shopData", JSON.stringify(shop));
  alert("Shop Saved!");
  updateDashboard();
}

/* DARK MODE */
function toggleDark(){document.body.classList.toggle("dark");}

/* ADD CUSTOMER */
function addCustomer(){
  if(!name.value || !mobile.value){alert("Fill all fields!"); return;}
  data.push({name:name.value,mobile:mobile.value,history:[]});
  save(); name.value=""; mobile.value="";
  showCustomers();
}

/* SAVE DATA */
function save(){
  localStorage.setItem("udhaarData", JSON.stringify(data));
  updateDashboard();
}

/* UPDATE DASHBOARD */
function updateDashboard(){
  let totalC=0,totalP=0;
  data.forEach(c=>{
    let r=calc(c.history);
    totalC+=r.c; totalP+=r.p;
  });
  document.getElementById("dashboard").innerHTML=`
    🧑‍🤝‍🧑 Total Customers: ${data.length}<br>
    💰 Total Udhaar: ₹${totalC}<br>
    💵 Total Paid: ₹${totalP}<br>
    📄 Balance: ₹${totalC-totalP}
  `;
}

/* CALCULATE CUSTOMER BALANCE */
function calc(h){
  let c=0,p=0;
  h.forEach(t=> t.type=="credit"?c+=t.amt:p+=t.amt);
  return {c,p,b:c-p};
}

/* SHOW CUSTOMER LIST */
function showCustomers(){
  let s=search.value.toLowerCase();
  let html="";
  data.forEach((c,i)=>{
    if(!c.name.toLowerCase().includes(s)) return;
    let r=calc(c.history);
    let color=r.b>1000?'red':r.b>0?'orange':'green';
    html+=`<div class="card ${color}">
      <b>${c.name}</b><br>Balance: ₹${r.b}<br>
      <button class="smallbtn" onclick="viewHistory(${i})">View</button>
      <button class="smallbtn" onclick="printReceipt(${i})">Print</button>
      <button class="smallbtn" onclick="sendWhatsApp(${i})">WhatsApp</button>
      <button class="smallbtn" onclick="deleteCustomer(${i})">Delete</button>
    </div>`;
  });
  document.getElementById("customerList").innerHTML=html;
}

/* VIEW HISTORY */
function viewHistory(i){
  let c=data[i];
  let html=`<h3>${c.name} History</h3>`;
  c.history.forEach(t=>{
    html+=`${t.date} - ${t.product||""} ${t.type=="credit"?"+":"-"}₹${t.amt}<br>`;
  });
  document.getElementById("history").innerHTML=html;
}

/* ADD UDHAAR */
function addUdhaar(i){
  let amt=+prompt("Enter Udhaar amount:");
  let prod=prompt("Enter product/item (optional):");
  let date=new Date().toLocaleString();
  data[i].history.push({type:"credit",amt:amt,product:prod,date:date});
  save();
  showCustomers();
}

/* ADD PAYMENT */
function addPayment(i){
  let amt=+prompt("Enter payment amount:");
  let date=new Date().toLocaleString();
  data[i].history.push({type:"paid",amt:amt,date:date});
  save();
  showCustomers();
}

/* DELETE CUSTOMER */
function deleteCustomer(i){
  if(confirm("Delete customer?")){data.splice(i,1); save(); showCustomers();}
}

/* PRINT RECEIPT */
function printReceipt(i){
  let c=data[i]; 
  let shop=JSON.parse(localStorage.getItem("shopData"))||{name:"Shop"};
  let credit=0,paid=0; 
  let html=`<h2>${shop.name}</h2><h3>Udhaar Receipt</h3><b>${c.name}</b><br>`;
  c.history.forEach(t=>{
    if(t.type=="credit") credit+=t.amt;
    else paid+=t.amt;
    html+=`${t.date} - ${t.product||t.type} - ₹${t.amt}<br>`;
  });
  let bal=credit-paid;
  html+=`<hr>Total: ₹${credit}<br>Paid: ₹${paid}<br>Balance: ₹${bal}<br>`;
  let win=window.open('','','width=400,height=600');
  win.document.write(html); win.document.close(); win.print();
}

/* WHATSAPP REMINDER */
function sendWhatsApp(i){
  let r=calc(data[i].history);
  let msg=`Hello ${data[i].name}, pending ₹${r.b}`;
  window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

/* DOWNLOAD ALL DATA CSV */
function downloadAllData(){
  let csv="Name,Mobile,Credit,Paid,Balance\n";
  data.forEach(c=>{
    let r=calc(c.history);
    csv+=`${c.name},${c.mobile},${r.c},${r.p},${r.b}\n`;
  });
  let a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv]));
  a.download="udhaar_data.csv";
  a.click();
}

/* INSTALL APP PWA */
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault(); deferredPrompt=e;
  document.getElementById("installBtn").style.display="block";
});

document.getElementById("installBtn").addEventListener("click", async ()=>{
  if(deferredPrompt){deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null;}
});

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}

/* INITIAL CALLS */
showCustomers(); updateDashboard();
</script>

</body>
</html>
