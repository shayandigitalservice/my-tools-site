<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Excel to PDF | Shayan Smart Tools</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f1f5f9; color: #334155; padding: 15px; }
        .header { background: #2563eb; color: white; text-align: center; padding: 25px; border-radius: 12px; margin-bottom: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

        .upload-area { border: 2px dashed #2563eb; padding: 40px; border-radius: 12px; text-align: center; cursor: pointer; background: #f8fafc; transition: 0.3s; }
        .upload-area:hover { background: #eff6ff; }
        
        /* Preview Section */
        #preview-section { display: none; margin-top: 30px; border-top: 2px solid #e2e8f0; padding-top: 20px; }
        .pdf-frame { 
            width: 100%; height: 400px; border: 1px solid #cbd5e1; 
            border-radius: 8px; background: #525659; overflow-y: auto; 
            display: flex; justify-content: center; padding: 20px;
        }
        #pdf-render { width: 100%; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.3); min-height: 500px; padding: 40px; font-size: 10px; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-blue { background: #2563eb; color: white; }
        .btn-green { background: #16a34a; color: white; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; border: 1px solid #000; }
        th, td { border: 1px solid #000; padding: 5px; text-align: left; word-break: break-all; }
        th { background: #eee; }
    </style>
</head>
<body>

<div class="header"><h1>📊 Shayan Pro Converter</h1></div>

<div class="container">
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <p style="font-size: 18px; font-weight: 600;">📁 Upload Excel Files</p>
        <p style="font-size: 12px; color: #64748b;">Assamese, Hindi, Bengali & English Ready</p>
        <input type="file" id="fileInput" accept=".xlsx,.xls" multiple style="display:none">
    </div>

    <div id="preview-section">
        <h3 style="color: #2563eb; margin-bottom: 10px;">👀 Live PDF Preview:</h3>
        <div class="pdf-frame">
            <div id="pdf-render"></div>
        </div>
        
        <div class="btn-group">
            <button class="btn btn-blue" onclick="location.reload()">Reset</button>
            <button class="btn btn-green" onclick="downloadAll()">⬇️ Download All PDFs</button>
        </div>
    </div>
</div>

<script>
    let currentFiles = [];
    const { jsPDF } = window.jspdf;

    document.getElementById('fileInput').onchange = async function(e) {
        currentFiles = e.target.files;
        if (currentFiles.length === 0) return;

        document.getElementById('preview-section').style.display = 'block';
        const file = currentFiles[0];
        const data = await file.arrayBuffer();
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        
        // Preview ko HTML table format mein render karna (taaki Assamese dikhe)
        const htmlData = XLSX.utils.sheet_to_html(sheet);
        document.getElementById('pdf-render').innerHTML = `
            <h2 style="text-align:center; text-decoration: underline;">${file.name}</h2>
            <br>${htmlData}
        `;
    };

    function downloadAll() {
        for (let file of currentFiles) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const doc = new jsPDF({ orientation: 'p', unit: 'pt', format: 'a4' });

                // Language Support Trick: 
                // Assamese/Hindi ke liye hum HTML-to-PDF method use karenge 
                // Kyunki standard .text() method languages ko block kar deta hai
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = XLSX.utils.sheet_to_html(sheet);
                tempDiv.style.width = "500px";
                tempDiv.style.fontSize = "10px";
                tempDiv.style.fontFamily = "sans-serif"; // Global fonts support languages better in browser

                doc.html(tempDiv, {
                    callback: function(pdf) {
                        pdf.save(file.name.replace(/\.[^/.]+$/, "") + ".pdf");
                    },
                    x: 40,
                    y: 40,
                    width: 500,
                    windowWidth: 600
                });
            };
            reader.readAsArrayBuffer(file);
        }
    }
</script>

</body>
</html>
