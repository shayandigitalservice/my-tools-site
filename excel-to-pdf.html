<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel to PDF | Shayan Smart Tools</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f1f5f9; padding: 15px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { background: #2563eb; color: white; text-align: center; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .upload-area { border: 2px dashed #2563eb; padding: 25px; text-align: center; border-radius: 10px; background: #fafafa; margin-bottom: 15px; cursor: pointer; }
        
        #pdf-preview-section { display: none; margin-top: 15px; }
        .preview-box { 
            width: 100%; height: 450px; border: 2px solid #ddd; border-radius: 10px; 
            overflow: auto; background: #525659; display: flex; justify-content: center;
        }
        #pdf-canvas { width: 100%; background: white; }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; color: white; }
        .btn-blue { background: #2563eb; }
        .btn-green { background: #16a34a; }
        #status { text-align: center; font-size: 14px; color: #2563eb; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header"><h3>📊 Excel to PDF Converter</h3></div>

<div class="container">
    <div id="status">Select up to 50 Excel files</div>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <b>📁 Click to Select Multiple Files</b>
        <input type="file" id="fileInput" accept=".xlsx,.xls" multiple style="display:none">
        <div id="file-list-info" style="font-size: 12px; margin-top: 10px; color: #555;"></div>
    </div>

    <button class="btn btn-blue" onclick="convertToPDFPreview()">1. Convert & Preview PDF</button>

    <div id="pdf-preview-section">
        <h4 id="preview-title" style="margin-bottom:10px;">🔍 Real PDF Preview:</h4>
        <div class="preview-box">
            <canvas id="pdf-canvas"></canvas>
        </div>
        
        <button class="btn btn-green" onclick="downloadAllPDFs()">2. Download All PDFs</button>
        <button class="btn" style="background:#64748b;" onclick="location.reload()">Clear</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>
    let allGeneratedDocs = [];

    // Show how many files selected
    document.getElementById('fileInput').onchange = function() {
        const files = this.files;
        if(files.length > 50) {
            alert("Maximum 50 files allowed!");
            this.value = "";
            return;
        }
        document.getElementById('file-list-info').innerText = files.length + " files selected.";
    };

    async function convertToPDFPreview() {
        const fileInput = document.getElementById('fileInput');
        const files = fileInput.files;
        if (files.length === 0) return alert("Pehle files select karein!");

        document.getElementById('status').innerText = "⚙️ Processing " + files.length + " files...";
        allGeneratedDocs = [];

        const { jsPDF } = window.jspdf;

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data, { type: 'array' });
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });

            const doc = new jsPDF('p', 'pt', 'a4');
            doc.autoTable({
                head: [jsonData[0]],
                body: jsonData.slice(1),
                startY: 40,
                theme: 'grid',
                styles: { fontSize: 8 }
            });

            allGeneratedDocs.push({
                doc: doc,
                name: file.name.replace(/\.[^/.]+$/, "") + ".pdf"
            });

            // Pehli file ka preview dikhao
            if (i === 0) {
                await renderPreview(doc);
                document.getElementById('preview-title').innerText = "🔍 Previewing: " + file.name;
            }
        }

        document.getElementById('pdf-preview-section').style.display = 'block';
        document.getElementById('status').innerText = "✅ " + files.length + " Files Ready!";
    }

    async function renderPreview(doc) {
        const pdfData = doc.output('arraybuffer');
        const loadingTask = pdfjsLib.getDocument({ data: pdfData });
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        
        const canvas = document.getElementById('pdf-canvas');
        const context = canvas.getContext('2d');
        const viewport = page.getViewport({ scale: 1.2 });

        canvas.height = viewport.height;
        canvas.width = viewport.width;

        await page.render({ canvasContext: context, viewport: viewport }).promise;
    }

    function downloadAllPDFs() {
        if (allGeneratedDocs.length === 0) return;
        allGeneratedDocs.forEach(item => {
            item.doc.save(item.name);
        });
    }
</script>

</body>
</html>
