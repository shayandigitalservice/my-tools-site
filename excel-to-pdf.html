<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Multi-Language Excel to PDF Converter 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Indic:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Noto Sans Indic', sans-serif; }
        body { background: #f0f2f5; padding: 15px; color: #333; }
        .header { background: #2563eb; color: white; text-align: center; padding: 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { max-width: 850px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        .upload-card { border: 2px dashed #2563eb; padding: 40px 20px; border-radius: 12px; text-align: center; cursor: pointer; background: #f8fafc; transition: 0.3s; }
        .upload-card:hover { background: #eff6ff; }
        
        /* Preview Section */
        #preview-wrap { display: none; margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .pdf-page-view { 
            background: #e4e4e4; padding: 20px; border-radius: 8px; 
            max-height: 500px; overflow: auto; display: flex; justify-content: center; 
        }
        #capture-node { 
            background: white; width: 100%; min-width: 600px; padding: 40px; 
            box-shadow: 0 0 15px rgba(0,0,0,0.2); font-family: 'Noto Sans Indic', sans-serif; 
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; border: 1px solid #444; }
        th, td { border: 1px solid #444; padding: 10px; text-align: left; font-size: 13px; color: #000; }
        th { background: #f3f4f6; font-weight: bold; }

        .btn-box { display: flex; gap: 15px; margin-top: 25px; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-dl { background: #16a34a; color: white; box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3); }
        .btn-reset { background: #64748b; color: white; }
        
        #loader { text-align: center; margin: 15px 0; color: #2563eb; font-weight: 600; display: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>📊 Shayan Universal Converter</h1>
    <p>Excel to PDF with UTF-8 Language Support</p>
</div>

<div class="container">
    <div class="upload-card" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <p style="font-size: 20px; font-weight: 600;">📁 Upload Excel Files (Max 50)</p>
        <p style="font-size: 13px; color: #666; margin-top: 5px;">Supported: Assamese, Hindi, Bengali, English</p>
        <input type="file" id="fileInput" accept=".xlsx,.xls" multiple style="display:none">
        <div id="statusMsg" style="margin-top:10px; color:#2563eb; font-weight:bold;"></div>
    </div>

    <div id="loader">⚙️ Converting... Please wait.</div>

    <div id="preview-wrap">
        <h3 style="margin-bottom:15px; color: #1e40af;">👀 Real PDF Preview (UTF-8):</h3>
        <div class="pdf-page-view">
            <div id="capture-node">
                </div>
        </div>
        
        <div class="btn-box">
            <button class="btn btn-reset" onclick="location.reload()">Clear All</button>
            <button class="btn btn-dl" id="finalBtn" onclick="runBulkExport()">⬇️ Download All PDFs</button>
        </div>
    </div>
</div>

<script>
    let batchFiles = [];

    document.getElementById('fileInput').onchange = async function(e) {
        batchFiles = e.target.files;
        if (batchFiles.length === 0) return;

        document.getElementById('statusMsg').innerText = `✅ ${batchFiles.length} Files Selected`;
        document.getElementById('preview-wrap').style.display = 'block';

        // Pehli file ka preview dikhao
        const file = batchFiles[0];
        const data = await file.arrayBuffer();
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const html = XLSX.utils.sheet_to_html(sheet);

        // UTF-8 content render
        document.getElementById('capture-node').innerHTML = `
            <h2 style="text-align:center; margin-bottom:20px; border-bottom: 2px solid #333;">${file.name}</h2>
            ${html}
        `;
    };

    async function runBulkExport() {
        const btn = document.getElementById('finalBtn');
        const loader = document.getElementById('loader');
        
        btn.disabled = true;
        btn.innerText = "Processing...";
        loader.style.display = "block";

        const { jsPDF } = window.jspdf;

        for (let file of batchFiles) {
            // Worker Div (Invisible but used for UTF-8 Capture)
            const worker = document.createElement('div');
            worker.style.width = "750px"; // Wider for desktop feel
            worker.style.padding = "40px";
            worker.style.background = "white";
            worker.style.position = "absolute";
            worker.style.left = "-9999px"; // Hide from view
            
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data, { type: 'array' });
            const html = XLSX.utils.sheet_to_html(workbook.Sheets[workbook.SheetNames[0]]);
            
            worker.innerHTML = `<h2 style="text-align:center;">${file.name}</h2><br>${html}`;
            document.body.appendChild(worker);

            const doc = new jsPDF('p', 'pt', 'a4');

            // html2canvas capture (Best for Assamese/UTF-8)
            await doc.html(worker, {
                callback: function(pdf) {
                    pdf.save(file.name.replace(/\.[^/.]+$/, "") + ".pdf");
                    document.body.removeChild(worker);
                },
                x: 20,
                y: 20,
                width: 550,
                windowWidth: 800
            });
        }

        loader.style.display = "none";
        btn.disabled = false;
        btn.innerText = "⬇️ Download All PDFs";
        alert("Sari files download ho gayi hain!");
    }
</script>

</body>
</html>
