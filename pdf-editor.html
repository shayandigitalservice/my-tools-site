<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shayan Smart PDF Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body { background: #525659; overflow-x: hidden; }
        .nav { background: #2563eb; color: white; padding: 15px; text-align: center; font-weight: 700; position: fixed; top: 0; width: 100%; z-index: 100; }
        
        .upload-bar { background: white; padding: 20px; margin-top: 55px; text-align: center; }
        
        #viewer-container { display: flex; justify-content: center; padding: 10px; margin-bottom: 100px; }
        canvas { background: white; box-shadow: 0 0 20px rgba(0,0,0,0.4); max-width: 100%; height: auto; cursor: pointer; }

        /* Bottom Sheet Style Editor */
        #editor-sheet { 
            position: fixed; bottom: -100%; left: 0; width: 100%; 
            background: white; border-radius: 20px 20px 0 0; 
            padding: 20px; box-shadow: 0 -10px 30px rgba(0,0,0,0.3); 
            transition: 0.4s; z-index: 1000;
        }
        #editor-sheet.active { bottom: 0; }
        
        .sheet-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .sheet-header b { color: #2563eb; }
        
        input#edit-input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; margin-bottom: 15px; }
        input#edit-input:focus { border-color: #2563eb; }

        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .btn-save { background: #16a34a; color: white; }
        .btn-cancel { background: #ef4444; color: white; }

        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; color: white; justify-content: center; align-items: center; font-size: 20px; }
    </style>
</head>
<body>

<div class="nav">SHAYAN PDF SMART EDITOR</div>

<div class="upload-bar">
    <input type="file" id="pdf-file" accept=".pdf">
    <p style="font-size: 12px; color: #666; margin-top: 5px;">Click on any text in the PDF to edit</p>
</div>

<div id="viewer-container">
    <canvas id="pdf-canvas"></canvas>
</div>

<div id="editor-sheet">
    <div class="sheet-header">
        <b>Edit Selected Text</b>
        <span onclick="closeSheet()" style="color:red; font-weight:bold; cursor:pointer;">Close</span>
    </div>
    <input type="text" id="edit-input">
    <div class="btn-group">
        <button class="btn btn-save" onclick="applyAndDownload()">Done & Download</button>
    </div>
</div>

<div id="loading-overlay">⚙️ Processing...</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    const API = 'https://shayan-pdf-api-1.onrender.com/api/smart-replace';
    
    let pdfDoc = null, scale = 1.5, fileRaw = null, currentData = { old: "", new: "" };
    const canvas = document.getElementById('pdf-canvas');

    document.getElementById('pdf-file').onchange = e => {
        fileRaw = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async function() {
            const data = new Uint8Array(this.result);
            pdfDoc = await pdfjsLib.getDocument(data).promise;
            renderPage();
        };
        reader.readAsArrayBuffer(fileRaw);
    };

    async function renderPage() {
        const page = await pdfDoc.getPage(1);
        const vp = page.getViewport({ scale: scale });
        canvas.height = vp.height; canvas.width = vp.width;
        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
    }

    canvas.onclick = async e => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const page = await pdfDoc.getPage(1);
        const textContent = await page.getTextContent();
        const vp = page.getViewport({ scale: scale });

        textContent.items.forEach(item => {
            const tx = pdfjsLib.Util.transform(vp.transform, item.transform);
            if (x >= tx[4] && x <= tx[4] + item.width && y >= vp.height - tx[5] - item.height && y <= vp.height - tx[5]) {
                currentData.old = item.str;
                openSheet(item.str);
            }
        });
    };

    function openSheet(val) {
        document.getElementById('edit-input').value = val;
        document.getElementById('editor-sheet').classList.add('active');
        document.getElementById('edit-input').focus();
    }

    function closeSheet() {
        document.getElementById('editor-sheet').classList.remove('active');
    }

    async function applyAndDownload() {
        currentData.new = document.getElementById('edit-input').value;
        document.getElementById('loading-overlay').style.display = 'flex';
        closeSheet();

        const fd = new FormData();
        fd.append('file', fileRaw);
        fd.append('search_text', currentData.old);
        fd.append('replace_text', currentData.new);

        try {
            const res = await fetch(API, { method: 'POST', body: fd });
            if(res.ok) {
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = "shayan_edited.pdf";
                a.click();
            } else { alert("Error connecting to API."); }
        } catch(e) { alert("Server is busy."); }
        document.getElementById('loading-overlay').style.display = 'none';
    }
</script>
</body>
</html>
