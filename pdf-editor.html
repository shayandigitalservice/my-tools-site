<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart PDF Editor Pro – Shayan Digital Service</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body { background:#f0f2f5; color:#333; overflow-x: hidden; }
        .header { background:#2563eb; color:white; text-align:center; padding:15px; font-size:20px; font-weight:600; position: sticky; top: 0; z-index: 100; }
        
        .upload-area { background: white; margin: 15px; padding: 20px; border-radius: 12px; text-align: center; border: 2px dashed #2563eb; }
        #pdf-upload { display: none; }
        .btn-upload { background: #2563eb; color: white; padding: 12px 20px; border-radius: 8px; cursor: pointer; display: inline-block; font-weight: 600; }

        /* Viewer Container */
        #viewer-container { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        #pdf-canvas { max-width: 100%; height: auto; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: crosshair; }

        /* Floating Edit Box */
        #edit-popup { 
            position: fixed; display: none; background: white; 
            width: 90%; max-width: 320px; border-radius: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); padding: 20px; 
            z-index: 2000; left: 50%; top: 50%; transform: translate(-50%, -50%);
            border: 2px solid #2563eb;
        }
        #edit-popup h4 { margin-bottom: 10px; color: #1e3a8a; }
        #edit-popup input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-size: 16px; }
        #edit-popup .btn-done { background: #22c55e; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* Preview Section */
        #preview-section { display: none; margin: 20px 15px; background: white; padding: 15px; border-radius: 12px; text-align: center; border: 2px solid #22c55e; }
        #preview-frame { width: 100%; height: 400px; border-radius: 8px; margin-top: 15px; }
        .btn-download { background: #16a34a; color: white; padding: 15px; border-radius: 8px; text-decoration: none; display: block; margin-top: 15px; font-weight: 600; }
        
        .loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 3000; justify-content: center; align-items: center; font-weight: 600; color: #2563eb; }
    </style>
</head>
<body>

<div class="header">Shayan Smart PDF Editor</div>

<div class="upload-area">
    <p style="margin-bottom: 10px;">Select PDF to start editing</p>
    <label for="pdf-upload" class="btn-upload">📁 Upload PDF</label>
    <input type="file" id="pdf-upload" accept=".pdf">
</div>

<div id="loading" class="loading">⚙️ Applying Changes...</div>

<div id="viewer-container">
    <canvas id="pdf-canvas"></canvas>
</div>

<div id="edit-popup">
    <h4>Edit Selected Text</h4>
    <p id="selected-label" style="font-size: 12px; color: #666; margin-bottom: 5px;"></p>
    <input type="text" id="input-replace">
    <button class="btn-done" onclick="applyMagic()">Done & Preview</button>
    <p onclick="this.parentElement.style.display='none'" style="text-align: center; margin-top: 10px; color: red; cursor: pointer; font-size: 14px;">Cancel</p>
</div>

<div id="preview-section">
    <h3>✅ Preview Result</h3>
    <iframe id="preview-frame"></iframe>
    <a id="dl-btn" class="btn-download" download="shayan_edited.pdf">📥 Download Edited PDF</a>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    
    const API = 'https://shayan-pdf-api-1.onrender.com/api/smart-replace';
    let pdfDoc = null, canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d'), 
        selectedWord = "", fileData = null, scale = 1.3;

    // 1. Mobile screen adjustment
    if(window.innerWidth < 600) scale = 0.8;

    document.getElementById('pdf-upload').onchange = e => {
        fileData = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async function() {
            const data = new Uint8Array(this.result);
            pdfDoc = await pdfjsLib.getDocument(data).promise;
            renderPage(1);
        };
        reader.readAsArrayBuffer(fileData);
    };

    async function renderPage(num) {
        const page = await pdfDoc.getPage(num);
        const vp = page.getViewport({ scale: scale });
        canvas.height = vp.height; canvas.width = vp.width;
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
    }

    // 2. Touch/Click Selection
    canvas.onclick = async e => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const page = await pdfDoc.getPage(1);
        const content = await page.getTextContent();
        const vp = page.getViewport({ scale: scale });

        content.items.forEach(item => {
            const tx = pdfjsLib.Util.transform(vp.transform, item.transform);
            if (x >= tx[4] && x <= tx[4] + item.width && y >= vp.height - tx[5] - item.height && y <= vp.height - tx[5]) {
                selectedWord = item.str;
                document.getElementById('edit-popup').style.display = 'block';
                document.getElementById('selected-label').innerText = "Changing: " + selectedWord;
                document.getElementById('input-replace').value = selectedWord;
            }
        });
    };

    // 3. Process & Preview
    async function applyMagic() {
        const replaceVal = document.getElementById('input-replace').value;
        const fd = new FormData();
        fd.append('file', fileData);
        fd.append('search_text', selectedWord);
        fd.append('replace_text', replaceVal);

        document.getElementById('edit-popup').style.display = 'none';
        document.getElementById('loading').style.display = 'flex';

        const res = await fetch(API, { method: 'POST', body: fd });
        if (res.ok) {
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-section').style.display = 'block';
            document.getElementById('preview-frame').src = url;
            document.getElementById('dl-btn').href = url;
            document.getElementById('preview-section').scrollIntoView({ behavior: 'smooth' });
        } else { alert("Error connecting to Shayan API."); }
        document.getElementById('loading').style.display = 'none';
    }
</script>
</body>
</html>
