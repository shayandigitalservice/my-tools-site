<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart PDF Editor with Preview – Shayan Digital</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body { background:#f1f5f9; padding-bottom: 50px; }
        .header { background:#2563eb; color:white; text-align:center; padding:20px; font-size:24px; font-weight:600; }
        
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        #pdf-container { background: #525659; border-radius: 8px; overflow: auto; position: relative; min-height: 400px; padding: 20px; border: 2px solid #ddd; }
        canvas { display: block; margin: 0 auto; background: white; cursor: crosshair; }

        /* Floating Edit Box */
        #edit-box { position: fixed; display: none; background: white; border: 2px solid #2563eb; padding: 15px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000; width: 280px; }
        #edit-box input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 10px; }
        .btn-apply { background: #2563eb; color: white; width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }

        /* Preview Section */
        #preview-section { display: none; margin-top: 30px; background: white; padding: 20px; border-radius: 12px; border: 1px solid #2563eb; text-align: center; }
        #preview-frame { width: 100%; height: 500px; border: 1px solid #ddd; margin-top: 15px; }
        .btn-download { background: #22c55e; color: white; padding: 12px 25px; border-radius: 8px; text-decoration: none; display: inline-block; margin-top: 15px; font-weight: 600; }

        .upload-section { text-align: center; margin-bottom: 20px; background: white; padding: 20px; border-radius: 12px; border: 1px solid #ddd; }
        #loader { display: none; color: #2563eb; font-weight: 600; margin: 10px 0; }
    </style>
</head>
<body>

<div class="header">📄 Shayan Smart PDF Editor (Preview Mode)</div>

<div class="container">
    <div class="upload-section">
        <input type="file" id="pdf-upload" accept=".pdf">
        <div id="loader">Processing...</div>
    </div>

    <div id="pdf-container">
        <canvas id="pdf-render"></canvas>
    </div>

    <div id="edit-box">
        <h4 style="margin-bottom:10px; font-size:14px;">Change Text:</h4>
        <input type="text" id="new-text">
        <button class="btn-apply" onclick="applyChanges()">Apply & Preview</button>
    </div>

    <div id="preview-section">
        <h3 style="color:#2563eb;">✅ Preview Ready</h3>
        <p style="font-size:14px; color:#666;">Check the changes below before downloading.</p>
        <iframe id="preview-frame"></iframe>
        <br>
        <a id="download-link" class="btn-download" download="edited_pdf.pdf">📥 Download Final PDF</a>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    const API_URL = 'https://shayan-pdf-api-1.onrender.com/api/smart-replace';
    let pdfDoc = null, canvas = document.getElementById('pdf-render'), ctx = canvas.getContext('2d'), selectedText = "", currentFile = null, scale = 1.5;

    document.getElementById('pdf-upload').addEventListener('change', async (e) => {
        currentFile = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async function() {
            const typedarray = new Uint8Array(this.result);
            pdfDoc = await pdfjsLib.getDocument(typedarray).promise;
            renderPage(1);
        };
        reader.readAsArrayBuffer(currentFile);
    });

    async function renderPage(num) {
        const page = await pdfDoc.getPage(num);
        const viewport = page.getViewport({ scale: scale });
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
    }

    canvas.addEventListener('click', async (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const page = await pdfDoc.getPage(1);
        const textContent = await page.getTextContent();
        const viewport = page.getViewport({ scale: scale });

        textContent.items.forEach(item => {
            const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
            if (x >= tx[4] && x <= tx[4] + item.width && y >= viewport.height - tx[5] - item.height && y <= viewport.height - tx[5]) {
                selectedText = item.str;
                const box = document.getElementById('edit-box');
                box.style.display = 'block';
                box.style.left = e.clientX + 'px';
                box.style.top = e.clientY + 'px';
                document.getElementById('new-text').value = selectedText;
            }
        });
    });

    async function applyChanges() {
        const replaceText = document.getElementById('new-text').value;
        const formData = new FormData();
        formData.append('file', currentFile);
        formData.append('search_text', selectedText);
        formData.append('replace_text', replaceText);

        document.getElementById('edit-box').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        const response = await fetch(API_URL, { method: 'POST', body: formData });
        if (response.ok) {
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            // Show Preview Section
            document.getElementById('preview-section').style.display = 'block';
            document.getElementById('preview-frame').src = blobUrl;
            document.getElementById('download-link').href = blobUrl;
            
            // Scroll to preview
            document.getElementById('preview-section').scrollIntoView({ behavior: 'smooth' });
        } else {
            alert("API Error! Check if backend is Live.");
        }
        document.getElementById('loader').style.display = 'none';
    }
</script>
</body>
</html>
