<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sejda-Style PDF Editor | Shayan Digital</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background: #eef2f6; }
        .nav { background: #2563eb; color: white; padding: 15px; text-align: center; font-weight: 700; position: sticky; top: 0; z-index: 100; }
        
        #editor-container { position: relative; margin: 20px auto; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; }
        canvas { display: block; }
        
        /* Text Layer for Direct Typing */
        #text-layer { position: absolute; top: 0; left: 0; pointer-events: none; }
        .edit-item { 
            position: absolute; pointer-events: auto; border: 1px dashed transparent;
            outline: none; cursor: text; white-space: pre; background: rgba(37, 99, 235, 0.05);
        }
        .edit-item:focus { border: 1px solid #2563eb; background: white; box-shadow: 0 0 5px rgba(37,99,235,0.5); z-index: 1000; }

        .controls { text-align: center; padding: 20px; }
        .btn-save { background: #16a34a; color: white; padding: 12px 30px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; margin-top: 20px; display: none; }
        #loader { display: none; font-weight: 600; color: #2563eb; margin: 10px; }
    </style>
</head>
<body>

<div class="nav">SHAYAN PRO PDF EDITOR</div>

<div class="controls">
    <input type="file" id="upload-pdf" accept=".pdf">
    <div id="loader">⚙️ Saving changes...</div>
    <button id="save-btn" class="btn-save" onclick="finalSave()">Apply & Download PDF</button>
</div>

<div id="editor-container">
    <canvas id="pdf-canvas"></canvas>
    <div id="text-layer"></div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    const API = 'https://shayan-pdf-api-1.onrender.com/api/smart-replace';
    let pdfDoc = null, scale = 1.5, fileRaw = null, lastEdited = { old: "", new: "" };

    document.getElementById('upload-pdf').onchange = e => {
        fileRaw = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async function() {
            const data = new Uint8Array(this.result);
            pdfDoc = await pdfjsLib.getDocument(data).promise;
            renderEditor();
        };
        reader.readAsArrayBuffer(fileRaw);
    };

    async function renderEditor() {
        document.getElementById('editor-container').style.display = 'block';
        document.getElementById('save-btn').style.display = 'inline-block';
        const page = await pdfDoc.getPage(1);
        const vp = page.getViewport({ scale: scale });
        
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        canvas.height = vp.height; canvas.width = vp.width;
        
        const container = document.getElementById('editor-container');
        container.style.width = vp.width + 'px';
        container.style.height = vp.height + 'px';

        await page.render({ canvasContext: ctx, viewport: vp }).promise;
        
        // Build Interactive Layer
        const textContent = await page.getTextContent();
        const layer = document.getElementById('text-layer');
        layer.innerHTML = "";
        
        textContent.items.forEach(item => {
            const tx = pdfjsLib.Util.transform(vp.transform, item.transform);
            const div = document.createElement('div');
            div.className = 'edit-item';
            div.contentEditable = "true";
            div.innerText = item.str;
            
            // Positioning
            div.style.left = tx[4] + 'px';
            div.style.top = (vp.height - tx[5] - (item.height * scale)) + 'px';
            div.style.fontSize = (item.height * scale) + 'px';
            
            // Store original text to track changes
            const original = item.str;
            div.onblur = () => {
                if(div.innerText !== original) {
                    lastEdited.old = original;
                    lastEdited.new = div.innerText;
                }
            };

            layer.appendChild(div);
        });
    }

    async function finalSave() {
        if(!lastEdited.old) { alert("Pehle koi text edit karein!"); return; }
        
        document.getElementById('loader').style.display = 'block';
        const fd = new FormData();
        fd.append('file', fileRaw);
        fd.append('search_text', lastEdited.old);
        fd.append('replace_text', lastEdited.new);

        const res = await fetch(API, { method: 'POST', body: fd });
        if(res.ok) {
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = "shayan_pro_edit.pdf";
            a.click();
        } else { alert("Error saving PDF."); }
        document.getElementById('loader').style.display = 'none';
    }
</script>
</body>
</html>
