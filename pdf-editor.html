<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shayan Direct PDF Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf_viewer.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background: #525659; }
        .nav { background: #2563eb; color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 1000; }
        .upload-section { background: white; padding: 15px; text-align: center; border-bottom: 1px solid #ddd; }
        
        /* Viewer Container */
        #page-container { 
            position: relative; 
            margin: 20px auto; 
            background: white; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
        }

        /* Standard PDF.js Text Layer - Isko humne editable banaya hai */
        .textLayer { 
            opacity: 1 !important; 
            mix-blend-mode: multiply; /* Isse background saaf dikhega */
        }
        .textLayer span {
            cursor: text;
            background: rgba(37, 99, 235, 0.05);
            transition: 0.2s;
        }
        .textLayer span:focus {
            background: white !important;
            color: black !important;
            outline: 2px solid #2563eb;
            z-index: 1000;
        }

        .save-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: #16a34a; color: white; border: none;
            padding: 15px 30px; border-radius: 50px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer;
            z-index: 2000; display: none;
        }
    </style>
</head>
<body>

<div class="nav">SHAYAN SMART PDF EDITOR</div>

<div class="upload-section">
    <input type="file" id="pdf-upload" accept=".pdf">
    <p style="font-size: 11px; color: #666; margin-top: 5px;">Text par click karein aur seedha badlein.</p>
</div>

<div id="page-container">
    <canvas id="pdf-canvas"></canvas>
    <div id="text-layer" class="textLayer"></div>
</div>

<button id="save-btn" class="save-btn" onclick="savePDF()">Apply & Download</button>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    const API = 'https://shayan-pdf-api-1.onrender.com/api/smart-replace';
    
    let fileRaw = null, lastEdit = { old: "", new: "" };

    document.getElementById('pdf-upload').onchange = e => {
        fileRaw = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function() { renderPDF(new Uint8Array(this.result)); };
        reader.readAsArrayBuffer(fileRaw);
    };

    async function renderPDF(data) {
        const pdf = await pdfjsLib.getDocument(data).promise;
        const page = await pdf.getPage(1);
        const scale = 1.5;
        const vp = page.getViewport({ scale });

        const container = document.getElementById('page-container');
        const canvas = document.getElementById('pdf-canvas');
        const textLayerDiv = document.getElementById('text-layer');

        container.style.width = vp.width + 'px';
        container.style.height = vp.height + 'px';
        canvas.width = vp.width; canvas.height = vp.height;

        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport: vp }).promise;

        // Build Official Text Layer
        const textContent = await page.getTextContent();
        textLayerDiv.innerHTML = "";
        pdfjsLib.renderTextLayer({
            textContent: textContent,
            container: textLayerDiv,
            viewport: vp,
            textDivs: []
        }).promise.then(() => {
            // Har span ko editable banao
            const spans = textLayerDiv.querySelectorAll('span');
            spans.forEach(span => {
                const originalText = span.innerText;
                span.contentEditable = true;
                span.onblur = () => {
                    if(span.innerText !== originalText) {
                        lastEdit.old = originalText;
                        lastEdit.new = span.innerText;
                        document.getElementById('save-btn').style.display = 'block';
                    }
                };
            });
        });
    }

    async function savePDF() {
        const fd = new FormData();
        fd.append('file', fileRaw);
        fd.append('search_text', lastEdit.old);
        fd.append('replace_text', lastEdit.new);

        const res = await fetch(API, { method: 'POST', body: fd });
        if(res.ok) {
            const blob = await res.blob();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "edited.pdf";
            a.click();
        }
    }
</script>
</body>
</html>
