<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shayan Digital | Pro PDF Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body { background: #525659; color: white; text-align: center; }
        .nav { background: #2563eb; padding: 15px; font-weight: 700; position: sticky; top: 0; z-index: 1000; }
        
        .upload-section { background: white; color: #333; padding: 20px; margin-bottom: 20px; }
        
        #editor-container { 
            position: relative; 
            display: inline-block; 
            margin: 20px auto; 
            background: white; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5); 
        }
        canvas { display: block; z-index: 1; }
        
        /* Floating Edit Input - Sejda Style */
        #floating-input { 
            position: absolute; 
            display: none; 
            z-index: 1000; 
            border: 2px solid #2563eb; 
            background: white; 
            color: black; 
            padding: 5px; 
            border-radius: 4px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            outline: none;
            font-size: 14px;
        }

        .btn-action { background: #16a34a; color: white; padding: 12px 25px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; margin: 10px; }
        #loading { display: none; margin: 10px; color: #ffeb3b; }
    </style>
</head>
<body>

<div class="nav">SHAYAN SMART PDF EDITOR</div>

<div class="upload-section">
    <input type="file" id="file-selector" accept=".pdf">
    <div id="loading">🚀 Processing... Please wait.</div>
    <button id="dl-btn" class="btn-action" style="display:none;" onclick="applyAndDownload()">Apply & Download PDF</button>
</div>

<div id="editor-container">
    <canvas id="pdf-canvas"></canvas>
    <input type="text" id="floating-input" onblur="saveChanges()">
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    const API = 'https://shayan-pdf-api-1.onrender.com/api/smart-replace';
    
    let pdfDoc = null, scale = 1.5, fileRaw = null, currentEdit = { old: "", new: "" };
    const canvas = document.getElementById('pdf-canvas');
    const input = document.getElementById('floating-input');

    document.getElementById('file-selector').onchange = e => {
        fileRaw = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async function() {
            const data = new Uint8Array(this.result);
            pdfDoc = await pdfjsLib.getDocument(data).promise;
            renderPage();
        };
        reader.readAsArrayBuffer(fileRaw);
    };

    async function renderPage() {
        const page = await pdfDoc.getPage(1);
        const vp = page.getViewport({ scale: scale });
        canvas.height = vp.height; canvas.width = vp.width;
        
        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
        
        document.getElementById('dl-btn').style.display = 'inline-block';
        document.getElementById('editor-container').style.width = vp.width + 'px';
    }

    // CLICK DETECTION (The smart part)
    canvas.onclick = async e => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const page = await pdfDoc.getPage(1);
        const textContent = await page.getTextContent();
        const vp = page.getViewport({ scale: scale });

        textContent.items.forEach(item => {
            const tx = pdfjsLib.Util.transform(vp.transform, item.transform);
            // Coordinate check
            if (x >= tx[4] && x <= tx[4] + item.width && y >= vp.height - tx[5] - item.height && y <= vp.height - tx[5]) {
                currentEdit.old = item.str;
                
                // Show floating input exactly on the word
                input.style.display = 'block';
                input.style.left = tx[4] + 'px';
                input.style.top = (vp.height - tx[5] - item.height) + 'px';
                input.style.width = (item.width + 20) + 'px';
                input.value = item.str;
                input.focus();
            }
        });
    };

    function saveChanges() {
        currentEdit.new = input.value;
        // Input ko hide nahi karenge taaki user ko dikhe kya likha hai
    }

    async function applyAndDownload() {
        if(!currentEdit.old) { alert("Pehle kisi word par click karke use edit karein!"); return; }
        
        document.getElementById('loading').style.display = 'block';
        const fd = new FormData();
        fd.append('file', fileRaw);
        fd.append('search_text', currentEdit.old);
        fd.append('replace_text', currentEdit.new);

        try {
            const res = await fetch(API, { method: 'POST', body: fd });
            if(res.ok) {
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = "shayan_edited.pdf";
                a.click();
            } else { alert("API Error! Render ko check karein."); }
        } catch(e) { alert("Connection Error!"); }
        document.getElementById('loading').style.display = 'none';
    }
</script>
</body>
</html>
