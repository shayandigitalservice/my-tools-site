<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Precision PDF Editor | Shayan Digital</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background: #525659; color: #333; }
        .nav { background: #2563eb; color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        
        #viewer-container { display: flex; justify-content: center; padding: 10px; margin-top: 20px; }
        #canvas-wrapper { position: relative; background: white; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        canvas { display: block; cursor: crosshair; max-width: 100%; height: auto; }

        /* Floating Input Styling */
        #edit-modal { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: white; padding: 25px; border-radius: 20px 20px 0 0; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.4); z-index: 1000; 
            display: none; transition: 0.3s;
        }
        input { width: 100%; padding: 15px; border: 2px solid #2563eb; border-radius: 10px; font-size: 18px; margin-bottom: 15px; outline: none; }
        .btn-go { background: #16a34a; color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; }
        
        .loading-text { display: none; color: white; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="nav">SHAYAN PRECISION EDITOR</div>

<div style="text-align:center; padding:20px; background:white;">
    <input type="file" id="pdf-upload" accept=".pdf">
    <div id="status" class="loading-text" style="color:#2563eb;">Processing...</div>
</div>

<div id="viewer-container">
    <div id="canvas-wrapper">
        <canvas id="pdf-canvas"></canvas>
    </div>
</div>

<div id="edit-modal">
    <p style="margin-bottom:10px; font-weight:bold;">Naya Text Likhein:</p>
    <input type="text" id="new-text">
    <button class="btn-go" onclick="sendToBackend()">Update & Download</button>
    <p onclick="this.parentElement.style.display='none'" style="text-align:center; margin-top:15px; color:red; cursor:pointer;">Cancel</p>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    const API = 'https://shayan-pdf-api-1.onrender.com/api/smart-replace';
    
    let pdfDoc = null, fileRaw = null, selectedWord = "", scale = 1.5;
    const canvas = document.getElementById('pdf-canvas');

    document.getElementById('pdf-upload').onchange = e => {
        fileRaw = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async function() {
            pdfDoc = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
            renderPDF();
        };
        reader.readAsArrayBuffer(fileRaw);
    };

    async function renderPDF() {
        const page = await pdfDoc.getPage(1);
        const vp = page.getViewport({ scale: scale });
        canvas.height = vp.height; canvas.width = vp.width;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    }

    // 🚀 Exact Selection Logic
    canvas.onclick = async e => {
        const rect = canvas.getBoundingClientRect();
        
        // Mobile tap coordinate adjustment
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);

        const page = await pdfDoc.getPage(1);
        const textContent = await page.getTextContent();
        const vp = page.getViewport({ scale: scale });

        let found = false;
        textContent.items.forEach(item => {
            const tx = pdfjsLib.Util.transform(vp.transform, item.transform);
            
            // Boundary detection
            const xMin = tx[4];
            const xMax = tx[4] + (item.width * scale);
            const yMin = vp.height - tx[5] - (item.height * scale);
            const yMax = vp.height - tx[5];

            if (x >= xMin && x <= xMax && y >= yMin && y <= yMax) {
                selectedWord = item.str;
                document.getElementById('new-text').value = item.str;
                document.getElementById('edit-modal').style.display = 'block';
                found = true;
            }
        });
    };

    async function sendToBackend() {
        const newVal = document.getElementById('new-text').value;
        document.getElementById('edit-modal').style.display = 'none';
        document.getElementById('status').style.display = 'block';

        const fd = new FormData();
        fd.append('file', fileRaw);
        fd.append('search_text', selectedWord);
        fd.append('replace_text', newVal);

        const res = await fetch(API, { method: 'POST', body: fd });
        if(res.ok) {
            const blob = await res.blob();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "edited_shayan.pdf";
            a.click();
        }
        document.getElementById('status').style.display = 'none';
    }
</script>
</body>
</html>
