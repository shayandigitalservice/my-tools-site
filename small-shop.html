<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bill Generator - Muksidul Distribution</title>
<style>
/* --- ORIGINAL LOOK --- */
body{font-family:Arial;background:#f0f2f5;margin:0;padding:10px;}
.container{max-width:450px;margin:auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.1);}
h2{text-align:center;color:#1a73e8;position:relative;margin-bottom:20px;}
input, button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ddd;box-sizing:border-box;font-size:15px;}
button{border:none;background:#1a73e8;color:white;cursor:pointer;font-weight:bold;transition:0.3s;}
button:active{transform:scale(0.98);}
.wa-btn{background:#25d366;}
.distributor-panel{margin-top:15px;padding:15px;border:2px dashed #1a73e8;background:#f8fbff;border-radius:10px;text-align:center;}
.hidden{display:none !important;}
.trial-tag{text-align:center;color:#e67e22;font-weight:bold;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px;}
th,td{border:1px solid #000;padding:6px;text-align:center;}
.secret-overlay{position:absolute;top:0;left:0;width:100%;height:40px;background:transparent;z-index:99;}
</style>
</head>
<body>

<div id="login-screen" class="container">
    <h2>
        <span id="app-title">🧾 Bill Generator</span>
        <div class="secret-overlay" onclick="adminAccess()"></div>
    </h2>
    
    <div id="reg-form">
        <p style="text-align:center; color:#555; font-size:14px;">Software Activate karne ke liye details bharein</p>
        <input id="uName" type="text" placeholder="Apna Naam (Name)">
        <input id="uAddr" type="text" placeholder="Dukan ka Pata (Address)">
        <input id="uMob" type="number" placeholder="WhatsApp Number">
        
        <button class="wa-btn" onclick="sendVerification()">Verify & Get ID Number</button>
    </div>

    <div id="activation-box" class="distributor-panel hidden">
        <p style="color:#1a73e8; font-weight:bold; font-size:16px; margin:0;">Distributor: Muksidul Islam</p>
        <p style="font-size:13px; color:#666; margin:5px 0;">ID Number maangne ke liye WhatsApp par message bhejein: <b>9957548361</b></p>
        <hr style="border:0; border-top:1px solid #eee;">
        <input id="inputID" type="text" placeholder="Enter 6-Digit ID Number">
        <button onclick="checkActivation()" style="background:#d93025;">Activate Software</button>
    </div>
</div>

<div id="admin-panel" class="container hidden">
    <h3>Admin Database</h3>
    <p>Yahan aap saved users dekh sakte hain (Local)</p>
    <div id="userList" style="font-size:12px; text-align:left; max-height:200px; overflow-y:auto; border:1px solid #ccc; padding:5px;"></div>
    <button onclick="location.reload()" style="background:#555; margin-top:10px;">Back</button>
</div>

<div id="main-app" class="container hidden" style="max-width:800px;">
    <div id="days-left" class="trial-tag"></div>
    <h2 onclick="location.reload()">🧾 Bill Generator</h2>
    <input id="sName" placeholder="Shop Name">
    <input id="sAddr" placeholder="Address">
    <button id="saveInfo" style="background:#34a853;">Save Shop Info</button>
    <hr>
    <input id="itemN" placeholder="Product Name">
    <input id="itemQ" type="number" placeholder="Qty">
    <input id="itemP" type="number" placeholder="Price">
    <button id="addBtn">Add to List</button>

    <table id="billTbl"><tr><th>No</th><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></table>
    <button id="printBtn" style="margin-top:10px;">Print / Generate Bill</button>
    <div id="finalBill"></div>
</div>

<script>
const MY_WA = "919957548361";
const ADMIN_PASS = "shayan123";

// 1. Generate Random ID (Example: SH-4829)
function generateRandomID() {
    return "SH-" + Math.floor(1000 + Math.random() * 9000);
}

// 2. WhatsApp Verification
function sendVerification() {
    let name = document.getElementById("uName").value;
    let addr = document.getElementById("uAddr").value;
    let mob = document.getElementById("uMob").value;
    
    if(!name || !addr || mob.length < 10) return alert("Please fill all details correctly!");

    // Check Device Lock
    let existingLock = localStorage.getItem("dev_lock");
    if(existingLock && existingLock !== mob) {
        return alert("Error: Is device par dusra account allow nahi hai!");
    }

    // Create Random ID for this user
    let sessionID = generateRandomID();
    localStorage.setItem("pending_id", sessionID);
    localStorage.setItem("pending_mob", mob);

    let msg = `*Activation Request*\nName: ${name}\nAddress: ${addr}\nMobile: ${mob}\n*ID Number: ${sessionID}*\n------------------\nSir, please activate my software.`;
    
    window.open(`https://wa.me/${MY_WA}?text=${encodeURIComponent(msg)}`);
    
    document.getElementById("reg-form").classList.add("hidden");
    document.getElementById("activation-box").classList.remove("hidden");
}

// 3. Check ID and Activate
function checkActivation() {
    let enteredID = document.getElementById("inputID").value.trim().toUpperCase();
    let correctID = localStorage.getItem("pending_id");
    let mob = localStorage.getItem("pending_mob");

    if(enteredID === correctID) {
        let expiry = new Date().getTime() + (30 * 24 * 60 * 60 * 1000); // 30 Days
        let userData = { active: true, exp: expiry, mobile: mob };
        localStorage.setItem("app_auth", JSON.stringify(userData));
        localStorage.setItem("dev_lock", mob);
        alert("Software Successfully Activated for 30 Days!");
        location.reload();
    } else {
        alert("Galat ID Number! Distributor se sahi ID maangein.");
    }
}

// 4. Admin Access
let tapCount = 0;
function adminAccess() {
    tapCount++;
    if(tapCount >= 5) {
        let p = prompt("Admin Password:");
        if(p === ADMIN_PASS) {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("admin-panel").classList.remove("hidden");
            showUsers();
        }
        tapCount = 0;
    }
}

function showUsers() {
    let lock = localStorage.getItem("dev_lock") || "No Users";
    let id = localStorage.getItem("pending_id") || "None";
    document.getElementById("userList").innerHTML = `Last Registered: ${lock}<br>Current ID: ${id}`;
}

// 5. App Launch Logic
function launchApp(data) {
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("main-app").classList.remove("hidden");
    let diff = Math.ceil((data.exp - new Date().getTime()) / (1000*60*60*24));
    document.getElementById("days-left").innerText = "License Valid: " + diff + " Days Left";
}

document.addEventListener("DOMContentLoaded", function() {
    let auth = JSON.parse(localStorage.getItem("app_auth"));
    if(auth && new Date().getTime() < auth.exp) {
        launchApp(auth);
    }
});

// (Billing logic simplified for demo)
let items = [];
document.getElementById("addBtn").onclick = function() {
    let n = document.getElementById("itemN").value, q = +document.getElementById("itemQ").value, p = +document.getElementById("itemP").value;
    if(n && q && p) {
        items.push({n,q,p,t:q*p});
        let row = document.getElementById("billTbl").insertRow();
        row.innerHTML = `<td>${items.length}</td><td>${n}</td><td>${q}</td><td>${p}</td><td>${q*p}</td>`;
    }
};
</script>
</body>
</html>
