<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shayan POS - Verification System</title>
<style>
:root {
    --accent: #6366f1;
    --bg: #f8fafc;
    --glass: rgba(255, 255, 255, 0.95);
    --text: #0f172a;
}
body { font-family: 'Inter', Arial, sans-serif; background: var(--bg); margin: 0; color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
.content-wrapper { width: 90%; max-width: 500px; margin: 40px auto; }
.step-card { background: var(--glass); padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
.auth-input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 15px; box-sizing: border-box; outline: none; }
.btn-primary { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
.plan-item { background: white; padding: 15px; border-radius: 16px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; margin-bottom: 10px; text-align: left; }
.plan-price { font-weight: 800; color: #10b981; }
.hidden { display: none !important; }
#admin-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
.admin-box { background: #f1f5f9; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #6366f1; }
input { width:100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #ccc; }
</style>
</head>
<body>

<div class="content-wrapper">
    <h1 style="text-align:center; color:#6366f1;">Shayan Smart Tools</h1>
    
    <div id="step-reg" class="step-card">
        <h3>Verification</h3>
        <input id="uName" class="auth-input" placeholder="User Name" oninput="checkAdminCode(this.value)">
        <input id="uAddr" class="auth-input" placeholder="Address">
        <input id="uMob" class="auth-input" type="number" placeholder="WhatsApp Number">
        <button class="btn-primary" onclick="requestActivation()">Verify & Request ID</button>
    </div>

    <div id="step-lock" class="step-card hidden">
        <p>Contact Distributor for Approval ID<br><b>WhatsApp: 9957548361</b></p>
        <input id="inputApprovalID" class="auth-input" placeholder="Enter Approval ID" style="text-align:center; font-weight:800;">
        <button class="btn-primary" onclick="verifyApprovalID()">Verify ID</button>
    </div>

    <div id="step-plans" class="step-card hidden">
        <h3>Choose Subscription</h3>
        <div class="plan-item" onclick="selectPlan('trial', 7, 'Trial', 0)"><div><b>Free Trial</b><br><small>7 Days</small></div><b class="plan-price">FREE</b></div>
        <div class="plan-item" onclick="selectPlan('paid', 30, '1 Month', 99)"><div><b>1 Month</b><br><small>Premium</small></div><b class="plan-price">₹99</b></div>
        <div class="plan-item" onclick="selectPlan('paid', 365, '1 Year', 999)"><div><b>1 Year</b><br><small>Premium</small></div><b class="plan-price">₹999</b></div>
    </div>

    <div id="step-payment" class="step-card hidden">
        <p>Scan & Send Screenshot</p>
        <div id="qr-display" style="margin-bottom:10px;"></div>
        <button class="btn-primary" style="background:#22c55e;" onclick="sendPaymentWA()">Send Screenshot</button>
        <input id="inputSubKey" class="auth-input" placeholder="Enter Key Provided by Admin" style="text-align:center;">
        <button class="btn-primary" onclick="verifySubKey()">Activate Now</button>
    </div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>🛠 Admin Panel</h2>
        <button onclick="closeAdmin()" style="background:red; color:white; border:none; width:auto; padding:5px 15px; cursor:pointer; border-radius:6px;">Close</button>
    </div>
    <div class="admin-box">
        <h3>Approval ID</h3>
        <input id="admMob1" placeholder="User Mobile">
        <button onclick="admGenID()" style="background:#6366f1; color:white; border:none; padding:10px; cursor:pointer;">Generate ID</button>
        <p id="showID" style="font-weight:bold;"></p>
    </div>
    <div class="admin-box">
        <h3>Subscription Key</h3>
        <input id="admMob2" placeholder="User Mobile">
        <button onclick="admGenKey()" style="background:#10b981; color:white; border:none; padding:10px; cursor:pointer;">Generate Key</button>
        <p id="showKey" style="font-weight:bold;"></p>
    </div>
</div>

<script>
const DIST_WA = "919957548361";
const DIST_UPI = "9957548361@upi";

function checkAdminCode(val) { if(val === "shayan@321") { document.getElementById("admin-panel").style.display = "block"; document.getElementById("uName").value = ""; } }
function closeAdmin() { document.getElementById("admin-panel").style.display = "none"; }

function requestActivation() {
    let name = document.getElementById("uName").value, addr = document.getElementById("uAddr").value, mob = document.getElementById("uMob").value;
    if(!name || !addr || mob.length < 10) return alert("Fill details!");
    window.open(`https://wa.me/${DIST_WA}?text=${encodeURIComponent("*Verification Request*\nName: "+name+"\nMobile: "+mob)}`);
    document.getElementById("step-reg").classList.add("hidden");
    document.getElementById("step-lock").classList.remove("hidden");
}

function verifyApprovalID() {
    if(document.getElementById("inputApprovalID").value.trim() === localStorage.getItem("temp_id")) {
        document.getElementById("step-lock").classList.add("hidden");
        document.getElementById("step-plans").classList.remove("hidden");
    } else alert("Wrong ID!");
}

function selectPlan(type, days, name, price) {
    if(type === 'trial') { activate(7); } 
    else {
        let qr = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent('upi://pay?pa='+DIST_UPI+'&am='+price+'&cu=INR')}`;
        document.getElementById("qr-display").innerHTML = `<img src="${qr}">`;
        localStorage.setItem("temp_days", days);
        document.getElementById("step-plans").classList.add("hidden");
        document.getElementById("step-payment").classList.remove("hidden");
    }
}

function verifySubKey() {
    if(document.getElementById("inputSubKey").value.trim() === localStorage.getItem("temp_key")) {
        activate(localStorage.getItem("temp_days"));
    } else alert("Wrong Key!");
}

function activate(days) {
    let exp = new Date().getTime() + (days * 24 * 60 * 60 * 1000);
    localStorage.setItem("shayan_auth", JSON.stringify({active:true, exp:exp}));
    alert("System Activated! Please refresh or go to Billing Page.");
    location.reload();
}

function admGenID() {
    let id = "APP-" + Math.floor(1000+Math.random()*9999);
    localStorage.setItem("temp_id", id);
    document.getElementById("showID").innerText = "ID: " + id;
    window.open(`https://wa.me/${document.getElementById("admMob1").value}?text=ID:%20${id}`);
}

function admGenKey() {
    let key = "KEY-" + Math.floor(1000+Math.random()*9999);
    localStorage.setItem("temp_key", key);
    document.getElementById("showKey").innerText = "Key: " + key;
    window.open(`https://wa.me/${document.getElementById("admMob2").value}?text=Key:%20${key}`);
}
function sendPaymentWA() { window.open(`https://wa.me/${DIST_WA}?text=Paid. Send Key.`); }
</script>
</body>
</html>
