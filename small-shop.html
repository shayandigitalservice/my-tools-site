<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Bill Generator – Functional POS</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<style>
/* --- AAPKA ORIGINAL DESIGN --- */
body{font-family:Arial;background:#ffffff;margin:0;padding:10px;}
.container{max-width:800px;margin:auto;background:transparent;padding:15px;}
h2{text-align:center; position: relative; user-select:none;}

/* SECRET INVISIBLE OVERLAY */
.secret-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: transparent; z-index: 999; cursor: pointer;
}

input, select, button{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;box-sizing:border-box;}
button{border:none;background:#2563eb;color:white;font-size:15px;cursor:pointer;}
table{width:100%;margin-top:10px;border-collapse:collapse;}
th,td{border:1px solid #000;padding:8px;font-size:14px;text-align:center;}
.totalRow td{font-weight:bold;}
.bill{margin-top:20px; overflow-wrap: break-word;}
.hidden { display: none !important; }
.trial-tag { text-align: center; color: #b45309; font-weight: bold; margin-bottom: 10px; font-size: 14px; }
.wa-btn { background: #25d366 !important; margin-top: 10px; font-weight: bold; }
</style>
</head>
<body>

<div id="login-screen" class="container">
    <h2>
        <span id="admin-header">🧾 Bill Generator</span>
        <div class="secret-overlay" onclick="handleSecretClick()"></div>
    </h2>
    
    <div id="registration-area">
        <p style="text-align:center; color:gray;">Register karke 7 din ka Free Trial payein</p>
        <input id="userMobile" type="number" placeholder="Enter Mobile Number">
        
        <button class="wa-btn" onclick="verifyOnWA()">1. Verify on WhatsApp</button>
        <p style="font-size:11px; color:gray; text-align:center;">(Pehle WhatsApp par message bhejein, fir neeche click karein)</p>
        
        <button id="startBtn" style="background:#444;">2. Open Software</button>
    </div>
    
    <div id="lock-box" class="hidden" style="margin-top:20px; color:red; text-align:center; border:1px solid red; padding:10px;">
        <p id="lock-reason"><b>Trial Expired!</b></p>
        <p>Contact Muksidul: 9957548361</p>
        <input id="licKey" placeholder="Enter License Key">
        <button onclick="activateApp()" style="background:red;">Activate Now</button>
    </div>

    <div id="admin-login-area" class="hidden" style="margin-top:40px; border-top:1px solid #ccc; padding-top:10px;">
        <input id="masterPass" type="password" placeholder="Master Password">
        <button onclick="accessAdmin()" style="background:#444;">Admin Login</button>
    </div>
</div>

<div id="admin-panel" class="container hidden">
    <h3>🛠 Key Generator</h3>
    <input id="targetMobile" type="number" placeholder="Mobile Number">
    <button onclick="generateKey()" style="background:purple;">Generate 30 Days Key</button>
    <div id="keyOutput" style="margin-top:10px; padding:10px; border:1px dashed #000; word-break:break-all; font-weight:bold; background:#f9f9f9;"></div>
    <button onclick="location.reload()" style="background:#666;">Back</button>
</div>

<div id="main-app" class="container hidden">
    <div id="trial-timer" class="trial-tag"></div>
    <h2 onclick="location.reload()">🧾 Bill Generator</h2>
    <input id="shop" placeholder="Shop Name">
    <input id="address" placeholder="Address">
    <input id="upiId" placeholder="UPI ID">
    <button id="saveShopBtn" style="background:#059669;">Save Details</button>

    <input id="customer" placeholder="Customer Name">
    <input id="productSearch" placeholder="Product Name">
    <input id="qty" type="number" placeholder="Qty">
    <input id="price" type="number" placeholder="Price">
    <button id="addItemBtn">Add Item</button>

    <table id="table"><tr><th>No</th><th>Product</th><th>Qty</th><th>Price</th><th>Total</th></tr></table>

    <button id="generateBillBtn">Generate Bill</button>
    <button id="printBillBtn">Print Bill</button>
    <button id="sendWhatsAppBtn">Send WhatsApp</button>
    <div id="bill" class="bill"></div>
</div>

<script>
const ADMIN_KEY = "shayan123";
const MY_NUMBER = "919957548361"; // Aapka WhatsApp Number

// --- 1. DEVICE FINGERPRINT (Unique ID) ---
function getDeviceId() {
    return btoa(navigator.userAgent + navigator.language + screen.width).substring(0, 16);
}

// --- 2. WHATSAPP VERIFY ---
function verifyOnWA() {
    let mob = document.getElementById("userMobile").value;
    if(mob.length < 10) return alert("Pehle sahi Mobile Number bhariye!");
    
    let text = `Hello Muksidul, main Shayan POS use karna chahta hoon. Mera Number: ${mob}, Device ID: ${getDeviceId()}`;
    window.open(`https://wa.me/${MY_NUMBER}?text=${encodeURIComponent(text)}`);
    localStorage.setItem("wa_requested_" + mob, "true");
}

// --- 3. SECRET ADMIN ---
let clickCount = 0;
function handleSecretClick() {
    clickCount++;
    if(clickCount >= 5) {
        document.getElementById("admin-login-area").classList.remove("hidden");
        alert("Admin Mode ON!");
        clickCount = 0;
    }
}

function accessAdmin() {
    if(document.getElementById("masterPass").value === ADMIN_KEY) {
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("admin-panel").classList.remove("hidden");
    }
}

function generateKey() {
    let m = document.getElementById("targetMobile").value;
    let exp = new Date().getTime() + (30 * 24 * 60 * 60 * 1000);
    document.getElementById("keyOutput").innerText = btoa(m + "|" + exp + "|premium_shayan");
}

// --- 4. LOGIN LOGIC WITH DEVICE LOCK ---
document.getElementById("startBtn").addEventListener("click", function() {
    let mob = document.getElementById("userMobile").value;
    let deviceId = getDeviceId();
    
    if(mob.length < 10) return alert("Mobile Number sahi dalein!");
    if(!localStorage.getItem("wa_requested_" + mob)) return alert("Pehle 'Verify on WhatsApp' button par click karke message bhejein!");

    // Check if this DEVICE has already used a trial
    let deviceRecord = localStorage.getItem("device_lock");
    let now = new Date().getTime();

    if(deviceRecord && deviceRecord !== mob) {
        // Agar is phone par kisi aur number se trial chal chuka hai
        document.getElementById("lock-reason").innerHTML = "<b>Device Locked!</b> Is phone par trial pehle hi liya ja chuka hai.";
        document.getElementById("lock-box").classList.remove("hidden");
        document.getElementById("registration-area").classList.add("hidden");
        return;
    }

    let uData = JSON.parse(localStorage.getItem("u_" + mob));
    if(!uData) {
        uData = { mobile: mob, expiry: now + (7*24*60*60*1000), status: "trial", dId: deviceId };
        localStorage.setItem("u_" + mob, JSON.stringify(uData));
        localStorage.setItem("device_lock", mob); // Lock this device to this mobile number
    }

    if(now < uData.expiry) {
        localStorage.setItem("currentSession", mob);
        launchApp(uData);
    } else {
        document.getElementById("lock-box").classList.remove("hidden");
        document.getElementById("registration-area").classList.add("hidden");
    }
});

function activateApp() {
    let mob = document.getElementById("userMobile").value;
    let k = document.getElementById("licKey").value.trim();
    try {
        let dec = atob(k).split("|");
        if(dec[0] === mob) {
            let u = JSON.parse(localStorage.getItem("u_" + mob));
            u.expiry = parseInt(dec[1]); u.status = "paid";
            localStorage.setItem("u_" + mob, JSON.stringify(u));
            alert("App Activated!"); location.reload();
        }
    } catch(e) { alert("Invalid Key!"); }
}

function launchApp(u) {
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("main-app").classList.remove("hidden");
    let left = Math.ceil((u.expiry - new Date().getTime()) / (1000 * 60 * 60 * 24));
    document.getElementById("trial-timer").innerText = "Days Remaining: " + left;
}

// --- 5. ORIGINAL BILLING LOGIC ---
document.addEventListener("DOMContentLoaded", function(){
    let active = localStorage.getItem("currentSession");
    if(active) {
        let u = JSON.parse(localStorage.getItem("u_" + active));
        if(u && new Date().getTime() < u.expiry) launchApp(u);
    }
    // (Baki bill generator ka purana logic yahan rahega)
    let items=[];
    document.getElementById("addItemBtn").addEventListener("click", function(){
        let p=document.getElementById("productSearch").value, q=+document.getElementById("qty").value, pr=+document.getElementById("price").value;
        if(p && q && pr){
            items.push({p,q,pr,t:q*pr});
            let row=document.getElementById("table").insertRow();
            row.insertCell(0).innerText=items.length; row.insertCell(1).innerText=p; row.insertCell(2).innerText=q; row.insertCell(3).innerText=pr; row.insertCell(4).innerText=q*pr;
        }
    });
    document.getElementById("generateBillBtn").addEventListener("click", function(){
        if(items.length===0) return;
        let total=0; items.forEach(i=>total+=i.t);
        let upi = document.getElementById("upiId").value;
        let html=`<b>${document.getElementById("shop").value}</b><hr><table><tr><th>Item</th><th>Qty</th><th>Total</th></tr>`;
        items.forEach(i=> html+=`<tr><td>${i.p}</td><td>${i.q}</td><td>₹${i.t}</td></tr>`);
        html+=`<tr><td colspan="2">Total</td><td>₹${total}</td></tr></table>`;
        if(upi) html+=`<center><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent('upi://pay?pa='+upi+'&am='+total)}"></center>`;
        document.getElementById("bill").innerHTML = html;
    });
    document.getElementById("printBillBtn").addEventListener("click", () => window.print());
    document.getElementById("sendWhatsAppBtn").addEventListener("click", () => window.open("https://wa.me/?text="+encodeURIComponent(document.getElementById("bill").innerText)));
});
</script>
</body>
</html>
