<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shayan POS - Professional Billing</title>
<style>
/* --- PROFESSIONAL UI (NO BOX SYSTEM) --- */
:root {
    --accent: #6366f1;
    --accent-dark: #4f46e5;
    --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    --glass: rgba(255, 255, 255, 0.8);
    --text-main: #0f172a;
    --text-dim: #64748b;
}

body {
    font-family: 'Inter', Arial, sans-serif;
    background: var(--bg-gradient);
    background-attachment: fixed;
    color: var(--text-main);
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

.content-wrapper { width: 100%; max-width: 500px; }

/* Typography */
h1, h2 { 
    text-align: center; 
    background: linear-gradient(to right, #6366f1, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 30px;
}

/* Form Elements */
input, select, .plan-item {
    width: 100%;
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 16px;
    font-size: 15px;
    margin-top: 10px;
    box-sizing: border-box;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
}

button {
    width: 100%;
    padding: 16px;
    margin-top: 20px;
    border-radius: 16px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
}

/* Plan Styles */
.plan-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: 0.3s;
}
.plan-item:hover { background: white; border-color: var(--accent); }
.plan-price { font-weight: 800; color: #10b981; }

/* Status & QR */
.step-box { text-align: center; padding: 20px; }
.qr-frame { background: white; padding: 15px; border-radius: 20px; display: inline-block; margin: 15px 0; }
.hidden { display: none !important; }
.trial-tag { background: #dcfce7; color: #166534; padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: 700; }

/* Billing Table Style */
table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--glass); border-radius: 15px; overflow: hidden; }
th, td { padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.05); text-align: center; font-size: 13px; }
th { background: rgba(0,0,0,0.02); }

@media screen and (max-width:600px){ .content-wrapper { width: 95%; } }
</style>
</head>
<body>

<div class="content-wrapper">
    
    <div id="login-screen">
        <h1>Shayan Smart Tools</h1>
        
        <div id="registration-form">
            <input id="regName" placeholder="Business Owner Name">
            <input id="regAddr" placeholder="Shop Address">
            <input id="regMob" type="number" placeholder="WhatsApp Number">
            <button onclick="sendVerificationRequest()">Verify & Request Approval</button>
        </div>

        <div id="activation-area" class="hidden">
            <div class="step-box">
                <span class="trial-tag">Approval Pending</span>
                <p style="font-size: 14px; color: var(--text-dim); margin-top: 15px;">A request has been sent to Muksidul Islam.<br>Enter the <b>Approval ID</b> to continue.</p>
                <input id="inputIDKey" placeholder="Enter ID (e.g. ID-1234)" style="text-align: center; letter-spacing: 2px; font-weight: 800;">
                <button onclick="unlockPlans()">Unlock Plans</button>
            </div>
        </div>

        <div id="plans-page" class="hidden">
            <h3 style="text-align:center;">Select Subscription</h3>
            <div class="plan-item" onclick="selectPlan('trial', 7, 'Free Trial', 0)">
                <span>Free Trial (7 Days)</span><span class="plan-price">FREE</span>
            </div>
            <div class="plan-item" onclick="selectPlan('paid', 30, '1 Month', 100)">
                <span>1 Month Plan</span><span class="plan-price">₹100</span>
            </div>
            <div class="plan-item" onclick="selectPlan('paid', 90, '3 Months', 250)">
                <span>3 Months Plan</span><span class="plan-price">₹250</span>
            </div>
            <div class="plan-item" onclick="selectPlan('paid', 180, '6 Months', 500)">
                <span>6 Months Plan</span><span class="plan-price">₹500</span>
            </div>
            <div class="plan-item" onclick="selectPlan('paid', 365, '1 Year', 1000)">
                <span>1 Year Plan</span><span class="plan-price">₹1000</span>
            </div>
        </div>

        <div id="payment-area" class="hidden">
            <div class="step-box">
                <p>Activating: <b id="sel-plan-text"></b></p>
                <div class="qr-frame" id="qr-display"></div>
                <button onclick="sendPaymentWA()" style="background:#22c55e;">Send Screenshot to WhatsApp</button>
                <button onclick="validateFinalActivation()" style="margin-top:10px; background:#dc2626;">Activate Now</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div style="text-align:right"><span id="trial-timer" class="trial-tag"></span></div>
        <h2 style="text-align:left">🧾 Dashboard</h2>

        <input id="shop" placeholder="Shop Name">
        <input id="address" placeholder="Address">
        <input id="phone" placeholder="Phone">
        <input id="upiId" placeholder="UPI ID (for QR)">
        <button id="saveShopBtn">Save Shop Details</button>
        <hr style="border:0; border-top:1px solid rgba(0,0,0,0.1); margin:20px 0;">
        
        <input id="customer" placeholder="Customer Name">
        <input id="productSearch" placeholder="Product Name">
        <input id="qty" type="number" placeholder="Qty">
        <input id="price" type="number" placeholder="Price">
        <button id="addItemBtn">Add Item</button>

        <table id="table"><tr><th>No</th><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></table>

        <select id="payment"><option value="Cash">Cash</option><option value="UPI">UPI</option></select>
        <button id="generateBillBtn">Generate Bill</button>
        <button id="printBillBtn">Print Bill</button>
        
        <div id="bill" class="bill"></div>
        <div id="totalDay" style="margin-top:20px; font-weight:bold; text-align:center;"></div>
        <button onclick="localStorage.clear(); location.reload();" style="background:#94a3b8; margin-top:40px;">Logout (Testing)</button>
    </div>
</div>

<script>
const MY_WA = "919957548361";
const MY_UPI = "9957548361@upi";

// --- FLOW LOGIC ---
function sendVerificationRequest() {
    let name = document.getElementById("regName").value, addr = document.getElementById("regAddr").value, mob = document.getElementById("regMob").value;
    if(!name || !addr || mob.length < 10) return alert("Fill details!");
    let id = "ID-" + Math.floor(1000 + Math.random() * 9999);
    localStorage.setItem("pending_id", id.toUpperCase());
    localStorage.setItem("pending_mob", mob);
    window.open(`https://wa.me/${MY_WA}?text=${encodeURIComponent("*Activation Request*\nName: "+name+"\nID: "+id)}`);
    document.getElementById("registration-form").classList.add("hidden");
    document.getElementById("activation-area").classList.remove("hidden");
}

function unlockPlans() {
    let input = document.getElementById("inputIDKey").value.trim().toUpperCase();
    if(input === localStorage.getItem("pending_id")) {
        document.getElementById("activation-area").classList.add("hidden");
        document.getElementById("plans-page").classList.remove("hidden");
    } else { alert("Invalid ID!"); }
}

function selectPlan(type, days, name, price) {
    localStorage.setItem("pending_days", days);
    if(type === 'trial') {
        let expiry = new Date().getTime() + (days * 24 * 60 * 60 * 1000);
        localStorage.setItem("user_auth", JSON.stringify({active:true, exp:expiry, type:'trial'}));
        location.reload();
    } else {
        document.getElementById("sel-plan-text").innerText = name + " (₹" + price + ")";
        let qr = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent('upi://pay?pa='+MY_UPI+'&am='+price+'&cu=INR')}`;
        document.getElementById("qr-display").innerHTML = `<img src="${qr}">`;
        document.getElementById("plans-page").classList.add("hidden");
        document.getElementById("payment-area").classList.remove("hidden");
    }
}

function validateFinalActivation() {
    let days = parseInt(localStorage.getItem("pending_days"));
    let expiry = new Date().getTime() + (days * 24 * 60 * 60 * 1000);
    localStorage.setItem("user_auth", JSON.stringify({active:true, exp:expiry, type:'paid'}));
    alert("Subscription Activated!"); location.reload();
}

function sendPaymentWA() {
    window.open(`https://wa.me/${MY_WA}?text=Payment%20Screenshot%20ID:%20${localStorage.getItem("pending_id")}`);
}

function launchApp() {
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("main-app").classList.remove("hidden");
}

// --- BILLING LOGIC (ORIGINAL) ---
document.addEventListener("DOMContentLoaded", function(){
    let auth = JSON.parse(localStorage.getItem("user_auth"));
    if(auth && new Date().getTime() < auth.exp) {
        launchApp();
        let left = Math.ceil((auth.exp - new Date().getTime()) / (1000*60*60*24));
        document.getElementById("trial-timer").innerText = left + " Days Left";
    }

    let items=[];
    const shopInput = document.getElementById("shop"), addressInput = document.getElementById("address"), upiInput = document.getElementById("upiId");
    shopInput.value = localStorage.getItem("shop")||"";
    addressInput.value = localStorage.getItem("address")||"";
    upiInput.value = localStorage.getItem("upiId")||"";

    document.getElementById("saveShopBtn").onclick = function(){
        localStorage.setItem("shop", shopInput.value);
        localStorage.setItem("address", addressInput.value);
        localStorage.setItem("upiId", upiInput.value);
        alert("Saved!");
    };

    document.getElementById("addItemBtn").onclick = function(){
        let p=document.getElementById("productSearch").value, q=+document.getElementById("qty").value, pr=+document.getElementById("price").value;
        if(p && q && pr){
            items.push({p,q,pr,t:q*pr});
            let row=document.getElementById("table").insertRow();
            row.innerHTML = `<td>${items.length}</td><td>${p}</td><td>${q}</td><td>${pr}</td><td>${q*pr}</td>`;
        }
    };

    document.getElementById("generateBillBtn").onclick = function(){
        if(items.length===0) return;
        let total=0; items.forEach(i=>total+=i.t);
        let html=`<b>${shopInput.value}</b><br>${addressInput.value}<hr><table><tr><th>Item</th><th>Qty</th><th>Total</th></tr>`;
        items.forEach(i=> html+=`<tr><td>${i.p}</td><td>${i.q}</td><td>₹${i.t}</td></tr>`);
        html+=`<tr><td colspan="2">Total</td><td>₹${total}</td></tr></table>`;
        if(upiInput.value) html+=`<center><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent('upi://pay?pa='+upiInput.value+'&am='+total)}"></center>`;
        document.getElementById("bill").innerHTML = html;
    };

    document.getElementById("printBillBtn").onclick = () => window.print();
});
</script>
</body>
</html>
