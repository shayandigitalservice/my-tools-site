<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Bill Generator – Functional POS</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<style>
/* --- AAPKA ORIGINAL DESIGN (NO CHANGE) --- */
body{font-family:Arial;background:#ffffff;margin:0;padding:10px;}
.container{max-width:800px;margin:auto;background:transparent;padding:15px;border-radius:0;box-shadow:none;}
h2{text-align:center; cursor:pointer; user-select:none;} /* Clickable for Secret Admin */
input, select, button{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;box-sizing:border-box;}
button{border:none;background:#2563eb;color:white;font-size:15px;cursor:pointer;}
table{width:100%;margin-top:10px;border-collapse:collapse;}
th,td{border:1px solid #000;padding:8px;font-size:14px;text-align:center;}
.totalRow td{font-weight:bold;}
.bill{margin-top:20px; overflow-wrap: break-word; word-wrap: break-word;}
.invoice{float:right;}
.clear{clear:both;}
.qr-container{text-align:center; margin-top:15px; padding:10px; border:1px dashed #ccc;}
.qr-container img{width:150px; height:150px;}

/* Subscription System Helpers */
.hidden { display: none !important; }
.trial-tag { text-align: center; color: #b45309; font-weight: bold; margin-bottom: 10px; font-size: 14px; }

@media screen and (max-width:600px){
  table th, table td{padding:6px;font-size:12px;}
  .invoice{float: none; text-align: right;}
  .table-wrapper { overflow-x: auto; width: 100%; }
}
</style>
</head>
<body>

<div id="login-screen" class="container">
    <h2 id="admin-trigger">🧾 Bill Generator</h2>
    <p style="text-align:center; color:gray;">Mobile Number daalkar shuru karein</p>
    <input id="userMobile" type="number" placeholder="Enter Mobile Number">
    <button id="startBtn">Open Software</button>
    
    <div id="lock-box" class="hidden" style="margin-top:20px; color:red; text-align:center; border:1px solid red; padding:10px;">
        <p><b>Trial Expired!</b><br>Contact Muksidul Islam: 9957548361</p>
        <input id="licKey" placeholder="Enter License Key">
        <button onclick="activateApp()" style="background:red;">Activate Now</button>
    </div>

    <div id="admin-login-area" class="hidden" style="margin-top:40px; border-top:1px solid #ccc; padding-top:10px;">
        <input id="masterPass" type="password" placeholder="Enter Master Password">
        <button onclick="accessAdmin()" style="background:#444;">Admin Login</button>
    </div>
</div>

<div id="admin-panel" class="container hidden">
    <h3>🛠 Key Generator (Muksidul)</h3>
    <input id="targetMobile" type="number" placeholder="Dukandar Mobile Number">
    <button onclick="generateKey()" style="background:purple;">Generate 30 Days Key</button>
    <div id="keyOutput" style="margin-top:10px; padding:10px; border:1px dashed #000; word-break:break-all; font-weight:bold; background:#f9f9f9;"></div>
    <button onclick="location.reload()" style="background:#666;">Back to App</button>
</div>

<div id="main-app" class="container hidden">
    <div id="trial-timer" class="trial-tag"></div>
    <h2>🧾 Bill Generator</h2>

    <input id="shop" placeholder="Shop Name">
    <input id="address" placeholder="Address">
    <input id="phone" placeholder="Phone">
    <input id="upiId" placeholder="Enter Your UPI ID">
    <button id="saveShopBtn">Save Shop Details</button>

    <input id="customer" placeholder="Customer Name">
    <input id="productSearch" placeholder="Product Name">
    <input id="qty" type="number" placeholder="Qty">
    <input id="price" type="number" placeholder="Price">
    <button id="addItemBtn">Add Item</button>

    <div class="table-wrapper">
        <table id="table"><tr><th>No</th><th>Product</th><th>Qty</th><th>Price</th><th>Total</th></tr></table>
    </div>

    <select id="payment"><option value="Cash">Cash</option><option value="UPI">UPI</option></select>

    <button id="generateBillBtn">Generate Bill</button>
    <button id="printBillBtn">Print Bill</button>
    <button id="sendWhatsAppBtn">Send WhatsApp</button>

    <div id="bill" class="bill"></div>
    <div id="totalDay"></div>
</div>

<script>
const ADMIN_KEY = "shayan123";

// --- SECRET TRIGGER (5 CLICKS ON HEADING) ---
let clicks = 0;
document.getElementById("admin-trigger").addEventListener("click", function() {
    clicks++;
    if(clicks >= 5) {
        document.getElementById("admin-login-area").classList.remove("hidden");
        alert("Admin Mode ON: Password niche khul gaya hai!");
        clicks = 0;
    }
    setTimeout(() => { clicks = 0; }, 5000);
});

function accessAdmin() {
    if(document.getElementById("masterPass").value === ADMIN_KEY) {
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("admin-panel").classList.remove("hidden");
    } else { alert("Wrong Password!"); }
}

function generateKey() {
    let m = document.getElementById("targetMobile").value;
    if(m.length < 10) return alert("Sahi Number Dalein");
    let exp = new Date().getTime() + (30 * 24 * 60 * 60 * 1000);
    let key = btoa(m + "|" + exp + "|premium_shayan");
    document.getElementById("keyOutput").innerText = "Key: " + key;
}

// --- SUBSCRIPTION LOGIC ---
document.getElementById("startBtn").addEventListener("click", function() {
    let mob = document.getElementById("userMobile").value;
    if(mob.length < 10) return alert("10 Digit Mobile Number Required");
    
    let uData = JSON.parse(localStorage.getItem("u_" + mob));
    let now = new Date().getTime();

    if(!uData) {
        uData = { mobile: mob, expiry: now + (7 * 24 * 60 * 60 * 1000), status: "trial" };
        localStorage.setItem("u_" + mob, JSON.stringify(uData));
    }

    if(now < uData.expiry) {
        localStorage.setItem("currentSession", mob);
        launchApp(uData);
    } else {
        document.getElementById("lock-box").classList.remove("hidden");
        document.getElementById("startBtn").classList.add("hidden");
    }
});

function activateApp() {
    let mob = document.getElementById("userMobile").value;
    let k = document.getElementById("licKey").value.trim();
    try {
        let dec = atob(k).split("|");
        if(dec[0] === mob && dec[2] === "premium_shayan") {
            let u = JSON.parse(localStorage.getItem("u_" + mob));
            u.expiry = parseInt(dec[1]); u.status = "paid";
            localStorage.setItem("u_" + mob, JSON.stringify(u));
            alert("Activated!"); location.reload();
        } else { alert("Key mismatch!"); }
    } catch(e) { alert("Invalid Key!"); }
}

function launchApp(u) {
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("main-app").classList.remove("hidden");
    let left = Math.ceil((u.expiry - new Date().getTime()) / (1000 * 60 * 60 * 24));
    document.getElementById("trial-timer").innerText = (u.status === "trial" ? "Trial: " : "Paid: ") + left + " Days Remaining";
}

// --- ORIGINAL BILLING LOGIC ---
document.addEventListener("DOMContentLoaded", function(){
    let active = localStorage.getItem("currentSession");
    if(active) {
        let u = JSON.parse(localStorage.getItem("u_" + active));
        if(u && new Date().getTime() < u.expiry) launchApp(u);
    }

    let items=[];
    let total=0;
    const shopInput = document.getElementById("shop");
    shopInput.value = localStorage.getItem("shop")||"";
    document.getElementById("address").value = localStorage.getItem("address")||"";
    document.getElementById("phone").value = localStorage.getItem("phone")||"";
    document.getElementById("upiId").value = localStorage.getItem("upiId")||"";

    document.getElementById("saveShopBtn").addEventListener("click", function(){
        localStorage.setItem("shop", shopInput.value);
        localStorage.setItem("address", document.getElementById("address").value);
        localStorage.setItem("phone", document.getElementById("phone").value);
        localStorage.setItem("upiId", document.getElementById("upiId").value);
        alert("Saved!");
    });

    document.getElementById("addItemBtn").addEventListener("click", function(){
        let p = document.getElementById("productSearch").value;
        let q = +document.getElementById("qty").value;
        let pr = +document.getElementById("price").value;
        if(!p || !q || !pr) return;
        items.push({p,q,pr,t:q*pr});
        let row=document.getElementById("table").insertRow();
        row.insertCell(0).innerText=items.length; row.insertCell(1).innerText=p;
        row.insertCell(2).innerText=q; row.insertCell(3).innerText=pr; row.insertCell(4).innerText=q*pr;
        document.getElementById("productSearch").value=""; document.getElementById("qty").value=""; document.getElementById("price").value="";
    });

    document.getElementById("generateBillBtn").addEventListener("click", function(){
        if(items.length===0) return;
        total=0; items.forEach(i=> total+=i.t);
        let upi = document.getElementById("upiId").value;
        let html=`<b>${shopInput.value}</b><br>${document.getElementById("address").value}<hr>
        <table><tr><th>No</th><th>Item</th><th>Qty</th><th>Total</th></tr>`;
        items.forEach((i,index)=> html+=`<tr><td>${index+1}</td><td>${i.p}</td><td>${i.q}</td><td>₹${i.t}</td></tr>`);
        html+=`<tr class="totalRow"><td colspan="2">Total</td><td>₹${total}</td></tr></table>`;
        if(upi !== ""){
            let qr = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent('upi://pay?pa='+upi+'&pn='+shopInput.value+'&am='+total)}`;
            html += `<center><p>Scan to Pay</p><img src="${qr}"></center>`;
        }
        document.getElementById("bill").innerHTML = html;
    });

    document.getElementById("printBillBtn").addEventListener("click", () => window.print());
    document.getElementById("sendWhatsAppBtn").addEventListener("click", () => {
        window.open("https://wa.me/?text="+encodeURIComponent(document.getElementById("bill").innerText));
    });
});
</script>
</body>
</html>
