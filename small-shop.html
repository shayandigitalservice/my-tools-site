<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Bill Generator – Functional POS</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<meta name="mobile-web-app-capable" content="yes">

<style>
/* --- AAPKA ORIGINAL DESIGN (NO CHANGE) --- */
body{font-family:Arial;background:#ffffff;margin:0;padding:10px;}
.container{max-width:800px;margin:auto;background:transparent;padding:15px;border-radius:0;box-shadow:none;}
h2{text-align:center;}
input, select, button{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;box-sizing:border-box;}
button{border:none;background:#2563eb;color:white;font-size:15px;cursor:pointer;}
table{width:100%;margin-top:10px;border-collapse:collapse;}
th,td{border:1px solid #000;padding:8px;font-size:14px;text-align:center;}
.totalRow td{font-weight:bold;}
.bill{margin-top:20px; overflow-wrap: break-word; word-wrap: break-word;}
.invoice{float:right;}
.clear{clear:both;}
.qr-container{text-align:center; margin-top:15px; padding:10px; border:1px dashed #ccc;}
.qr-container img{width:150px; height:150px;}

/* Subscription Hidden Helpers */
.hidden { display: none !important; }
.trial-tag { text-align: center; color: #b45309; font-weight: bold; margin-bottom: 10px; font-size: 14px; }

@media screen and (max-width:600px){
  table th, table td{padding:6px;font-size:12px;}
  .invoice{float: none; text-align: right;}
  .table-wrapper { overflow-x: auto; width: 100%; }
}
</style>
</head>
<body>

<div id="login-screen" class="container">
    <h2 id="admin-trigger">🧾 Shayan Smart Tools</h2>
    <input id="userMobile" type="number" placeholder="Enter Mobile Number">
    <button id="startBtn">Open App</button>
    
    <div id="lock-box" class="hidden" style="margin-top:20px; color:red; text-align:center;">
        <p><b>Trial Expired!</b> Contact Muksidul: 9957548361</p>
        <input id="licKey" placeholder="Enter License Key">
        <button onclick="activate()" style="background:red;">Activate</button>
    </div>

    <div id="admin-login" class="hidden">
        <input id="mPass" type="password" placeholder="Master Password">
        <button onclick="goAdmin()" style="background:#444;">Admin Login</button>
    </div>
</div>

<div id="admin-gen" class="container hidden">
    <h3>Key Generator</h3>
    <input id="targetM" type="number" placeholder="Mobile Number">
    <button onclick="makeKey()" style="background:purple;">Generate 30 Days Key</button>
    <div id="finalK" style="padding:10px; border:1px dashed #000; margin:10px 0; word-break:break-all; font-weight:bold;"></div>
    <button onclick="location.reload()" style="background:#888;">Back</button>
</div>

<div id="main-app" class="container hidden">
    <div id="trial-msg" class="trial-tag"></div>
    <h2>🧾 Bill Generator</h2>

    <input id="shop" placeholder="Shop Name">
    <input id="address" placeholder="Address">
    <input id="phone" placeholder="Phone">
    <input id="upiId" placeholder="Enter Your UPI ID">
    <button id="saveShopBtn">Save Shop Details</button>

    <input id="customer" placeholder="Customer Name">
    <input id="productSearch" placeholder="Product Name">
    <input id="qty" type="number" placeholder="Qty">
    <input id="price" type="number" placeholder="Price">
    <button id="addItemBtn">Add Item</button>

    <div class="table-wrapper">
        <table id="table"><tr><th>No</th><th>Product</th><th>Qty</th><th>Price</th><th>Total</th></tr></table>
    </div>

    <select id="payment">
        <option value="Cash">Cash</option>
        <option value="UPI">UPI</option>
    </select>

    <button id="generateBillBtn">Generate Bill</button>
    <button id="printBillBtn">Print Bill</button>
    <button id="sendWhatsAppBtn">Send WhatsApp</button>

    <div id="bill" class="bill"></div>
    <div id="totalDay"></div>
</div>

<script>
// --- SUBSCRIPTION LOGIC ---
const MASTER = "shayan123";
let clicks = 0;
document.getElementById("admin-trigger").addEventListener("click", () => {
    clicks++; if(clicks>=5) { document.getElementById("admin-login").classList.remove("hidden"); clicks=0; }
    setTimeout(() => clicks=0, 3000);
});

function goAdmin() {
    if(document.getElementById("mPass").value === MASTER) {
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("admin-gen").classList.remove("hidden");
    }
}

function makeKey() {
    let m = document.getElementById("targetM").value;
    if(m.length < 10) return alert("Sahi number dalein");
    let exp = new Date().getTime() + (30*24*60*60*1000);
    document.getElementById("finalK").innerText = btoa(m + "|" + exp + "|premium");
}

document.getElementById("startBtn").addEventListener("click", () => {
    let mob = document.getElementById("userMobile").value;
    if(mob.length < 10) return alert("10 Digit Mobile Number Required");

    let u = JSON.parse(localStorage.getItem("pos_" + mob));
    let now = new Date().getTime();

    if(!u) { u = { m: mob, ex: now + (7*24*60*60*1000), s: "trial" }; localStorage.setItem("pos_" + mob, JSON.stringify(u)); }

    if(now < u.ex) { localStorage.setItem("activeMob", mob); showApp(u); }
    else { document.getElementById("lock-box").classList.remove("hidden"); document.getElementById("startBtn").classList.add("hidden"); }
});

function activate() {
    let mob = document.getElementById("userMobile").value;
    let k = document.getElementById("licKey").value;
    try {
        let d = atob(k).split("|");
        if(d[0] === mob && d[2] === "premium") {
            let u = JSON.parse(localStorage.getItem("pos_" + mob));
            u.ex = parseInt(d[1]); u.s = "paid";
            localStorage.setItem("pos_" + mob, JSON.stringify(u));
            alert("App Activated!");
            location.reload();
        } else { alert("Wrong Key for this number!"); }
    } catch(e) { alert("Invalid License Key!"); }
}

function showApp(u) {
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("main-app").classList.remove("hidden");
    let days = Math.ceil((u.ex - new Date().getTime()) / (1000*60*60*24));
    document.getElementById("trial-msg").innerText = (u.s==="trial"?"Trial: ":"Paid: ") + days + " Days Remaining";
}

// --- ORIGINAL BILLING LOGIC ---
document.addEventListener("DOMContentLoaded", function(){
    let active = localStorage.getItem("activeMob");
    if(active) { 
        let u = JSON.parse(localStorage.getItem("pos_" + active));
        if(u && new Date().getTime() < u.ex) showApp(u);
    }

    let items=[]; let total=0;
    const shopInput = document.getElementById("shop");
    shopInput.value = localStorage.getItem("shop")||"";
    document.getElementById("address").value = localStorage.getItem("address")||"";
    document.getElementById("phone").value = localStorage.getItem("phone")||"";
    document.getElementById("upiId").value = localStorage.getItem("upiId")||"";

    document.getElementById("saveShopBtn").addEventListener("click", function(){
        localStorage.setItem("shop", shopInput.value);
        localStorage.setItem("address", document.getElementById("address").value);
        localStorage.setItem("phone", document.getElementById("phone").value);
        localStorage.setItem("upiId", document.getElementById("upiId").value);
        alert("Details Saved!");
    });

    document.getElementById("addItemBtn").addEventListener("click", function(){
        let p = document.getElementById("productSearch").value;
        let q = +document.getElementById("qty").value;
        let pr = +document.getElementById("price").value;
        if(!p || !q || !pr) return;
        let t = q*pr; items.push({p,q,pr,t});
        let row=document.getElementById("table").insertRow();
        row.insertCell(0).innerText=items.length; row.insertCell(1).innerText=p;
        row.insertCell(2).innerText=q; row.insertCell(3).innerText=pr; row.insertCell(4).innerText=t;
    });

    document.getElementById("generateBillBtn").addEventListener("click", function(){
        if(items.length===0) return;
        total=0; items.forEach(i=> total+=i.t);
        let upiId = document.getElementById("upiId").value;
        let html=`<div class="invoice">Inv No: 1</div><div class="clear"></div>
        <b>${shopInput.value}</b><br>${document.getElementById("address").value}<hr>
        <table><tr><th>Item</th><th>Qty</th><th>Total</th></tr>`;
        items.forEach(i=> html+=`<tr><td>${i.p}</td><td>${i.q}</td><td>₹${i.t}</td></tr>`);
        html+=`<tr class="totalRow"><td colspan="2">Total</td><td>₹${total}</td></tr></table>`;
        if(upiId !== ""){
            let qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent('upi://pay?pa='+upiId+'&pn='+shopInput.value+'&am='+total)}`;
            html += `<div class="qr-container"><p>Scan to Pay ₹${total}</p><img src="${qrUrl}"></div>`;
        }
        document.getElementById("bill").innerHTML = html;
    });

    document.getElementById("printBillBtn").addEventListener("click", function(){ window.print(); });
    document.getElementById("sendWhatsAppBtn").addEventListener("click", function(){
        let text="🧾 BILL RECEIPT\n\n"+document.getElementById("bill").innerText;
        window.open("https://wa.me/?text="+encodeURIComponent(text));
    });
});
</script>
</body>
</html>
