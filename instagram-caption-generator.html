<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instagram Caption Generator</title>

<meta name="description" content="Generate creative Instagram captions instantly with our free Instagram Caption Generator tool.">

<style>

body{
font-family: Arial, sans-serif;
background:#e9e9e9;
margin:0;
padding:0;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

h1{
color:#2b7cff;
margin-top:20px;
}

.box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 6px 12px rgba(0,0,0,0.15);
margin-top:20px;
}

input{
width:90%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
background:#2b7cff;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#1f5ed6;
}

.result{
margin-top:20px;
font-size:18px;
background:#f5f5f5;
padding:15px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Instagram Caption Generator</h1>

<p>Create cool captions for your Instagram posts instantly.</p>

<div class="box">

<input type="text" id="topic" placeholder="Enter topic (example: travel, selfie, gym)">

<br>

<button onclick="generateCaption()">Generate Caption</button>

<div class="result" id="result">
Your caption will appear here...
</div>

</div>

</div>

<script>

function generateCaption(){

let topic = document.getElementById("topic").value;

let captions = [

"Living my best " + topic + " life ✨",
"Just another day of " + topic + " vibes 😎",
"Feeling amazing with this " + topic + " moment 💫",
"This " + topic + " moment deserves a post 📸",
"Stay positive and enjoy " + topic + " 🌟",
"Good vibes and " + topic + " only 🔥",
"Making memories with " + topic + " ❤️",
"Keep calm and love " + topic + " 😍",
"Every moment of " + topic + " matters 💯",
"Smiling because of " + topic + " 😊"

];

let random = captions[Math.floor(Math.random()*captions.length)];

document.getElementById("result").innerHTML = random;

}

</script>

</body>
</html>
