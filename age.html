<!DOCTYPE html>
<html>
<head>

<title>Advanced Age Calculator 2026 – Exact Age & Birthday Countdown Online</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Use our Advanced Age Calculator 2026 to calculate your exact age in years, months, days, hours, minutes and seconds.">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f1f5f9;
color:#222;
}

/* HEADER */
.header{
background:#2563eb;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:600;
}

/* MAIN */
.container{
max-width:700px;
margin:30px auto;
padding:20px;
background:white;
border-radius:10px;
border:1px solid #ddd;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

/* BUTTON */
button{
background:#2563eb;
color:white;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
width:100%;
font-size:15px;
}

button:hover{
background:#1e40af;
}

/* RESULT */
.result{
margin-top:20px;
padding:20px;
background:#eff6ff;
border:1px solid #2563eb;
border-radius:8px;
}

/* RESULT STYLE */
.result h3{
color:#1e3a8a;
margin-bottom:10px;
}

.result-box{
display:flex;
justify-content:space-between;
background:white;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ddd;
}

.highlight{
background:#2563eb;
color:white;
padding:10px;
border-radius:6px;
text-align:center;
margin-top:10px;
}

/* SECTION */
.section{
max-width:900px;
margin:30px auto;
padding:25px;
background:white;
border-radius:10px;
border:1px solid #ddd;
}

h2{
margin-bottom:10px;
color:#1e3a8a;
}

a{
color:#2563eb;
text-decoration:none;
}

</style>

</head>

<body>

<div class="header">
🎂 Advanced Age Calculator 2026
</div>

<div class="container">

<h2>Calculate Your Age</h2>

<input type="date" id="dob">

<button onclick="startAge()">Calculate Age</button>

<div id="result" class="result"></div>

<br>
<a href="index.html">⬅ Back to Home</a>

</div>

<!-- SEO -->
<div class="section">
<h2>Advanced Age Calculator 2026</h2>
<p>This tool helps you calculate your exact age with live birthday countdown.</p>
</div>

<script>

let interval;

function startAge(){

let dobValue = document.getElementById("dob").value;

if(!dobValue){
alert("Please select your date of birth");
return;
}

let dob = new Date(dobValue);
clearInterval(interval);

function updateAge(){

let now = new Date();

let years = now.getFullYear() - dob.getFullYear();
let months = now.getMonth() - dob.getMonth();
let days = now.getDate() - dob.getDate();

if(days < 0){
months--;
let prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
days += prevMonth.getDate();
}

if(months < 0){
years--;
months += 12;
}

let hours = now.getHours();
let minutes = now.getMinutes();
let seconds = now.getSeconds();

let nextBirthday = new Date(now.getFullYear(), dob.getMonth(), dob.getDate());

if(nextBirthday <= now){
nextBirthday.setFullYear(now.getFullYear() + 1);
}

let dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
let birthdayDayName = dayNames[nextBirthday.getDay()];

let tempDate = new Date(now);
let bMonths = 0;

while(new Date(tempDate.getFullYear(), tempDate.getMonth()+1, tempDate.getDate()) <= nextBirthday){
tempDate.setMonth(tempDate.getMonth()+1);
bMonths++;
}

let remainingTime = nextBirthday - tempDate;
let bDays = Math.floor(remainingTime / (1000*60*60*24));

let totalDiff = nextBirthday - now;

let bHours = Math.floor((totalDiff / (1000*60*60)) % 24);
let bMinutes = Math.floor((totalDiff / (1000*60)) % 60);
let bSeconds = Math.floor((totalDiff / 1000) % 60);

/* NEW RESULT DESIGN */
document.getElementById("result").innerHTML =

"<h3>🎉 Your Exact Age</h3>" +

"<div class='result-box'><span>Years</span><span>"+years+"</span></div>" +
"<div class='result-box'><span>Months</span><span>"+months+"</span></div>" +
"<div class='result-box'><span>Days</span><span>"+days+"</span></div>" +
"<div class='result-box'><span>Hours</span><span>"+hours+"</span></div>" +
"<div class='result-box'><span>Minutes</span><span>"+minutes+"</span></div>" +
"<div class='result-box'><span>Seconds</span><span>"+seconds+"</span></div>" +

"<h3 style='margin-top:15px;'>🎂 Next Birthday</h3>" +
"<div class='result-box'><span>Day</span><span>"+birthdayDayName+"</span></div>" +

"<h3 style='margin-top:15px;'>⏳ Countdown</h3>" +

"<div class='result-box'><span>Months Left</span><span>"+bMonths+"</span></div>" +
"<div class='result-box'><span>Days Left</span><span>"+bDays+"</span></div>" +
"<div class='result-box'><span>Hours Left</span><span>"+bHours+"</span></div>" +
"<div class='result-box'><span>Minutes Left</span><span>"+bMinutes+"</span></div>" +
"<div class='result-box'><span>Seconds Left</span><span>"+bSeconds+"</span></div>" +

"<div class='highlight'>🎉 Live Updating Every Second</div>";

}

updateAge();
interval = setInterval(updateAge,1000);

}

</script>

</body>
</html>
