<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Image to Video + Audio | Shayan Smart Tools</title>
<style>
body { font-family: Arial, sans-serif; background:#f1f5f9; text-align:center; padding:20px;}
.container{ max-width:550px; margin:auto; background:#fff; padding:20px; border-radius:10px;
 box-shadow:0 10px 20px rgba(0,0,0,0.1);}
input, button{ width:100%; padding:12px; margin:8px 0; border-radius:6px; border:1px solid #ccc;}
button{ background:#2563eb; color:#fff; border:none; cursor:pointer;}
button:hover{ background:#1e4fd8;}
video{ width:100%; margin-top:15px;}
</style>
</head>
<body>

<h2>Image to Video with Audio</h2>

<div class="container">

<input type="file" id="images" accept="image/*" multiple>
<input type="number" id="duration" placeholder="Seconds per image" value="2" min="1">
<input type="file" id="audioFile" accept="audio/*">
<button id="genBtn">Generate & Merge</button>

<video id="player" controls></video>
<a id="download" style="display:none; margin-top:15px; background:#2563eb; color:#fff; padding:12px 15px; border-radius:6px;">Download Video</a>

<p id="status"></p>

</div>

<script type="module">
import { FFmpeg } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js';
import { fetchFile } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js';

const ffmpeg = FFmpeg.createFFmpeg({ log:true });
const imagesEl = document.getElementById('images');
const audioEl = document.getElementById('audioFile');
const durationEl = document.getElementById('duration');
const btn = document.getElementById('genBtn');
const statusP = document.getElementById('status');
const player = document.getElementById('player');
const downloadLink = document.getElementById('download');

btn.addEventListener('click', async ()=>{
  if(!imagesEl.files.length){ alert('Select images!'); return; }
  if(!audioEl.files.length){ alert('Select audio!'); return; }

  statusP.textContent = 'Loading FFmpeg... please wait';
  await ffmpeg.load();

  // write images
  const duration = parseFloat(durationEl.value) || 2;
  let txt = '';
  for(let i=0;i<imagesEl.files.length;i++){
    const img = imagesEl.files[i];
    await ffmpeg.writeFile(`img${i}.jpg`, await fetchFile(img));
    txt += `file 'img${i}.jpg'\nduration ${duration}\n`;
  }
  // list
  await ffmpeg.writeFile('list.txt', txt + `file 'img${imagesEl.files.length-1}.jpg'`);

  // encode images to video
  statusP.textContent = 'Creating video…';
  await ffmpeg.exec([
    '-f','concat','-safe','0','-i','list.txt','-vsync','vfr','-pix_fmt','yuv420p','video.mp4'
  ]);

  // write audio
  const audioFile = audioEl.files[0];
  await ffmpeg.writeFile('audio.mp3', await fetchFile(audioFile));

  // merge audio + video
  statusP.textContent = 'Merging with audio…';
  await ffmpeg.exec([
    '-i','video.mp4','-i','audio.mp3','-c:v','copy','-c:a','aac','-shortest','output.mp4'
  ]);

  // get output
  const data = ffmpeg.readFile('output.mp4');
  const url = URL.createObjectURL(new Blob([data.buffer], {type:'video/mp4'}));
  player.src = url;

  downloadLink.href = url;
  downloadLink.download = 'image-audio-video.mp4';
  downloadLink.style.display = 'block';

  statusP.textContent = '🎉 Video Ready!';
});
</script>

</body>
</html>
