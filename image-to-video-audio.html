<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to Video with Audio - Shayan Smart Tools</title>
<meta name="description" content="Create video from images and add audio easily.">
<style>
body {
  font-family: Arial, sans-serif;
  background: #f1f5f9;
  margin: 0;
  padding: 20px;
  text-align: center;
}

h1 { margin-bottom: 20px; color:#2b7cff; }

.container {
  background: white;
  max-width: 500px;
  margin: auto;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

input[type="file"], input[type="number"] {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover { background: #1e4fd8; }

video { margin-top: 15px; width: 100%; }
</style>
</head>
<body>

<h1>Image to Video + Audio</h1>

<div class="container">
  <input type="file" id="images" multiple accept="image/*">
  <input type="number" id="duration" placeholder="Seconds per image" value="2" min="1">
  <input type="file" id="audioFile" accept="audio/*">
  <button onclick="generateVideo()">Generate Video</button>
  <video id="videoPlayer" controls></video>
  <a id="downloadBtn" style="display:none" download="video.mp4">Download Video</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/whammy@0.0.9/whammy.js"></script>
<script>
async function generateVideo() {
  const imagesInput = document.getElementById('images');
  const audioInput = document.getElementById('audioFile');
  const duration = parseFloat(document.getElementById('duration').value) || 2;
  const videoPlayer = document.getElementById('videoPlayer');
  const downloadBtn = document.getElementById('downloadBtn');

  if (!imagesInput.files.length) {
    alert("Please upload at least one image");
    return;
  }

  // Load images
  const images = [];
  for (let file of imagesInput.files) {
    const img = new Image();
    img.src = URL.createObjectURL(file);
    await img.decode();
    images.push(img);
  }

  // Create video using Whammy
  const width = images[0].naturalWidth;
  const height = images[0].naturalHeight;
  const encoder = new Whammy.Video(30); // 30 fps

  for (let img of images) {
    encoder.add(img, duration * 1000); // duration in ms
  }

  const output = encoder.compile();
  const videoBlob = new Blob([output], { type: 'video/webm' });

  // If audio uploaded, merge audio using MediaSource
  if (audioInput.files.length) {
    const audioFile = audioInput.files[0];
    const audioUrl = URL.createObjectURL(audioFile);
    const videoUrl = URL.createObjectURL(videoBlob);
    const finalBlob = await mergeAudioVideo(videoUrl, audioUrl);
    videoPlayer.src = URL.createObjectURL(finalBlob);
    downloadBtn.href = videoPlayer.src;
  } else {
    videoPlayer.src = URL.createObjectURL(videoBlob);
    downloadBtn.href = videoPlayer.src;
  }

  downloadBtn.style.display = "block";
}

async function mergeAudioVideo(videoUrl, audioUrl) {
  return new Promise(async (resolve) => {
    const video = document.createElement('video');
    video.src = videoUrl;
    await video.play().catch(()=>{}); // load metadata
    video.pause();

    const audio = document.createElement('audio');
    audio.src = audioUrl;
    await audio.play().catch(()=>{});
    audio.pause();

    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');

    const stream = canvas.captureStream(30); // fps
    const audioStream = audio.captureStream();
    const combinedStream = new MediaStream([...stream.getTracks(), ...audioStream.getTracks()]);

    const recorder = new MediaRecorder(combinedStream);
    const chunks = [];
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => resolve(new Blob(chunks, { type: 'video/webm' }));
    recorder.start();

    video.play();
    audio.play();

    const draw = () => {
      if (video.paused || video.ended) return;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      requestAnimationFrame(draw);
    };
    draw();

    setTimeout(() => recorder.stop(), Math.max(video.duration * 1000, audio.duration * 1000));
  });
}
</script>

</body>
</html>
