<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assam Land Measurement Calculator</title>
    <style>
        /* Minimalist Style - No Container Box */
        .measurement-tool {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            color: #333;
            padding: 10px;
        }

        .input-section {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .field {
            flex: 1;
            min-width: 140px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
        }

        input:focus { border-color: #2e7d32; }

        .btn-convert {
            width: 100%;
            background: #2e7d32;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-convert:active { background: #1b5e20; }

        .results-list {
            margin-top: 30px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .res-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f1f1f1;
            font-size: 16px;
        }

        .res-item strong {
            color: #2e7d32;
            font-size: 18px;
        }

        .bkl-special {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
            margin-bottom: 15px;
            border: 1px dashed #2e7d32;
        }
    </style>
</head>
<body>

<div class="measurement-tool">
    <h2 style="text-align:center;">Land Measurement Calculator (Assam)</h2>
    
    <div class="input-section">
        <div class="field">
            <label>Length (Lambai)</label>
            <input type="number" id="length" placeholder="Enter length">
        </div>
        <div class="field">
            <label>Width (Chaudai)</label>
            <input type="number" id="width" placeholder="Enter width">
        </div>
        <div class="field">
            <label>Unit</label>
            <select id="unitType">
                <option value="ft">Feet (ft)</option>
                <option value="mt">Meter (m)</option>
            </select>
        </div>
    </div>

    <button class="btn-convert" onclick="calculateLand()">CONVERT NOW</button>

    <div id="resultArea" class="results-list" style="display:none;">
        <div class="bkl-special">
            <span style="display:block; font-size: 14px; color: #666;">Assam Standard Format:</span>
            <strong id="bklText" style="font-size: 24px;">0 Bigha, 0 Katha, 0 Lessa</strong>
        </div>

        <div class="res-item"><span>Total Square Feet:</span> <strong id="resSqft">0</strong></div>
        <div class="res-item"><span>Total Bigha:</span> <strong id="resBigha">0</strong></div>
        <div class="res-item"><span>Total Acre:</span> <strong id="resAcre">0</strong></div>
        <div class="res-item"><span>Total Hectare:</span> <strong id="resHectare">0</strong></div>
    </div>
</div>

<script>
    function calculateLand() {
        const length = parseFloat(document.getElementById('length').value);
        const width = parseFloat(document.getElementById('width').value);
        const unit = document.getElementById('unitType').value;
        const resultArea = document.getElementById('resultArea');

        if (!length || !width) {
            alert("Please enter both length and width");
            return;
        }

        let sqft = 0;
        if (unit === "ft") {
            sqft = length * width;
        } else {
            // Meter to Feet conversion (1m = 3.28084 ft)
            // 1 sq meter = 10.7639 sq ft
            sqft = (length * width) * 10.7639;
        }

        const BIGHA_SQFT = 14400;
        const KATHA_SQFT = 3600;
        const LESSA_SQFT = 180;

        // Bigha - Katha - Lessa Logic
        let tempSqft = sqft;
        const bighas = Math.floor(tempSqft / BIGHA_SQFT);
        tempSqft %= BIGHA_SQFT;

        const kathas = Math.floor(tempSqft / KATHA_SQFT);
        tempSqft %= KATHA_SQFT;

        const lessas = (tempSqft / LESSA_SQFT).toFixed(2);

        // Update UI
        document.getElementById('bklText').innerText = `${bighas} Bigha, ${kathas} Katha, ${lessas} Lessa`;
        document.getElementById('resSqft').innerText = sqft.toLocaleString(undefined, {maximumFractionDigits: 2}) + " sq.ft";
        document.getElementById('resBigha').innerText = (sqft / BIGHA_SQFT).toFixed(4);
        document.getElementById('resAcre').innerText = (sqft / 43560).toFixed(4);
        document.getElementById('resHectare').innerText = (sqft / 107639).toFixed(4);

        resultArea.style.display = "block";
    }
</script>

</body>
</html>
