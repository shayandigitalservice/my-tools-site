<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF Lock / Unlock Tool</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}

/* MAIN CARD */
.container{
background:white;
padding:30px;
border-radius:20px;
width:100%;
max-width:420px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
text-align:center;
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

h1{
font-size:24px;
margin-bottom:20px;
color:#333;
}

/* Upload Box */
.upload{
border:2px dashed #667eea;
padding:25px;
border-radius:12px;
cursor:pointer;
margin-bottom:15px;
transition:0.3s;
}

.upload:hover{
background:#f4f7ff;
}

/* Inputs */
input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
transition:0.3s;
}

input:focus{
border-color:#667eea;
outline:none;
box-shadow:0 0 5px rgba(102,126,234,0.4);
}

/* Buttons */
button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

/* Lock Button */
.lock{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
}

.lock:hover{
transform:scale(1.05);
}

/* Unlock Button */
.unlock{
background:linear-gradient(135deg,#43cea2,#185a9d);
color:white;
}

.unlock:hover{
transform:scale(1.05);
}

/* Tools Section */
.tools{
margin-top:30px;
background:white;
padding:20px;
border-radius:15px;
width:100%;
max-width:420px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

.tools h3{
margin-bottom:10px;
}

.tools a{
display:block;
margin:6px 0;
text-decoration:none;
color:#667eea;
font-size:14px;
transition:0.3s;
}

.tools a:hover{
color:#764ba2;
}

/* Footer */
footer{
margin-top:20px;
color:white;
font-size:13px;
}

</style>

</head>

<body>

<div class="container">

<h1>🔐 PDF Lock / Unlock</h1>

<div class="upload">
Upload PDF File
<br><br>
<input type="file" accept="application/pdf">
</div>

<input type="password" placeholder="Enter Password">

<button class="lock">Lock PDF</button>

<button class="unlock">Unlock PDF</button>

</div>

<!-- TOOLS -->
<div class="tools">

<h3>More Tools</h3>

<a href="gst.html">GST Calculator</a>

<a href="image-converter.html">Image Converter</a>
<a href="pdf-merge.html">PDF Merge Tool</a>

</div>

<footer>
© 2026 Shayan Smart Tools | All Rights Reserved
</footer>

</body>
</html>
