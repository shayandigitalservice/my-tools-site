<script>
async function handlePdf(action) {
    const fileInput = document.getElementById('pdf-input');
    const password = document.getElementById('pdf-pass').value;
    const resultDiv = document.getElementById('result');
    const statusMsg = document.getElementById('status-msg');
    const dlBtn = document.getElementById('dl-btn');

    if (!fileInput.files[0]) return alert("Please select a PDF file!");
    if (!password) return alert("Please enter a password!");

    // Show result box with processing message
    resultDiv.style.display = "block";
    statusMsg.innerText = "Processing... Please wait.";
    dlBtn.style.display = "none";

    try {
        const file = fileInput.files[0];
        const arrayBuffer = await file.arrayBuffer();
        
        let pdfDoc;
        if (action === 'unlock') {
            // Unlock: Load with password, save without
            pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer, { password });
        } else {
            // Lock: Load normally
            pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
        }

        const pdfBytes = await pdfDoc.save({
            userPassword: action === 'lock' ? password : null,
            ownerPassword: action === 'lock' ? password : null
        });

        const blob = new Blob([pdfBytes], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);

        dlBtn.href = url;
        dlBtn.download = action === 'lock' ? "Protected_ShayanTools.pdf" : "Unlocked_ShayanTools.pdf";
        dlBtn.style.display = "block";
        statusMsg.innerText = action === 'lock' ? "✅ PDF Locked Successfully!" : "✅ Password Removed Successfully!";

    } catch (e) {
        statusMsg.innerText = "❌ Error: Invalid password or file issue.";
        console.error(e);
    }
}
</script>
