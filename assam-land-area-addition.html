<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assam Land Area Addition Calculator 2026 | Bigha-Katha-Lessa Jod Tool</title>
    
    <meta name="description" content="Official Assam Land Area Addition Tool. Add multiple plots in Bigha, Katha, and Lessa accurately with 5-Katha carry logic. Best SEO tool for Assam Dharitree records.">
    <meta name="keywords" content="Assam Land Area Addition, Zameen ka jod Assam, Bigha Katha Lessa Calculator, Assam Land Area Sum, Shayan Smart Tools Assam, Dharitree Area Calculator">

    <style>
        :root { --assam-green: #1b5e20; --accent-light: #f1f8e9; --text-main: #2c3e50; }
        body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.8; color: var(--text-main); max-width: 1000px; margin: 0 auto; padding: 20px; background-color: #f4fbf4; }
        .tool-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--assam-green); margin-bottom: 50px; position: relative; }
        h1 { color: var(--assam-green); text-align: center; margin-bottom: 5px; font-size: 24px; }
        .tagline { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .plot-container { background: var(--accent-light); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #c8e6c9; }
        .plot-header { font-weight: bold; color: var(--assam-green); margin-bottom: 15px; display: block; border-bottom: 1px solid #a5d6a7; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 15px; }
        .field { display: flex; flex-direction: column; }
        .field label { font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        input { padding: 12px; border: 2px solid #ddd; border-radius: 6px; text-align: center; font-size: 16px; width: 100%; box-sizing: border-box; }
        .btn-box { display: flex; gap: 15px; justify-content: center; margin: 30px 0; }
        .btn { padding: 15px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-add { background: #4caf50; color: white; }
        .btn-calc { background: var(--assam-green); color: white; }
        .btn-lang { background: #f39c12; color: white; padding: 8px 15px; font-size: 14px; position: absolute; top: 15px; right: 15px; }
        .btn-wa { background: #25D366; color: white; margin-top: 15px; width: 100%; }
        .result-panel { background: var(--assam-green); color: white; padding: 30px; border-radius: 12px; display: none; text-align: center; }
        .res-row { display: flex; justify-content: space-around; font-size: 26px; font-weight: bold; }
        .res-unit span { display: block; font-size: 14px; font-weight: normal; color: #a5d6a7; margin-top: 5px; }
        .seo-section { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2, h3 { color: var(--assam-green); margin-top: 35px; border-left: 5px solid var(--assam-green); padding-left: 15px; }
        table { width: 100%; border-collapse: collapse; margin: 25px 0; }
        th, td { border: 1px solid #ddd; padding: 15px; text-align: left; }
        th { background: #f1f8e9; color: var(--assam-green); }
        footer { text-align: center; padding: 40px 0; border-top: 1px solid #eee; margin-top: 50px; color: #888; }
    </style>
</head>
<body>

    <div class="tool-card">
        <button class="btn btn-lang" onclick="toggleLang()">Assamese/Hindi/Eng</button>
        <h1 id="t_mainTitle">Assam Land Area Addition Tool</h1>
        <p class="tagline" id="t_tagline">Assam Dharitree Standard: 1 Bigha = 5 Katha | 1 Katha = 20 Lessa</p>

        <div id="plotsList">
            <div class="plot-container">
                <span class="plot-header l_plotHeader">Plot Detail #1</span>
                <div class="input-grid">
                    <div class="field"><label class="l_bigha">Bigha</label><input type="number" class="b-val" placeholder="0"></div>
                    <div class="field"><label class="l_katha">Katha</label><input type="number" class="k-val" placeholder="0"></div>
                    <div class="field"><label class="l_lessa">Lessa</label><input type="number" class="l-val" placeholder="0"></div>
                </div>
            </div>
        </div>

        <div class="btn-box">
            <button class="btn btn-add" id="t_btnAdd" onclick="addNewPlot()">+ Add Plot</button>
            <button class="btn btn-calc" id="t_btnCalc" onclick="calculateTotal()">Calculate Total Jod</button>
        </div>

        <div id="resPanel" class="result-panel">
            <h3 id="t_resHeading" style="color:white; border:none; margin-top:0;">Total Area:</h3>
            <div class="res-row">
                <div class="res-unit"><span id="rb">0</span><span class="l_bigha">Bigha</span></div>
                <div class="res-unit"><span id="rk">0</span><span class="l_katha">Katha</span></div>
                <div class="res-unit"><span id="rl">0</span><span class="l_lessa">Lessa</span></div>
            </div>
            <button class="btn btn-wa" id="t_btnWa" onclick="sendWhatsApp()">Send on WhatsApp</button>
        </div>
    </div>

    <article class="seo-section" id="fullSEO">
        </article>

    <script>
        let plotIdx = 1;
        let currentLang = 'hi'; // Default Hindi as per your original code

        const langData = {
            en: {
                title: "Assam Land Area Addition Tool",
                tag: "Assam Dharitree Standard: 1 Bigha = 5 Katha | 1 Katha = 20 Lessa",
                add: "+ Add Plot", calc: "Calculate Total Jod", res: "Total Area:", b: "Bigha", k: "Katha", l: "Lessa", plot: "Plot Detail #", wa: "Send on WhatsApp",
                seo: `<h2>Assam Land Area Addition: How to Calculate?</h2>
                <p>Land measurement in Assam is unique. This tool uses the official 5-Katha logic for accurate summation of multiple plots.</p>
                <h3>How to Use?</h3>
                <ol><li>Input Details: Enter Bigha, Katha, Lessa.</li><li>Add Plots: Click + Add Plot for more rows.</li><li>Calculate: See instant results.</li></ol>
                <h3>Assam Land Unit Table</h3>
                <table><tr><th>Unit</th><th>Relation</th><th>Sq Ft</th></tr>
                <tr><td>1 Bigha</td><td>5 Katha</td><td>14,400</td></tr>
                <tr><td>1 Katha</td><td>20 Lessa</td><td>2,880</td></tr></table>`
            },
            hi: {
                title: "असम भूमि क्षेत्र जोड़ कैलकुलेटर",
                tag: "असम धरित्री मानक: 1 बीघा = 5 कट्ठा | 1 कट्ठा = 20 लेसा",
                add: "+ प्लॉट जोड़ें", calc: "कुल जोड़ निकालें", res: "कुल क्षेत्रफल (Total Area):", b: "बीघा", k: "कट्ठा", l: "लेसा", plot: "प्लॉट विवरण #", wa: "व्हाट्सएप पर भेजें",
                seo: `<h2>Assam Land Area Addition: Zameen Ka Jod Kaise Nikalein?</h2>
                <p>Assam mein zameen ki napai baaki Bharat se alag hai. Shayan Smart Tools ka yeh calculator 5-Katha logic par kaam karta hai.</p>
                <h3>How to Use Assam Land Area Addition Tool?</h3>
                <ol><li>Input Details: Bigha, Katha aur Lessa bharein.</li><li>Multiple Plots: + Add Plot button use karein.</li><li>Calculation: Calculate Total Jod par click karein.</li></ol>
                <h3>Assam Land Unit Table (Dharitree Standard)</h3>
                <table><tr><th>Unit Name</th><th>Relation</th><th>In Square Feet</th></tr>
                <tr><td>1 Bigha</td><td>5 Katha</td><td>14,400 Sq Ft</td></tr>
                <tr><td>1 Katha</td><td>20 Lessa</td><td>2,880 Sq Ft</td></tr></table>
                <h3>Frequently Asked Questions (FAQs)</h3>
                <p><b>Q1. Assam mein 1 Bigha mein kitne Katha?</b><br>Ans: 5 Katha.</p>`
            },
            as: {
                title: "অসম ভূমি কালি যোগ কেলকুলেটৰ",
                tag: "অসম ধৰিত্ৰী মানক: ১ বিঘা = ৫ কঠা | ১ কঠা = ২০ লেচা",
                add: "+ মাটি যোগ কৰক", calc: "মুঠ যোগফল উলিয়াওক", res: "মুঠ কালি (Total Area):", b: "বিঘা", k: "কঠা", l: "লেচা", plot: "মাটিৰ বিৱৰণ #", wa: "হোৱাটছএপত পঠাওক",
                seo: `<h2>অসম ভূমি কালি যোগফল: কেনেকৈ গণনা কৰিব?</h2>
                <p>অসমত মাটিৰ জোখ-মাখ অনন্য। এই সঁজুলিটোৱে সঠিক যোগফলৰ বাবে চৰকাৰী ৫-কঠা নিয়ম ব্যৱহাৰ কৰে।</p>
                <h3>ব্যৱহাৰৰ নিয়ম:</h3>
                <ol><li>বিৱৰণ লিখক: বিঘা, কঠা আৰু লেচা লিখক।</li><li>মাটি যোগ কৰক: + বুটামত টিপক।</li><li>গণনা কৰক: মুঠ ফলাফল চাওক।</li></ol>
                <h3>অসমৰ ভূমি একক তালিকা</h3>
                <table><tr><th>এককৰ নাম</th><th>সম্পৰ্ক</th><th>বৰ্গফুট</th></tr>
                <tr><td>১ বিঘা</td><td>৫ কঠা</td><td>১৪,৪০০</td></tr>
                <tr><td>১ কঠা</td><td>২০ লেচা</td><td>২,৮৮০</td></tr></table>`
            }
        };

        function toggleLang() {
            currentLang = (currentLang === 'en') ? 'hi' : (currentLang === 'hi' ? 'as' : 'en');
            updatePage();
        }

        function updatePage() {
            const d = langData[currentLang];
            document.getElementById('t_mainTitle').innerText = d.title;
            document.getElementById('t_tagline').innerText = d.tag;
            document.getElementById('t_btnAdd').innerText = d.add;
            document.getElementById('t_btnCalc').innerText = d.calc;
            document.getElementById('t_resHeading').innerText = d.res;
            document.getElementById('t_btnWa').innerText = d.wa;
            document.getElementById('fullSEO').innerHTML = d.seo;

            document.querySelectorAll('.l_bigha').forEach(e => e.innerText = d.b);
            document.querySelectorAll('.l_katha').forEach(e => e.innerText = d.k);
            document.querySelectorAll('.l_lessa').forEach(e => e.innerText = d.l);
            document.querySelectorAll('.l_plotHeader').forEach((e, i) => e.innerText = d.plot + (i+1));
        }

        function addNewPlot() {
            plotIdx++;
            const list = document.getElementById('plotsList');
            const d = langData[currentLang];
            const div = document.createElement('div');
            div.className = 'plot-container';
            div.innerHTML = `<span class="plot-header l_plotHeader">${d.plot}${plotIdx}</span>
                <div class="input-grid">
                    <div class="field"><label class="l_bigha">${d.b}</label><input type="number" class="b-val" placeholder="0"></div>
                    <div class="field"><label class="l_katha">${d.k}</label><input type="number" class="k-val" placeholder="0"></div>
                    <div class="field"><label class="l_lessa">${d.l}</label><input type="number" class="l-val" placeholder="0"></div>
                </div>`;
            list.appendChild(div);
        }

        function calculateTotal() {
            let tb = 0, tk = 0, tl = 0;
            document.querySelectorAll('.b-val').forEach(i => tb += Number(i.value) || 0);
            document.querySelectorAll('.k-val').forEach(i => tk += Number(i.value) || 0);
            document.querySelectorAll('.l-val').forEach(i => tl += Number(i.value) || 0);
            if (tl >= 20) { tk += Math.floor(tl / 20); tl %= 20; }
            if (tk >= 5) { tb += Math.floor(tk / 5); tk %= 5; }
            document.getElementById('rb').innerText = tb;
            document.getElementById('rk').innerText = tk;
            document.getElementById('rl').innerText = tl;
            document.getElementById('resPanel').style.display = "block";
        }

        function sendWhatsApp() {
            let b = document.getElementById('rb').innerText, k = document.getElementById('rk').innerText, l = document.getElementById('rl').innerText;
            let text = `*Assam Land Calculation*%0ATotal: ${b} Bigha, ${k} Katha, ${l} Lessa%0A_via Shayan Smart Tools_`;
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }

        // Initialize first view
        updatePage();
    </script>
</body>
</html>
