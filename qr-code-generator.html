<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Code Generator 2026 – Free QR Code Maker Online</title>

<meta name="description" content="Free online QR Code Generator. Create QR codes for links, WhatsApp, WiFi, email, phone and download high quality QR codes instantly.">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.tool-card{
background:white;
padding:25px;
border-radius:14px;
max-width:420px;
margin:auto;
text-align:center;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

#qrcode{
margin-top:20px;
position:relative;
display:inline-block;
}

.history{
margin-top:20px;
font-size:13px;
color:#555;
}

</style>

</head>

<body>

<div class="container">

<h1 style="text-align:center;">QR Code Generator</h1>

<div class="tool-card">

<select id="qrType">
<option value="text">Text / URL</option>
<option value="whatsapp">WhatsApp</option>
<option value="wifi">WiFi</option>
<option value="email">Email</option>
<option value="phone">Phone</option>
<option value="social">Social Media</option>
</select>

<input type="text" id="text" placeholder="Enter text or URL">

<input type="color" id="qrColor" value="#000000">

<input type="range" id="qrSize" min="150" max="350" value="200">

<input type="file" id="logoUpload" accept="image/*">

<button onclick="generateQR()">Generate QR Code</button>

<div id="qrcode"></div>

<button onclick="downloadQR()">Download QR Code</button>

<div class="history">
<b>QR History:</b>
<ul id="historyList"></ul>
</div>

</div>

</div>

<script>

let qr

function generateQR(){

let text=document.getElementById("text").value
let type=document.getElementById("qrType").value
let color=document.getElementById("qrColor").value
let size=document.getElementById("qrSize").value

if(text===""){
alert("Enter text or URL")
return
}

if(type==="whatsapp"){
text="https://wa.me/"+text
}

if(type==="email"){
text="mailto:"+text
}

if(type==="phone"){
text="tel:"+text
}

if(type==="wifi"){
text="WIFI:T:WPA;S:"+text+";;"
}

document.getElementById("qrcode").innerHTML=""

qr=new QRCode(document.getElementById("qrcode"),{
text:text,
width:size,
height:size,
colorDark:color,
colorLight:"#ffffff"
})

setTimeout(addLogo,200)

saveHistory(text)

}

function downloadQR(){

let img=document.querySelector("#qrcode img")
let canvas=document.querySelector("#qrcode canvas")

if(img){
let link=document.createElement("a")
link.href=img.src
link.download="qrcode.png"
link.click()
return
}

if(canvas){
let link=document.createElement("a")
link.href=canvas.toDataURL("image/png")
link.download="qrcode.png"
link.click()
return
}

alert("Generate QR Code first")

}

function addLogo(){

let logoInput=document.getElementById("logoUpload")

if(logoInput.files.length==0) return

let reader=new FileReader()

reader.onload=function(e){

let logo=document.createElement("img")

logo.src=e.target.result

logo.style.width="50px"
logo.style.height="50px"
logo.style.position="absolute"
logo.style.left="50%"
logo.style.top="50%"
logo.style.transform="translate(-50%,-50%)"
logo.style.borderRadius="8px"

document.getElementById("qrcode").appendChild(logo)

}

reader.readAsDataURL(logoInput.files[0])

}

function saveHistory(text){

let list=document.getElementById("historyList")

let li=document.createElement("li")

li.innerText=text

list.prepend(li)

}

</script>

</body>
</html>
